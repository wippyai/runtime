version: "1.0"
namespace: app

entries:
  # app:gateway - HTTP server
  - name: gateway
    kind: http.service
    meta:
      comment: Main HTTP gateway service
    addr: :8085
    lifecycle:
      auto_start: true

  # app:api.public - public router
  - name: api.public
    kind: http.router
    meta:
      comment: Public API router
      server: gateway
    prefix: /

  # app:processes - process host
  - name: processes
    kind: process.host
    meta:
      comment: Process execution host
    host:
      max_processes: 10000
      workers: 32
    lifecycle:
      auto_start: true

  # app:terminal - terminal host for CLI apps
  - name: terminal
    kind: terminal.host
    meta:
      comment: Terminal host for CLI processes
    hide_logs: true
    lifecycle:
      auto_start: true

  # app:wasm.files - filesystem for WASM components
  - name: wasm.files
    kind: fs.directory
    meta:
      comment: WASM components directory
    directory: src/wasm
    mode: "0444"

  # app:test_runner - Test runner process
  - name: test_runner
    kind: process.lua
    meta:
      comment: Runs all tests with meta.type=test
    source: file://runner.lua
    method: main
    modules:
      - io
      - registry
      - funcs
