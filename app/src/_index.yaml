version: "1.0"
namespace: supervisor

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: minimal_process
    kind: process.service
    meta:
      comment: "Minimal Process Service"
    process: minimal
    host: system:heap
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 1

  - name: minimal
    kind: process.lua
    meta:
      comment: "Minimal Process"
    source: file://process.lua
    method: run
    modules: [ "time", "json" ]