version: "1.0"
namespace: app.tests

meta:
  depends_on: [ "ns:system", "ns:wippy.lib", "ns:app.tests.cases" ]

entries:
  - name: test_discovery
    kind: function.lua
    meta:
      comment: "Discovers all available test cases without running them"
    source: file://test_discovery.lua
    method: discover_tests
    modules: [ http, time, json ]
    imports:
      test_registry: "wippy.lib:test_registry"
    pool:
      size: 1

  - name: test
    kind: function.lua
    meta:
      comment: "Runs all the tests it can find"
    source: file://test.lua
    method: run_tests
    modules: [ http, time, json, funcs ]
    imports:
      test_registry: "wippy.lib:test_registry"
    pool:
      size: 8

  - name: discover.endpoint
    kind: http.endpoint
    meta:
      comment: "Discovers all available tests cases"
      router: system:api
    method: GET
    path: /test/discover
    func: test_discovery

  - name: test.endpoint
    kind: http.endpoint
    meta:
      comment: "Runs all the tests it can find"
      router: system:api
    method: GET
    path: /test
    func: test