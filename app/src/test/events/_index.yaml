version: "1.0"
namespace: app.test.events

entries:
  - name: module
    kind: function.lua
    meta:
      type: test
      suite: events
      description: Events module basic checks
    source: file://module.lua
    method: main
    modules:
      - events
    imports:
      assert2: app.lib:assert

  - name: subscribe
    kind: function.lua
    meta:
      type: test
      suite: events
      description: Events subscribe returns channel
    source: file://subscribe.lua
    method: main
    modules:
      - events
    imports:
      assert2: app.lib:assert

  - name: subscribe_with_kind
    kind: function.lua
    meta:
      type: test
      suite: events
      description: Events subscribe with kind filter
    source: file://subscribe_with_kind.lua
    method: main
    modules:
      - events
    imports:
      assert2: app.lib:assert

  - name: send
    kind: function.lua
    meta:
      type: test
      suite: events
      description: Events send
    source: file://send.lua
    method: main
    modules:
      - events
    imports:
      assert2: app.lib:assert

  - name: send_with_data
    kind: function.lua
    meta:
      type: test
      suite: events
      description: Events send with data payload
    source: file://send_with_data.lua
    method: main
    modules:
      - events
    imports:
      assert2: app.lib:assert

  - name: errors
    kind: function.lua
    meta:
      type: test
      suite: events
      description: Events error handling
    source: file://errors.lua
    method: main
    modules:
      - events
    imports:
      assert2: app.lib:assert

