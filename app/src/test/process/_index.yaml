version: "1.0"
namespace: app.test.process

entries:
  # Helper processes
  - name: echo_worker
    kind: process.lua
    meta:
      comment: Worker that echoes messages back to sender
    source: file://echo_worker.lua
    method: main

  - name: listen_worker
    kind: process.lua
    meta:
      comment: Worker that listens on custom topic
    source: file://listen_worker.lua
    method: main

  - name: short_worker
    kind: process.lua
    meta:
      comment: Short-lived worker that exits immediately
    source: file://short_worker.lua
    method: main

  - name: long_worker
    kind: process.lua
    meta:
      comment: Long-running worker that waits for cancel
    source: file://long_worker.lua
    method: main
    modules:
      - time

  - name: events_exit_worker
    kind: process.lua
    meta:
      comment: Worker that tests EXIT event reception
    source: file://events_exit_worker.lua
    method: main
    modules:
      - time

  - name: events_cancel_worker
    kind: process.lua
