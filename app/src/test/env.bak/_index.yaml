version: "1.0"
namespace: app.test.env

entries:
  # storage types for testing
  - name: memory
    kind: env.storage.memory
    meta:
      comment: Memory storage for tests
    lifecycle:
      auto_start: true
    variables:
      TEST_VAR: test_value
      ANOTHER_VAR: another_value
      NUMERIC_VAR: "12345"

  - name: os
    kind: env.storage.os
    meta:
      comment: OS environment variables
    lifecycle:
      auto_start: true

  - name: composite
    kind: env.storage.router
    meta:
      comment: Composite storage with memory and OS fallback
    lifecycle:
      auto_start: true
    storages:
      - app.test.env:memory
      - app.test.env:os

  # variables with aliases
  - name: test_var
    kind: env.variable
    meta:
      comment: Test variable with alias
    storage: app.test.env:composite
    variable: TEST_VAR

  - name: path_var
    kind: env.variable
    meta:
      comment: PATH variable from OS (by ID only, no alias)
    storage: app.test.env:os
    variable: PATH

  # test functions
  - name: get
    kind: function.lua
    meta:
      type: test
      suite: env
      description: env.get function
    source: file://get.lua
    method: main
    modules:
      - env
    imports:
      assert_primitives: app.lib:assert

  - name: get_all
    kind: function.lua
    meta:
      type: test
      suite: env
      description: env.get_all function
    source: file://get_all.lua
    method: main
    modules:
      - env
    imports:
      assert_primitives: app.lib:assert

  - name: errors
    kind: function.lua
    meta:
      type: test
      suite: env
      description: env structured errors
    source: file://errors.lua
    method: main
    modules:
      - env
    imports:
      assert_primitives: app.lib:assert
