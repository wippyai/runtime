version: "1.0"
namespace: app.funcs.openai

meta:
  depends_on: [ ns:system, ns:wippy.test ]
  router: system:api

entries:
  - name: llm_query
    kind: function.lua
    meta:
      comment: "LLM query function with streaming support"
      llm_implements: generate
      models: [ "gpt*", "o*" ]
    source: file://llm_query.lua
    method: handler
    modules: [ "http_client", "json", "env", "time" ]
    pool:
      size: 4

#  - name: llm_query_test
