version: "1.0"
namespace: demo.security

meta:
  depends_on: [ ns:system ]
  description: "Security demo implementation"

entries:
  # JSON API for security operations
  - name: api
    kind: function.lua
    meta:
      comment: "Security JSON API"
    source: file://api.lua
    method: handler
    modules: [ http, security, json, time ]

  - name: api.endpoint
    kind: http.endpoint
    meta:
      comment: "Security JSON API Endpoint"
      router: system:api
    method: POST
    path: /security
    func: api

  # Protected resource endpoint
  - name: protected
    kind: function.lua
    meta:
      comment: "Protected resource requiring authentication"
    source: file://protected.lua
    method: handler
    modules: [ http, security, json ]

  - name: protected.endpoint
    kind: http.endpoint
    meta:
      comment: "Protected resource endpoint"
      router: system:api
    method: GET
    path: /protected
    func: protected

  - name: secure.router
    kind: http.router
    meta:
      comment: "Secure API router with firewall protection"
      server: system:gateway
      depends_on:
        - system:gateway
        - system.security:auth.tokens
    prefix: /api/secure
    middleware: [ token_auth, resource_firewall ]
    post_middleware: [ endpoint_firewall ]
    options:
      token_store: system.security:auth.tokens
      resource_action: access
      resource_target: global:api
    post_options:
      endpoint_action: access

  # Secure endpoint definition
  - name: secure.endpoint
    kind: http.endpoint
    meta:
      comment: "Secure user profile endpoint requiring authentication"
      router: demo.security:secure.router
    method: GET
    path: /profile
    func: demo.security:secure_endpoint

  # Admin endpoint definition
  - name: secure.admin
    kind: http.endpoint
    meta:
      comment: "Administrative endpoint requiring admin privileges"
      router: demo.security:secure.router
    method: GET
    path: /admin
    func: demo.security:secure_endpoint

  # Secure endpoint implementation
  - name: secure_endpoint
    kind: function.lua
    meta:
      comment: "Secure endpoint handler implementation"
    source: file://secure.lua
    method: handler
    modules: [ http, security, json, time ]