version: "1.0"
namespace: demo.security

meta:
  depends_on: [ ns:system ]
  description: "Minimal security demo implementation"

entries:
  # Main API for security operations
  - name: api
    kind: function.lua
    meta:
      comment: "Security API for token management and permission testing"
    source: file://api.lua
    method: handler
    modules: [ http, security, json, time ]

  - name: api.endpoint
    kind: http.endpoint
    meta:
      comment: "Security API endpoint"
      router: system:api
    method: POST
    path: /api/demo/security
    func: api

  # Restricted resource endpoint (protected by auth)
  - name: restricted
    kind: function.lua
    meta:
      comment: "Restricted resource requiring authentication"
    source: file://restricted.lua
    method: handler
    modules: [ http, security, json ]

  - name: restricted.endpoint
    kind: http.endpoint
    meta:
      comment: "Protected resource endpoint"
      router: system:api
    method: GET
    path: /api/demo/restricted
    func: restricted

  # UI page
  - name: ui
    kind: function.lua
    meta:
      comment: "Security demo UI"
    source: file://ui.lua
    method: handler
    modules: [ http ]

  - name: ui.endpoint
    kind: http.endpoint
    meta:
      comment: "Security demo UI endpoint"
      router: system:api
    method: GET
    path: /demo/security
    func: ui