version: "1.0"
namespace: app.env.demo

meta:
  depends_on: [ "ns:system" ]
  comment: "ENV Demo Application"

entries:
  - name: env_demo
    kind: function.lua
    meta:
      comment: "ENV demo"
    source: file://env.lua
    method: handler
    modules: [ http, env ]
    pool:
      size: 2
      workers: 4

  - name: envmemory
    kind: env.storagememory
    meta:
      type: envstorage
      comment: Memory storage for environment variables

  - name: envfile
    kind: env.storagefile
    meta:
      type: envstorage
      comment: Memory storage for environment variables
    file_path: "../be-common-components/.env.sample"

  - name: env_demo.endpoint
    kind: http.endpoint
    meta:
      comment: "ENV demo endpoint"
      router: system:api
    method: GET
    path: /env/demo
    func: env_demo

  - name: openai_api_key
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envmemory
    variable: OPENAI_API_KEY
    storage: app.env.demo:envmemory
    default:
    readonly: true # no overwrite from runtime

  - name: openai_api_url
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envmemory
    variable: OPENAI_API_URL
    storage: app.env.demo:envmemory
    default:
    readonly: true # no overwrite from runtime

  - name: document_loaders_host
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envfile
    variable: DOCUMENT_LOADERS_HOST
    storage: app.env.demo:envfile
    default:
    readonly: true # no overwrite from runtime

  - name: memory_test_env
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envmemory
    variable: MEMORY_TEST_ENV
    storage: app.env.demo:envmemory
    default:
    readonly: false

  - name: memory_test_env_readonly
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envmemory
    variable: MEMORY_TEST_ENV_READONLY
    storage: app.env.demo:envmemory
    default:
    readonly: true

  - name: file_test_env
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envfile
    variable: FILE_TEST_ENV
    storage: app.env.demo:envfile
    default:

  - name: file_test_env_readonly
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envfile
    variable: FILE_TEST_ENV_READONLY
    storage: app.env.demo:envfile
    default:
    readonly: true
