version: "1.0"
namespace: app.env.demo

meta:
  depends_on: [ "ns:system" ]
  comment: "ENV Demo Application"
  interceptors:
    global:
      otel:
        type: "tracing"
        enabled: true
        service_name: "env_demo"
        custom_attributes:
          environment: "demo"
          module: "env_demo"
      retry:
        type: "retry"
        enabled: true
        max_attempts: 3
        initial_interval: "1s"
        max_interval: "10s"
        multiplier: 2
      rate_limit:
        type: "rate_limit"
        enabled: true
        requests_per_second: 10
        burst: 5

entries:
  - name: env_demo
    kind: function.lua
    meta:
      comment: "ENV demo"
      interceptors:
        otel:
          type: "tracing"
          enabled: true
          custom_attributes:
            function_type: "env_test"
        retry:
          type: "retry"
          enabled: true
          max_attempts: 5
    source: file://env.lua
    method: handler
    modules: [ http, env ]
    pool:
      size: 2
      workers: 4

  - name: env_demo.endpoint
    kind: http.endpoint
    meta:
      comment: "ENV demo endpoint"
      router: system:api
      interceptors:
        rate_limit:
          type: "rate_limit"
          enabled: true
          requests_per_second: 5
          burst: 2
    method: GET
    path: /env/demo
    func: env_demo

  - name: memory_test_env
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envmemory
    variable: MEMORY_TEST_ENV
    storage: system:envmemory
    default:
    readonly: false

  - name: memory_test_env_readonly
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envmemory
    variable: MEMORY_TEST_ENV_READONLY
    storage: system:envmemory
    default:
    readonly: true

  - name: file_test_env
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: FILE_TEST_ENV
    storage: system:envfile
    default:

  - name: file_test_env_readonly
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: FILE_TEST_ENV_READONLY
    storage: system:envfile
    default:
    readonly: true
