version: "1.0"
namespace: app.env.demo

meta:
  depends_on: [ "ns:system" ]
  comment: "ENV Demo Application"

entries:
  - name: env_demo
    kind: function.lua
    meta:
      comment: "ENV demo"
    source: file://env.lua
    method: handler
    modules: [ http, env ]
    pool:
      size: 2
      workers: 4

  - name: envmemory
    kind: env.storage
    meta:
      type: envstorage
      comment: Memory storage for environment variables
    type: memory

  - name: env_demo.endpoint
    kind: http.endpoint
    meta:
      comment: "ENV demo endpoint"
      router: system:api
    method: GET
    path: /env/demo
    func: env_demo

  - name: openai_api_key
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envmemory
    variable: OPENAI_API_KEY
    storage: app.env.demo:envmemory
    default:
    readonly: true # no overwrite from runtime

  - name: openai_api_url
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - app.env.demo:envmemory
    variable: OPENAI_API_URL
    storage: app.env.demo:envmemory
    default:
    readonly: true # no overwrite from runtime
