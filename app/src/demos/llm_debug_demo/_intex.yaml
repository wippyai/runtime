version: "1.0"
namespace: app.llm_debug.demo

entries:
  ###########################
  #   Dependency entries    #
  ###########################

  - name: __dependency.wippy.llm
    kind: "ns.dependency"
    meta:
      description: "LLM component"
    component: "wippy/llm"
    version: ">=v0.0.7"
    parameters:
      - name: "application_host"
        value: "system:processes"
  #
  #  ###########################
  #  #   Local components      #
  #  ###########################

  - name: bapp
    kind: library.lua
    meta:
      comment: "Bubble Tea app wrapper library"
    source: file://bapp.lua
    modules: [btea, channel, upstream]

  # app:terminal
  - name: terminal
    kind: terminal.host
    meta:
      comment: "System terminal host"
    hide_logs: false
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3
        backoff_factor: 1.5

  # app:processes
  - name: processes
    kind: process.host
    meta:
      comment: "Process execution host"
    host:
      workers: 32
      max_processes: 20000
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3
        backoff_factor: 1.5

  - name: VERTEX_AI_PRIVATE_KEY_ID
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: VERTEX_AI_PRIVATE_KEY_ID
    storage: system:envfile
    default:

  - name: VERTEX_AI_CLIENT_EMAIL
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: VERTEX_AI_CLIENT_EMAIL
    storage: system:envfile
    default:

  - name: VERTEX_AI_PRIVATE_KEY
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: VERTEX_AI_PRIVATE_KEY
    storage: system:envfile
    default:

  - name: VERTEX_AI_PROJECT
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: VERTEX_AI_PROJECT
    storage: system:envfile
    default:

  - name: VERTEX_AI_LOCATION
    kind: env.variable
    meta:
      type: secret_key
      depends_on:
        - system:envfile
    variable: VERTEX_AI_LOCATION
    storage: system:envfile
    default:

  #  - name: __dependency.wippy.migration
  #    kind: "ns.dependency"
  #    meta:
  #     description: "Migration component"
  #    component: "wippy/migration"
  #    version: ">=v0.0.7"

  - name: __dependency.wippy.security
    kind: "ns.dependency"
    meta:
      description: "Security component"
    component: "wippy/security"
    version: ">=v0.0.7"
