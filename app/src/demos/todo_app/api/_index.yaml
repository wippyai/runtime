version: "1.0"
namespace: app.demo.todo_app.api

meta:
  depends_on:
    - "ns:system"
    - "ns:app.demo.todo_app"
  router: system:api

entries:
  - name: todo.list
    kind: function.lua
    meta:
      comment: "List all todos"
    source: file://list_handler.lua
    method: list_todos
    modules: [ "http" ]
    imports:
      todo_repo: "app.demo.todo_app:todo_repo"
    pool:
      size: 4

  - name: todo.get
    kind: function.lua
    meta:
      comment: "Get a specific todo"
    source: file://get_handler.lua
    method: get_todo
    modules: [ "http" ]
    imports:
      todo_repo: "app.demo.todo_app:todo_repo"
    pool:
      size: 4

  - name: todo.add
    kind: function.lua
    meta:
      comment: "Add a new todo"
    source: file://add_handler.lua
    method: add_todo
    modules: [ "http", "json" ]
    imports:
      todo_repo: "app.demo.todo_app:todo_repo"
    pool:
      size: 4

  - name: todo.update
    kind: function.lua
    meta:
      comment: "Update a todo"
    source: file://update_handler.lua
    method: update_todo
    modules: [ "http", "json" ]
    imports:
      todo_repo: "app.demo.todo_app:todo_repo"
    pool:
      size: 4

  - name: todo.delete
    kind: function.lua
    meta:
      comment: "Delete a todo"
    source: file://delete_handler.lua
    method: delete_todo
    modules: [ "http" ]
    imports:
      todo_repo: "app.demo.todo_app:todo_repo"
    pool:
      size: 4

  - name: todo.list.endpoint
    kind: http.endpoint
    meta:
      comment: "List all todos endpoint"
    method: GET
    path: /todos
    func: app.demo.todo_app.api:todo.list

  - name: todo.get.endpoint
    kind: http.endpoint
    meta:
      comment: "Get a specific todo endpoint"
    method: GET
    path: /todos/get
    func: app.demo.todo_app.api:todo.get

  - name: todo.add.endpoint
    kind: http.endpoint
    meta:
      comment: "Add a new todo endpoint"
    method: POST
    path: /todos
    func: app.demo.todo_app.api:todo.add

  - name: todo.update.endpoint
    kind: http.endpoint
    meta:
      comment: "Update a todo endpoint"
    method: PUT
    path: /todos/update
    func: app.demo.todo_app.api:todo.update

  - name: todo.delete.endpoint
    kind: http.endpoint
    meta:
      comment: "Delete a todo endpoint"
    method: DELETE
    path: /todos/delete
    func: app.demo.todo_app.api:todo.delete