version: "1.0"
namespace: app.websocket.demo

meta:
  depends_on: [ "ns:system" ]
  comment: "WebSocket Demo Application"

entries:
  # Define the WebSocket hub process
  - name: ws_hub.service
    kind: process.service
    meta:
      comment: "WebSocket Hub Service"
    process: ws_hub.process
    host: system:processes
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3
      depends_on:
        - system:processes

  # Define the process implementation
  - name: ws_hub.process
    kind: process.lua
    meta:
      comment: "Process that manages WebSocket connections"
    source: file://ws_hub_process.lua
    method: run
    modules: [ time ]

  # Define the WebSocket auth endpoint function
  - name: ws_auth
    kind: function.lua
    meta:
      comment: "WebSocket authentication endpoint"
    source: file://ws_auth.lua
    method: handler
    modules: [ http, json ]
    pool:
      size: 4

  # Define the HTTP endpoint for the WebSocket connection
  - name: ws_auth.endpoint
    kind: http.endpoint
    meta:
      comment: "WebSocket connection endpoint"
      router: system:api
    method: GET
    path: /ws/connect
    func: ws_auth