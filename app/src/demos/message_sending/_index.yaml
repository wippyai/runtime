version: "1.0"
namespace: app.demos.message_sending

meta:
  depends_on: [ "ns:system", "ns:wippy.actor" ]

entries:
  - name: message.service
    kind: process.service
    meta:
      comment: "Message Listener Service"
    process: message.process
    host: system:processes
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3
      depends_on:
        - system:processes

  - name: message.process
    kind: process.lua
    meta:
      comment: "Process that waits for messages"
    source: file://process.lua
    method: run
    modules: [ time, funcs ]
    imports:
      actor: wippy.actor:actor

  - name: message.sender
    kind: function.lua
    meta:
      comment: "HTTP endpoint to send messages to a process"
    source: file://sender.lua
    method: handler
    modules: [ http, time ]
    pool:
      size: 8

  - name: child.get_local_time
    kind: function.lua
    meta:
      comment: "Simple child function with http sender"
    source: file://child.lua
    method: get_local_time
    modules: [ http_client ]
    pool:
      size: 8

  - name: sender.endpoint
    kind: http.endpoint
    meta:
      comment: "Send message to PID"
      router: system:api
    method: GET
    path: /send
    func: message.sender