version: "1.0"
namespace: app.interceptor.demo

meta:
  depends_on: [ "ns:system" ]
  comment: "Interceptor Demo Application"

entries:
  - name: interceptor_demo
    kind: function.lua
    meta:
      comment: "interceptor demo"
      retry_attempts: 5
    source: file://interceptor.lua
    method: handler
    modules: [ http ]
    pool:
      size: 2
      workers: 4

  - name: interceptor_demo.endpoint
    kind: http.endpoint
    meta:
      comment: "interceptor demo endpoint"
      router: system:api
    method: GET
    path: /interceptor/demo
    func: interceptor_demo
