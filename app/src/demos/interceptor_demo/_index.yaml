version: "1.0"
namespace: app.interceptor.demo

meta:
  depends_on:
    - "ns:system"
  comment: "Interceptor Demo Application"

entries:
  # app.interceptor.demo:child_spans
  - name: child_spans
    kind: library.lua
    meta:
      comment: "Child spans library"
    source: file://child_spans.lua
    modules: [ "otel" ]

  # app.interceptor.demo:interceptor_demo_otel
  - name: interceptor_demo_otel
    kind: function.lua
    meta:
      comment: "OpenTelemetry demo handler"
    source: file://otel.lua
    method: handler
    modules: [ "http", "otel" ]
    imports:
      child_spans: "app.interceptor.demo:child_spans"
    pool:
      size: 4

  - name: interceptor_demo_child_spans
    kind: library.lua
    meta:
      comment: "interceptor demo child spans processing"
    source: file://child_spans.lua
    modules: [ otel ]

  - name: interceptor_demo.endpoint
    kind: http.endpoint
    meta:
      comment: "interceptor demo endpoint"
      router: system:api
    method: GET
    path: /interceptor/demo/otel
    func: interceptor_demo_otel

  - name: interceptor_demo_retry
    kind: function.lua
    meta:
      comment: "interceptor demo retry"
      options:
        retry:
          attempts: 10
    source: file://retry.lua
    method: handler
    modules: [ http ]
    pool:
      size: 2
      workers: 4
  - name: interceptor_demo_retry.endpoint
    kind: http.endpoint
    meta:
      comment: "interceptor demo retry endpoint"
      router: system:api
    method: GET
    path: /interceptor/demo/retry
    func: interceptor_demo_retry

  - name: interceptor_demo_ratelimit
    kind: function.lua
    meta:
      comment: "interceptor demo ratelimit"
      options:
        ratelimit:
          rps: 1
          burst: 1
    source: file://ratelimit.lua
    method: handler
    modules: [ http ]
    pool:
      size: 2
      workers: 4
  - name: interceptor_demo_ratelimit.endpoint
    kind: http.endpoint
    meta:
      comment: "interceptor demo rate limit endpoint"
      router: system:api
    method: GET
    path: /interceptor/demo/ratelimit
    func: interceptor_demo_ratelimit

  - name: interceptor_demo_timeout
    kind: function.lua
    meta:
      comment: "interceptor demo timeout"
      options:
        timeout:
          timeout: 200ms
    source: file://timeout.lua
    method: handler
    modules: [ http, time ]
    pool:
      size: 2
      workers: 4
  - name: interceptor_demo_timeout.endpoint
    kind: http.endpoint
    meta:
      comment: "interceptor demo timeout endpoint"
      router: system:api
    method: GET
    path: /interceptor/demo/timeout
    func: interceptor_demo_timeout

  - name: interceptor_demo_with_options
    kind: function.lua
    meta:
      comment: "interceptor demo with options"
    source: file://with_options.lua
    method: handler
    modules: [ http, otel, funcs ]
    pool:
      size: 2
      workers: 4
  - name: interceptor_demo_with_options.endpoint
    kind: http.endpoint
    meta:
      comment: "interceptor demo with options endpoint"
      router: system:api
    method: GET
    path: /interceptor/demo/with_options
    func: interceptor_demo_with_options

