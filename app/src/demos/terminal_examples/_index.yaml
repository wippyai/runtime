version: "1.0"
namespace: app.demos.terminal_examples

meta:
  depends_on: [ "ns:system", "ns:wippy.lib" ]

entries:
  - name: app.service
    kind: process.service
    meta:
      comment: "Sample application using Bubble Tea bindings"
    process: basic # select demo app to run
    host: system:terminal
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 1
      depends_on:
        - system:terminal

  - name: basic
    kind: btea.app.lua
    meta:
      comment: "Simple upstream example"
      default_host: terminal
    source: file://basic.lua
    method: App
    modules: [ time ]
    imports:
      "bapp": "wippy.lib:bapp"

  - name: tabs
    kind: btea.app.lua
    meta:
      comment: "Tabbed interface example"
      default_host: terminal
    source: file://tabs.lua
