version: "1.0"
#namespace: app.demos.parent_child

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: parent.service
    kind: process.service
    meta:
      comment: "Parent Child simulation"
    process: parent
    host: system:processes
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 1
      depends_on:
        - system:processes

  - name: parent
    kind: process.lua
    meta:
      comment: "Minimal Process"
    source: file://parent.lua
    method: run
    modules: [ "time", "json" ]

  - name: child
    kind: process.lua
    meta:
      comment: "Child Process"
    source: file://child.lua
    method: run
    modules: [ "time", "json" ]