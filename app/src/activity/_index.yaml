version: "1.0"
namespace: app.activity

entries:
  - name: process_data
    kind: function.lua
    meta:
      comment: "Simple data processing function"
      temporal:
        activity:
          name: "ProcessData"
          worker: "app.temporal:worker1"
    source: file://process_data.lua
    method: handler
    modules: [ "json" ]
    pool:
      size: 50

  - name: validate_data
    kind: function.lua
    meta:
      comment: "Quick local validation activity"
      temporal:
        activity:
          name: "ValidateData"
          worker: "app.temporal:worker1"
          local: true
    source: file://validate_data.lua
    method: handler
    modules: [ "json" ]
    pool:
      size: 50