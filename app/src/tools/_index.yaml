version: "1.0"
namespace: tools

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: tree
    kind: function.lua
    meta:
      comment: "File system tree utility that prints directory structure"
      type: "tool"
      input_schema: |
        {
          "type": "object",
          "properties": {
            "path": {
              "type": "string",
              "description": "Directory path to display tree for"
            },
            "fs": {
              "type": "string",
              "description": "Filesystem to use",
              "default": "system:core"
            },
            "max_depth": {
              "type": "integer",
              "description": "Maximum depth to traverse",
              "default": 5
            },
            "show_hidden": {
              "type": "boolean",
              "description": "Whether to show hidden files",
              "default": false
            }
          },
          "required": ["path"]
        }
    source: file://tree.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2

  - name: read
    kind: function.lua
    meta:
      comment: "File reader utility that reads and returns file contents"
      llm_description: "Reads and returns the contents of a file at the specified path"
      type: "tool"
      input_schema: |
        {
          "type": "object",
          "properties": {
            "path": {
              "type": "string",
              "description": "Path to the file to read"
            },
            "fs": {
              "type": "string",
              "description": "Filesystem to use",
              "default": "system:core"
            },
            "encoding": {
              "type": "string",
              "description": "File encoding",
              "enum": ["utf8", "binary"],
              "default": "utf8"
            }
          },
          "required": ["path"]
        }
    source: file://read.lua
    method: handle
    modules: [ "fs" ]
    pool:
      size: 2

  - name: list
    kind: function.lua
    meta:
      comment: "Directory listing utility that returns directory contents"
      type: "tool"
      llm_alias: "list_directory"
      input_schema: |
        {
          "type": "object",
          "properties": {
            "path": {
              "type": "string",
              "description": "Directory path to list",
              "default": "/"
            },
            "fs": {
              "type": "string",
              "description": "Filesystem to use",
              "default": "system:core"
            },
            "format": {
              "type": "string",
              "description": "Output format",
              "enum": ["basic", "detailed", "json"],
              "default": "detailed"
            },
            "show_hidden": {
              "type": "boolean",
              "description": "Whether to show hidden files",
              "default": false
            }
          }
        }
    source: file://list.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2

  - name: search
    kind: function.lua
    meta:
      comment: "File content search utility that finds text in files"
      type: "tool"
      input_schema: |
        {
          "type": "object",
          "properties": {
            "query": {
              "type": "string",
              "description": "Text to search for"
            },
            "path": {
              "type": "string",
              "description": "Base path to search in",
              "default": "/"
            },
            "fs": {
              "type": "string",
              "description": "Filesystem to use",
              "default": "system:core"
            },
            "recursive": {
              "type": "boolean",
              "description": "Whether to search recursively",
              "default": true
            },
            "max_depth": {
              "type": "integer",
              "description": "Maximum recursion depth",
              "default": 10
            },
            "file_pattern": {
              "type": "string",
              "description": "File pattern to match (glob)",
              "default": "*"
            },
            "case_sensitive": {
              "type": "boolean",
              "description": "Whether search is case sensitive",
              "default": false
            }
          },
          "required": ["query"]
        }
    source: file://search.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2

  - name: write
    kind: function.lua
    meta:
      comment: "File writer utility that writes content to a file"
      type: "tool"
      input_schema: |
        {
          "type": "object",
          "properties": {
            "path": {
              "type": "string",
              "description": "Path to write to"
            },
            "content": {
              "type": "string",
              "description": "Content to write"
            },
            "fs": {
              "type": "string",
              "description": "Filesystem to use",
              "default": "system:core"
            },
            "append": {
              "type": "boolean",
              "description": "Whether to append to file",
              "default": false
            },
            "create_dirs": {
              "type": "boolean",
              "description": "Create parent directories if needed",
              "default": false
            }
          },
          "required": ["path", "content"]
        }
    source: file://write_file.lua
    method: handle
    modules: [ "fs" ]
    pool:
      size: 2

  - name: read_multi
    kind: function.lua
    meta:
      comment: "Multi-file reader utility that reads multiple files at once"
      type: "tool"
      input_schema: |
        {
          "type": "object",
          "properties": {
            "paths": {
              "type": "array",
              "description": "Array of file paths to read",
              "items": {
                "type": "string"
              }
            },
            "fs": {
              "type": "string",
              "description": "Filesystem to use",
              "default": "system:core"
            },
            "encoding": {
              "type": "string",
              "description": "File encoding",
              "enum": ["utf8", "binary"],
              "default": "utf8"
            }
          },
          "required": ["paths"]
        }
    source: file://read_multi.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2