version: "1.0"
namespace: app.api

entries:
  # app.api:add - WAT function (WASM)
  - name: add
    kind: function.wat
    meta:
      comment: Add two integers (WASM)
    source: file://add.wat
    wit: |
      package app:math;
      world calculator {
        export add: func(a: s32, b: s32) -> s32;
      }
    method: add
    pool:
      type: workstealing
      size: 4
      buffer: 64

  # app.api:hello - Lua function with pool
  - name: hello
    kind: function.lua
    meta:
      comment: Returns hello world JSON, calls WASM add function
    source: file://hello.lua
    modules:
      - http
      - funcs
    method: handler
    pool:
      type: workstealing
      size: 32
      buffer: 1024

  # app.api:hello.endpoint - HTTP endpoint
  - name: hello.endpoint
    kind: http.endpoint
    meta:
      comment: Public hello endpoint
      router: app:api.public
    method: GET
    func: hello
    path: /hello
