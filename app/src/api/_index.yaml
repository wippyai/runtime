version: "1.0"
namespace: app.api

entries:
  # app.api:worker - Lua process
  - name: worker
    kind: process.lua
    meta:
      comment: Simple worker process
    source: file://worker.lua
    method: main
    modules:
      - process

  # app.api:hello - Lua function with pool
  - name: hello
    kind: function.lua
    meta:
      comment: Returns hello world JSON
    source: file://hello.lua
    modules:
      - http
      - funcs
    method: handler
    pool:
      type: static
      size: 64
      buffer: 1024

  # app.api:hello.endpoint - HTTP endpoint
  - name: hello.endpoint
    kind: http.endpoint
    meta:
      comment: Public hello endpoint
      router: app:api.public
    method: GET
    func: hello
    path: /hello

  # app.api:stats - Memory and runtime stats
  - name: stats
    kind: function.lua
    meta:
      comment: Go runtime memory stats
    source: file://stats.lua
    modules:
      - http
      - system
    method: handler
    pool:
      type: inline

  # app.api:stats.endpoint - HTTP endpoint
  - name: stats.endpoint
    kind: http.endpoint
    meta:
      comment: Runtime stats endpoint
      router: app:api.public
    method: GET
    func: stats
    path: /stats

  # app.api:cli - CLI process for terminal host
  - name: cli
    kind: process.lua
    meta:
      comment: Simple CLI demo app
    source: file://cli.lua
    method: main
    modules:
      - io
      - system

  # app.api:spawn_test - Spawn 10k processes test
  - name: spawn_test
    kind: process.lua
    meta:
      comment: Memory leak test - spawns 10k processes
    source: file://spawn_test.lua
    method: main
    modules:
      - io
      - process
      - system
      - time

  - name: add
    kind: function.wat
    meta:
      comment: Add two integers (WASM)
    source: file://add.wat
    wit: |
      package app:math;
      world calculator {
        export add: func(a: s32, b: s32) -> s32;
      }
    method: add
    pool:
      type: static
      size: 64
      buffer: 1024