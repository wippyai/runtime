version: "1.0"
namespace: app.api

entries:
  # app.api:worker - Lua process
  - name: worker
    kind: process.lua
    meta:
      comment: Simple worker process
    source: file://worker.lua
    method: main

  # app.api:hello - Lua function with pool
  - name: hello
    kind: function.lua
    meta:
      comment: Returns hello world JSON
    source: file://hello.lua
    modules:
      - http
      - process
    method: handler
    pool:
      type: workstealing
      size: 64
      buffer: 1024

  # app.api:hello.endpoint - HTTP endpoint
  - name: hello.endpoint
    kind: http.endpoint
    meta:
      comment: Public hello endpoint
      router: app:api.public
    method: GET
    func: hello
    path: /hello

  # Commented out WASM components for now
  # - name: add
  #   kind: function.wat
  #   ...
  # - name: transform
  #   kind: function.wasm
  #   ...
