version: "1.0"
namespace: system

entries:
  - name: gateway
    kind: http.service
    meta:
      comment: "Main HTTP gateway service"
    addr: ":8082"
    timeouts:
      idle: 60s
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3

  - name: router
    kind: http.router
    meta:
      comment: "API router for v1 endpoints"
      server: gateway
      depends_on:
        - gateway
    prefix: /api/v1