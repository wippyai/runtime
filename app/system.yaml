version: "1.0"
namespace: system

entries:
  - name: gateway
    kind: http.service
    meta:
      comment: "Main HTTP gateway service"
    addr: ":8082"
    timeouts:
      idle: 60s
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3

  - name: router
    kind: http.router
    meta:
      comment: "API router for v1 endpoints"
      server: gateway
      depends_on:
        - gateway
    prefix: /api/v1
    entries:

  - name: terminal
    kind: terminal.host
    meta:
      comment: "System shell"
    hide_logs: false
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3

  - name: heap
    kind: process.host
    meta:
      comment: "Process execution host"
    host:
      max_processes: 500
      workers: 16
      message_buffer: 1000
      process_queue_size: 1000
      step_queue_size: 5000
      step_timeout: 30s
      launch_timeout: 1m
      shutdown_timeout: 2m
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3