name: default_tq
kind: temporal.task_queue
meta:
  comment: "Default Temporal service."
  depends_on: [ "temporal" ]
  groups: [ "system" ]

client: "temporal"
task_queue: "wippy_demos"

lifecycle:
  auto_start: false
  start_timeout: 5s
  restart:
    initial_delay: 1s
    max_attempts: 3
  depends_on: [ "temporal" ]