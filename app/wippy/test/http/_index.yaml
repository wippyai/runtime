version: "1.0"
namespace: wippy.test.http

meta:
  depends_on: [ "ns:system", "ns:wippy.test" ]

entries:
  - name: discovery
    kind: function.lua
    meta:
      comment: "Discovers all available test cases without running them"
    source: file://discovery.lua
    method: discover_tests
    modules: [ http, time, json ]
    imports:
      registry: "wippy.test:registry"

  - name: test
    kind: function.lua
    meta:
      comment: "Runs all the tests it can find"
    source: file://test.lua
    method: run_tests
    modules: [ http, time, json, funcs ]
    imports:
      registry: "wippy.test:registry"
    pool:
      size: 2

  - name: discover.endpoint
    kind: http.endpoint
    meta:
      comment: "Discovers all available tests cases"
      router: system:api
    method: GET
    path: /test/discover
    func: discovery

  - name: test.endpoint
    kind: http.endpoint
    meta:
      comment: "Runs all the tests it can find"
      router: system:api
    method: GET
    path: /test
    func: test

  - name: run_specific
    kind: function.lua
    meta:
      comment: "Runs a specific test or test group"
    source: file://run_specific.lua
    method: run_specific_test
    modules: [ http, time, json, funcs ]
    imports:
      registry: "wippy.test:registry"
    pool:
      size: 2

  - name: run_specific.endpoint
    kind: http.endpoint
    meta:
      comment: "Runs specific test or test group"
      router: system:api
    method: GET
    path: /test/run
    func: run_specific