version: "1.0"
namespace: wippy.lib

entries:
  - name: migration_core
    kind: library.lua
    meta:
      comment: "Core DSL for migration definitions"
    source: file://migration_core.lua

  - name: migration_db_proxy
    kind: library.lua
    meta:
      comment: "Database proxy for intercepting SQL operations"
    source: file://migration_db_proxy.lua
    modules: [ "sql" ]

  - name: migration_reporter
    kind: library.lua
    meta:
      comment: "Event reporting system for migrations"
    source: file://migration_reporter.lua
    modules: [ "time" ]

  - name: migration_schema
    kind: library.lua
    meta:
      comment: "Schema definitions for migration tracking"
    source: file://migration_schema.lua
    modules: [ "sql", "json" ]

  - name: migration_registry
    kind: library.lua
    meta:
      comment: "Registry queries for migrations"
    source: file://migration_registry.lua
    modules: [ "registry", "time" ]

  - name: migration_executor
    kind: library.lua
    meta:
      comment: "Migration execution engine"
      depends_on:
        - wippy.lib:migration_core
        - wippy.lib:migration_db_proxy
        - wippy.lib:migration_schema
        - wippy.lib:migration_reporter
    source: file://migration_executor.lua
    modules: [ "sql", "time" ]
    imports:
      migration_core: "wippy.lib:migration_core"
      migration_db_proxy: "wippy.lib:migration_db_proxy"
      migration_schema: "wippy.lib:migration_schema"
      migration_reporter: "wippy.lib:migration_reporter"

  - name: migration
    kind: library.lua
    meta:
      comment: "Main migration library API"
      depends_on:
        - wippy.lib:migration_core
        - wippy.lib:migration_db_proxy
        - wippy.lib:migration_schema
        - wippy.lib:migration_reporter
        - wippy.lib:migration_executor
        - wippy.lib:migration_registry
    source: file://migration.lua
    modules: [ "sql", "time" ]
    imports:
      migration_core: "wippy.lib:migration_core"
      migration_db_proxy: "wippy.lib:migration_db_proxy"
      migration_schema: "wippy.lib:migration_schema"
      migration_reporter: "wippy.lib:migration_reporter"
      migration_executor: "wippy.lib:migration_executor"
      migration_registry: "wippy.lib:migration_registry"