version: "1.0"
namespace: wippy.migration.http

meta:
  depends_on: [ "ns:system", "ns:wippy.migration" ]

entries:
  - name: status
    kind: function.lua
    meta:
      comment: "Gets migration status for a specific database"
    source: file://status.lua
    method: discover_migrations
    modules: [ http, time, json ]
    imports:
      registry: "wippy.migration:registry"
      runner: "wippy.migration:runner"
    pool:
      size: 1

  - name: dbs
    kind: function.lua
    meta:
      comment: "Discovers all available target databases for migrations"
    source: file://dbs.lua
    method: discover_dbs
    modules: [ http, time, json ]
    imports:
      registry: "wippy.migration:registry"
    pool:
      size: 1

  - name: run
    kind: function.lua
    meta:
      comment: "Runs all pending migrations for a database"
    source: file://run.lua
    method: run_migrations
    modules: [ http, time, json ]
    imports:
      runner: "wippy.migration:runner"
    pool:
      size: 1

  - name: run_single
    kind: function.lua
    meta:
      comment: "Runs a specific migration by ID"
    source: file://run_single.lua
    method: run_migration
    modules: [ http, time, json ]
    imports:
      runner: "wippy.migration:runner"
    pool:
      size: 1

  - name: rollback
    kind: function.lua
    meta:
      comment: "Rolls back migrations for a database"
    source: file://rollback.lua
    method: rollback_migrations
    modules: [ http, time, json ]
    imports:
      runner: "wippy.migration:runner"
    pool:
      size: 1

  - name: check_tables
    kind: function.lua
    meta:
      comment: "Checks available tables in a database"
    source: file://check_tables.lua
    method: check_tables
    modules: [ http, json, sql ]
    pool:
      size: 1

  - name: status.endpoint
    kind: http.endpoint
    meta:
      comment: "Gets migration status for a specific database"
      router: system:api
    method: GET
    path: /migrations/status
    func: status

  - name: dbs.endpoint
    kind: http.endpoint
    meta:
      comment: "Lists all available target databases for migrations"
      router: system:api
    method: GET
    path: /migrations/databases
    func: dbs

  - name: run.endpoint
    kind: http.endpoint
    meta:
      comment: "Runs all pending migrations for a database"
      router: system:api
    method: POST
    path: /migrations/run
    func: run

  - name: run_single.endpoint
    kind: http.endpoint
    meta:
      comment: "Runs a specific migration by ID"
      router: system:api
    method: POST
    path: /migrations/run-single
    func: run_single

  - name: rollback.endpoint
    kind: http.endpoint
    meta:
      comment: "Rolls back migrations for a database"
      router: system:api
    method: POST
    path: /migrations/rollback
    func: rollback

  - name: check_tables.endpoint
    kind: http.endpoint
    meta:
      comment: "Checks available tables in a database"
      router: system:api
    method: GET
    path: /migrations/check-tables
    func: check_tables