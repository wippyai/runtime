version: "1.0"
namespace: wippy.llm.openai

meta:
  depends_on: [ "ns:wippy.llm" ]
  provider: "openai"

entries:
  - name: client
    kind: library.lua
    meta:
      comment: "OpenAI API client library with error handling and response formatting"
    source: file://client.lua
    modules: [ "http_client", "json", "env" ]
    imports:
      output: "wippy.llm:output"

  - name: text_generation
    kind: function.lua
    meta:
      comment: "OpenAI text generation implementation"
      type: llm_function
      supports: [ "generate" ]
      models: [ "gpt*", "o*" ]
      priority: 100
    source: file://text_generation.lua
    method: handler
    modules: [ "json", "env" ]
    imports:
      output: "wippy.llm:output"
      openai_client: "wippy.llm.openai:client"
    pool:
      max_size: 100

  - name: full_feature
    kind: function.lua
    meta:
      comment: "OpenAI function/tool calling implementation"
      type: llm_function
      supports: [ "generate", "tools", "stream" ]
      models: [ "gpt*", "o*" ]
      priority: 50
    source: file://tool_calling.lua
    method: handler
    modules: [ "json", "env" ]
    imports:
      output: "wippy.llm:output"
      tools: "wippy.llm:tools"
      openai_client: "wippy.llm.openai:client"
    pool:
      max_size: 50

  - name: embeddings
    kind: function.lua
    meta:
      comment: "OpenAI embeddings implementation"
      type: llm_function
      supports: [ "embeddings" ]
      models: [ "text-embedding*", "ada*" ]
      priority: 10
    source: file://embeddings.lua
    method: handler
    modules: [ "json" ]
    imports:
      output: "wippy.llm:output"
      openai_client: "wippy.llm.openai:client"
    pool:
      max_size: 120

  - name: text_generation_test
    kind: function.lua
    meta:
      name: "OpenAI Text Generation Test"
      type: "test"
      tags: [ "llm", "openai", "generation" ]
      group: "OpenAI Library"
      comment: "Tests the OpenAI text generation handler functionality"
    source: file://text_generation_test.lua
    method: run_tests
    modules: [ "json", "env" ]
    imports:
      test: "wippy.test:test"
      prompt: "wippy.llm:prompt"
      output: "wippy.llm:output"
      text_generation: "wippy.llm.openai:text_generation"
      openai_client: "wippy.llm.openai:client"

  - name: embeddings_test
    kind: function.lua
    meta:
      name: "OpenAI Embeddings Test"
      type: "test"
      tags: [ "llm", "openai", "embeddings" ]
      group: "OpenAI Library"
      comment: "Tests the OpenAI embeddings handler functionality"
    source: file://embeddings_test.lua
    method: run_tests
    modules: [ "json", "env" ]
    imports:
      test: "wippy.test:test"
      output: "wippy.llm:output"
      embeddings: "wippy.llm.openai:embeddings"
      openai_client: "wippy.llm.openai:client"