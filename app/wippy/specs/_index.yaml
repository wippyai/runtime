version: "1.0"
namespace: system.specs

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: get_specs
    kind: function.lua
    meta:
      comment: "Returns all available Markdown specs from framework"
    source: file://specs.lua
    method: get_all_specs
    modules: [ http, fs, json ]

  - name: specs.endpoint
    kind: http.endpoint
    meta:
      comment: "Endpoint to get all specs"
      router: system:api
    method: GET
    path: /specs
    func: get_specs