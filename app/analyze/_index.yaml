version: "1.0"
namespace: analyze

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: go
    kind: function.lua
    meta:
      comment: "Analyzing golang files"
    source: file://go.lua
    method: analyze
    modules: [ "fs", "treesitter" ]
    pool:
      size: 1

  - name: markdown
    kind: function.lua
    meta:
      comment: "Analyzing markdown files"
    source: file://markdown.lua
    method: analyze
    modules: [ "fs", "treesitter" ]
    pool:
      size: 1