version: "1.0"
namespace: api

meta:
  depends_on:
    - ns:functions
    - ns:system
  server: system:gateway
  router: system:router

entries:
  - name: system.env
    kind: http.endpoint
    meta:
      comment: "Streams environment variables as JSON"
    method: GET
    path: /env
    handler: functions:system.env

  - name: time.http
    kind: http.endpoint
    meta:
      comment: "Returns current UTC time from worldtimeapi.org"
    method: GET
    path: /time/utc
    handler: functions:time.http

  - name: time.local
    kind: http.endpoint
    meta:
      comment: "Returns the local current time"
    method: GET
    path: /time/local
    handler: functions:time.local

  - name: ai.ollama
    kind: http.endpoint
    meta:
      comment: "Returns the ollama response"
    method: GET
    path: /ollama
    handler: functions:ai.ollama

  - name: time.ticker
    kind: http.endpoint
    meta:
      comment: "Ticks time with events every second"
    method: GET
    path: /ticker
    handler: functions:time.ticker

  - name: demo.websocket
    kind: http.endpoint
    meta:
      comment: "WebSocket demo with Discord bot implementation"
    method: GET
    path: /ws-demo
    handler: functions:demo.websocket

  - name: demo.stream
    kind: http.endpoint
    meta:
      comment: "Demonstrates different streaming formats (text, JSON, SSE)"
    method: GET
    path: /stream
    handler: functions:demo.stream

  - name: demo.pid
    kind: http.endpoint
    meta:
      comment: "Returns current function PID"
    method: GET
    path: /pid
    handler: functions:demo.pid

  - name: demo.message
    kind: http.endpoint
    meta:
      comment: "Sends message to a specified process"
    method: GET
    path: /message
    handler: demos:message.sender