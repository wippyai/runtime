version: "1.0"
namespace: api

meta:
  depends_on:
    - "ns:functions"
    - "ns:system"
  server: "system:gateway"
  router: "system:router"

entries:
  - name: system.env
    kind: http.endpoint
    meta:
      comment: "Streams environment variables as JSON"
    method: GET
    path: /env
    handler: "functions:system.env"

  - name: ai.ollama
    kind: http.endpoint
    meta:
      comment: "Returns the ollama response"
    method: GET
    path: /ollama
    handler: "functions:ai.ollama"

  - name: time.ticker
    kind: http.endpoint
    meta:
      comment: "Ticks time"
    method: GET
    path: /ticker
    handler: "functions:time.ticker"

  - name: time.current
    kind: http.endpoint
    meta:
      comment: "Returns the local current time"
    method: GET
    path: /time
    handler: "functions:time.local"

  - name: demo.websocket
    kind: http.endpoint
    meta:
      comment: "WebSocket demo with echo server"
    method: GET
    path: /ws-demo
    handler: "functions:demo.websocket"