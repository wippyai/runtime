version: "1.0"
namespace: api

meta:
  depends_on:
    - "ns:functions"
    - "ns:system"

entries:
  - name: system.env
    kind: http.endpoint
    meta:
      comment: "Streams environment variables as JSON"
    method: GET
    path: /env
    target: "functions:system.env"
    json_output: true

  - name: ai.ollama
    kind: http.endpoint
    meta:
      comment: "Returns the ollama response"
    method: GET
    path: /ollama
    target: "functions:ai.ollama"

  - name: time.ticker
    kind: http.endpoint
    meta:
      comment: "Ticks time"
    method: GET
    path: /ticker
    target: "functions:time.ticker"
    json_output: true

  - name: time.current
    kind: http.endpoint
    meta:
      comment: "Returns the current time"
    method: GET
    path: /time
    target: "functions:time.current"
    json_output: true

  - name: demo.websocket
    kind: http.endpoint
    meta:
      comment: "WebSocket demo with echo server"
    method: GET
    path: /ws-demo
    target: "functions:demo.websocket"
    json_output: true