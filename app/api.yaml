version: "1.0"
namespace: api

meta:
  depends_on:
    - ns:functions
    - ns:system
  router: system:api

entries:
  - name: system.env
    kind: http.endpoint
    meta:
      comment: "Streams environment variables as JSON"
    method: GET
    path: /env
    func: functions:system.env

  - name: time.http
    kind: http.endpoint
    meta:
      comment: "Returns current UTC time from worldtimeapi.org"
    method: GET
    path: /time/utc
    func: functions:time.http

  - name: time.local
    kind: http.endpoint
    meta:
      comment: "Returns the local current time"
    method: GET
    path: /time/local
    func: functions:time.local

  - name: ai.ollama
    kind: http.endpoint
    meta:
      comment: "Returns the ollama response"
    method: GET
    path: /ollama
    func: functions:ai.ollama

  - name: time.ticker
    kind: http.endpoint
    meta:
      comment: "Ticks time with events every second"
    method: GET
    path: /ticker
    func: functions:time.ticker

  - name: demo.websocket
    kind: http.endpoint
    meta:
      comment: "WebSocket demo with Discord bot implementation"
    method: GET
    path: /ws-demo
    func: functions:demo.websocket

  - name: demo.stream
    kind: http.endpoint
    meta:
      comment: "Demonstrates different streaming formats (text, JSON, SSE)"
    method: GET
    path: /stream
    func: functions:demo.stream

  - name: demo.pid
    kind: http.endpoint
    meta:
      comment: "Returns current function PID"
    method: GET
    path: /pid
    func: functions:demo.pid

  - name: demo.message
    kind: http.endpoint
    meta:
      comment: "Sends message to a specified process"
    method: GET
    path: /message
    func: demos:message.sender

  - name: fs.listdir
    kind: http.endpoint
    meta:
      comment: "Lists contents of the current directory"
    method: GET
    path: /fs/list
    func: functions:fs.listdir

  - name: demo.hello
    kind: http.endpoint
    meta:
      comment: "Returns hello world greeting with optional name parameter"
    method: GET
    path: /hello
    func: functions:demo.hello.http