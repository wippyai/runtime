version: "1.0"
namespace: demos

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: message.service
    kind: process.service
    meta:
      comment: "Message Listener Service"
    process: message.process
    host: system:heap
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3
      depends_on:
        - system:heap

  - name: message.process
    kind: process.lua
    meta:
      comment: "Process that waits for messages"
    source: file://message_process.lua
    method: run
    modules: [ time ]

  - name: message.sender
    kind: function.lua
    meta:
      comment: "HTTP endpoint to send messages to a process"
    source: file://message_sender.lua
    method: handler
    modules: [ http, time ]
    pool:
      size: 2