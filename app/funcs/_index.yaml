version: "1.0"
namespace: functions

entries:
  - name: system.env
    kind: function.lua
    meta:
      comment: "Streams environment variables as JSON with prioritized output of PATH, HOME, USER, and PWD variables first, followed by all remaining env vars"
    source: file://env.lua
    method: envdump
    modules: [ http, json, env ]
    pool:
      size: 2

  - name: demo.hello
    kind: function.lua
    meta:
      comment: "Simple demonstration function that takes two arguments and returns a formatted greeting message as JSON"
    source: file://hello_world.lua
    method: hello_world
    pool:
      size: 2
      workers: 8

  - name: time.http
    kind: function.lua
    meta:
      comment: "Fetches current UTC time from worldtimeapi.org with error handling and JSON response formatting"
    source: file://http_time.lua
    method: get_time
    modules: [ json, http_client, time ]
    pool:
      size: 4
      workers: 16

  - name: time.local
    kind: function.lua
    meta:
      comment: "Returns local system time formatted according to RFC3339 standard as JSON response"
    source: file://local_time.lua
    method: get_time
    modules: [ time ]
    pool:
      size: 4
      workers: 16

  - name: ai.ollama
    kind: function.lua
    meta:
      comment: "Handles Ollama LLM API requests with streaming support, configurable models, and chunked transfer encoding. Supports customizable buffer sizes, timeouts, and API endpoints"
    source: file://ollama.lua
    method: ollama_handler
    modules: [ json, http_client, http, logger ]
    pool:
      size: 4
      workers: 16

  - name: time.ticker
    kind: function.lua
    meta:
      comment: "Implements a 10-minute duration timer that emits JSON events every second with tick count and elapsed time, using coroutines for async operation"
    source: file://ticker.lua
    method: ticker
    modules: [ http, time, json ]
    pool:
      size: 4

  - name: demo.websocket
    kind: function.lua
    meta:
      comment: "Discord bot implementation using WebSocket protocol with automatic reconnection, heartbeat management, and event handling for messages and guild events. Includes comprehensive logging and error handling"
    source: file://ws_client_demo.lua
    method: websocket_demo
    modules: [ http, time, json, websocket, logger, env ]
    pool:
      size: 4