version: "1.0"
namespace: system.security

meta:
  depends_on: [ ns:system ]
  comment: "Security policies configuration"

entries:
  - name: admin_policy
    kind: security.policy
    meta:
      comment: "Global admin access policy"
    groups: [ "global:admin" ]
    policy:
      actions: "*"
      resources: "*"
      effect: "allow"

  - name: user_policy
    kind: security.policy
    meta:
      comment: "Global user access policy"
    groups: [ "global:user" ]
    policy:
      actions: "*"
      resources: "user:*"
      effect: "allow"

  - name: user_api_policy
    kind: security.policy
    meta:
      comment: "Global user access policy"
    groups: [ "global:user" ]
    policy:
      actions: "access"
      resources: "global:api"
      effect: "allow"

  - name: user_demo_policy
    kind: security.policy
    meta:
      comment: "Global user access policy"
    groups: [ "global:user" ]
    policy:
      actions: "access"
      resources: "demo.security:secure.endpoint"
      effect: "allow"

  - name: auth.tokens
    kind: security.token_store
    meta:
      comment: "Authentication token storage"
      depends_on:
        - session
    store: session
    token_length: 32
    token_key: "${ENV_TOKEN_KEY:-secretkey123}"
    default_expiration: 24h

  - name: session
    kind: store.memory
    meta:
      comment: "User session storage"
      depends_on:
        - gateway
    max_size: 5000
    cleanup_interval: 10m
    lifecycle:
      auto_start: true

  - name: memenvstorage
    kind: envstorage.memory
    meta:
      type: envstorage
    groups:
      - app:user

  - name: openai_api_key
    kind: env.variable
    meta:
      type: secret_key
    variable: OPENAI_API_KEY
    default:
    readonly: true # no overwrite from runtime

  - name: openai_api_url
    kind: env.variable
    meta:
      type: secret_key
    variable: OPENAI_API_URL
    default:
    readonly: true # no overwrite from runtime
