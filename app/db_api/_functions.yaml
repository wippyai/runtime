version: "1.0"
namespace: db_functions

meta:
  depends_on:
    - ns:system

entries:
  - name: users.setup
    kind: function.lua
    meta:
      comment: "Creates users table in the database"
    source: file://setup.lua
    method: setup_users_table
    modules: [http, sql, json]
    pool:
      size: 2

  - name: users.add
    kind: function.lua
    meta:
      comment: "Adds a new user to the database"
    source: file://add_user.lua
    method: add_user
    modules: [http, sql, json, time]
    pool:
      size: 2

  - name: users.list
    kind: function.lua
    meta:
      comment: "Lists all users from the database"
    source: file://list_users.lua
    method: list_users
    modules: [http, sql, json]
    pool:
      size: 2