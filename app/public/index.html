<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .theme-transition {
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 theme-transition">
<div class="flex min-h-screen">
    <div class="w-full p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2"/>
                </svg>
                <h1 class="text-xl font-semibold">Chat Interface</h1>
            </div>

            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 theme-transition">
                <!-- Sun icon (shown in dark mode) -->
                <svg id="light-icon" class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 2a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0110 2zm7.646 7.36a.75.75 0 01-.392.393l-1.34.67a.75.75 0 01-.669-1.345l1.34-.67a.75.75 0 011.06.953zm-15.293.393a.75.75 0 01-.392-.393.75.75 0 01.954-1.047l1.337.679a.75.75 0 01-.668 1.344l-1.337-.678zM10 5.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9zM3.75 10a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zm11 0a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zm-3.288 7.894a.75.75 0 01-1.5 0v-1.5a.75.75 0 011.5 0v1.5zm-4.954-3.959a.75.75 0 01-1.06 0l-1.337-1.336a.75.75 0 111.06-1.06l1.337 1.336a.75.75 0 010 1.06zm11.293-1.06a.75.75 0 011.06 1.06l-1.336 1.336a.75.75 0 11-1.06-1.06l1.336-1.336z"></path>
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg id="dark-icon" class="w-5 h-5 block dark:hidden text-gray-700" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                </svg>
            </button>
        </div>

        <!-- Chat Container -->
        <div id="messages" class="bg-white dark:bg-gray-800 theme-transition rounded-lg shadow-sm min-h-[500px] p-4 mb-4 overflow-y-auto space-y-4">
            <!-- Messages will be inserted here -->
            <div class="flex justify-start">
                <div class="max-w-[80%] rounded-lg px-4 py-2 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 theme-transition leading-relaxed">
                    Initializing chat session...
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="relative">
            <input
                    type="text"
                    id="message-input"
                    placeholder="Type your message..."
                    class="w-full p-4 pr-12 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition disabled:opacity-50"
                    disabled
            >
            <button
                    id="send-message"
                    class="absolute right-4 top-1/2 -translate-y-1/2 bg-black dark:bg-gray-600 text-white p-2 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed theme-transition"
                    disabled
            >
                <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
                </svg>
            </button>
        </div>

        <div id="session-controls" class="mt-4">
            <button id="start-session" class="bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700 text-white px-4 py-2 rounded-lg theme-transition">
                Start New Chat
            </button>
        </div>
    </div>
</div>

<script>
    let currentSession = null;

    // Theme management
    const themeToggle = document.getElementById('theme-toggle');

    // Check for saved theme preference or use system preference
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }

    // Theme toggle button handler
    themeToggle.addEventListener('click', () => {
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    });

    function createMessageElement(text, isUser) {
        const div = document.createElement('div');
        div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

        const message = document.createElement('div');
        message.className = `max-w-[80%] rounded-lg px-4 py-2 theme-transition ${
            isUser
                ? 'bg-blue-500 text-white'
                : 'bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200'
        } leading-relaxed`;
        message.textContent = text;

        div.appendChild(message);
        return div;
    }

    async function startSession() {
        try {
            document.getElementById('start-session').disabled = true;

            const response = await fetch('/api/v1/chat/session', {
                method: 'POST'
            });

            if (!response.ok) {
                throw new Error(`Failed to start session: ${response.status}`);
            }

            const data = await response.json();
            currentSession = data.session;

            document.getElementById('message-input').disabled = false;
            document.getElementById('send-message').disabled = false;

            const messages = document.getElementById('messages');
            messages.innerHTML = ''; // Clear the loading message
            const systemMsg = createMessageElement('Chat session started. You can now send messages.', false);
            messages.appendChild(systemMsg);
        } catch (error) {
            console.error('Failed to start session:', error);
            const messages = document.getElementById('messages');
            messages.innerHTML = ''; // Clear the loading message
            const errorMsg = createMessageElement(`Error: ${error.message}. Please try again.`, false);
            messages.appendChild(errorMsg);

            document.getElementById('start-session').disabled = false;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();

        if (!text || !currentSession) return;

        const messages = document.getElementById('messages');
        messages.appendChild(createMessageElement(text, true));

        // Disable input while waiting for response
        input.disabled = true;
        document.getElementById('send-message').disabled = true;

        input.value = '';

        try {
            const response = await fetch(`/api/v1/chat/message?session=${encodeURIComponent(currentSession)}&message=${encodeURIComponent(text)}`, {
                method: 'POST'
            });

            if (!response.ok) {
                throw new Error(`Server responded with ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let assistantMessage = '';
            let messagePlaceholder = null;

            while (true) {
                const {value, done} = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (!line.trim()) continue;

                    try {
                        const data = JSON.parse(line);
                        if (data.text) {
                            assistantMessage += data.text;  // Accumulate instead of replace

                            if (!messagePlaceholder) {
                                messagePlaceholder = createMessageElement(assistantMessage, false);
                                messages.appendChild(messagePlaceholder);
                            } else {
                                messagePlaceholder.querySelector('div').textContent = assistantMessage;
                            }

                            messages.scrollTop = messages.scrollHeight;
                        }
                    } catch (e) {
                        console.error('Failed to parse chunk:', e);
                    }
                }
            }

            // Re-enable input after response is complete
            input.disabled = false;
            document.getElementById('send-message').disabled = false;
            input.focus();

        } catch (error) {
            console.error('Failed to send message:', error);
            messages.appendChild(createMessageElement(`Error: ${error.message}. Please try again.`, false));

            // Re-enable input on error
            input.disabled = false;
            document.getElementById('send-message').disabled = false;
        }
    }

    // Start session automatically when page loads
    document.addEventListener('DOMContentLoaded', startSession);

    // Manual session start button
    document.getElementById('start-session').addEventListener('click', startSession);

    // send message button
    document.getElementById('send-message').addEventListener('click', sendMessage);

    // send on Enter key
    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body>
</html>
