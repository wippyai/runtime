<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
<div class="flex min-h-screen">
    <div class="w-full p-6">
        <div class="flex items-center gap-2 mb-6">
            <svg class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2"/>
            </svg>
            <h1 class="text-xl font-semibold">Chat Interface</h1>
        </div>

        <!-- Chat Container -->
        <div id="messages" class="bg-white rounded-lg shadow-sm min-h-[500px] p-4 mb-4 overflow-y-auto space-y-4">
            <!-- Messages will be inserted here -->
        </div>

        <!-- Input Area -->
        <div class="relative">
            <input
                    type="text"
                    id="message-input"
                    placeholder="Type your message..."
                    class="w-full p-4 pr-12 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500"
                    disabled
            >
            <button
                    id="send-message"
                    class="absolute right-4 top-1/2 -translate-y-1/2 bg-black text-white p-2 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled
            >
                <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
                </svg>
            </button>
        </div>

        <div id="session-controls" class="mt-4">
            <button id="start-session" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                Start New Chat
            </button>
        </div>
    </div>
</div>

<script>
    let currentSession = null;

    function createMessageElement(text, isUser) {
        const div = document.createElement('div');
        div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

        const message = document.createElement('div');
        message.className = `max-w-[80%] rounded-lg px-4 py-2 ${
            isUser ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-800'
        } leading-relaxed`;
        message.textContent = text;

        div.appendChild(message);
        return div;
    }

    document.getElementById('start-session').addEventListener('click', async () => {
        try {
            const response = await fetch('/api/v1/chat/session/start');
            const data = await response.json();
            currentSession = data.session;

            document.getElementById('message-input').disabled = false;
            document.getElementById('send-message').disabled = false;
            document.getElementById('start-session').disabled = true;

            const messages = document.getElementById('messages');
            const systemMsg = createMessageElement('Chat session started. You can now send messages.', false);
            messages.appendChild(systemMsg);
        } catch (error) {
            console.error('Failed to start session:', error);
        }
    });

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();

        if (!text || !currentSession) return;

        const messages = document.getElementById('messages');
        messages.appendChild(createMessageElement(text, true));

        input.value = '';

        try {
            const response = await fetch(`/api/v1/chat/session/send?session=${currentSession}&message=${encodeURIComponent(text)}`, {
                method: 'POST'
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let assistantMessage = '';
            let messagePlaceholder = null;

            while (true) {
                const {value, done} = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (!line.trim()) continue;

                    try {
                        const data = JSON.parse(line);
                        if (data.text) {
                            assistantMessage += data.text;  // Accumulate instead of replace

                            if (!messagePlaceholder) {
                                messagePlaceholder = createMessageElement(assistantMessage, false);
                                messages.appendChild(messagePlaceholder);
                            } else {
                                messagePlaceholder.querySelector('div').textContent = assistantMessage;
                            }

                            messages.scrollTop = messages.scrollHeight;
                        }
                    } catch (e) {
                        console.error('Failed to parse chunk:', e);
                    }
                }
            }
        } catch (error) {
            console.error('Failed to send message:', error);
        }
    }

    document.getElementById('send-message').addEventListener('click', sendMessage);

    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body>
</html>
