<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
<div class="flex min-h-screen">
    <!-- Left Panel -->
    <div class="w-2/3 p-6 border-r border-gray-200">
        <div class="flex items-center gap-2 mb-6">
            <svg class="w-6 h-6 text-blue-600" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2"/>
            </svg>
            <h1 class="text-xl font-semibold">Assembly Builder</h1>
        </div>

        <!-- Chat Container -->
        <div class="bg-white rounded-lg shadow-sm min-h-[500px] p-4 mb-4">
            <!-- Message -->
            <div class="mb-4">
                <p class="text-gray-800 leading-relaxed">
                    Hi, I'm your Assembly AI assistant. I'll help you configure the perfect assembly! Are you building for general purpose, or do you have specific requirements?
                </p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="relative">
            <input type="text"
                   placeholder="Type your message..."
                   class="w-full p-4 pr-12 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500"
            >
            <button class="absolute right-4 top-1/2 -translate-y-1/2 bg-black text-white p-2 rounded-lg">
                <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="w-1/3 p-6">
        <div class="flex items-center gap-2 mb-6">
            <svg class="w-6 h-6 text-indigo-600" viewBox="0 0 24 24" fill="none">
                <path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z" stroke="currentColor" stroke-width="2"/>
            </svg>
            <h2 class="text-xl font-semibold">Assembly Preview</h2>
        </div>

        <div class="bg-white rounded-lg shadow-sm min-h-[500px] p-4">
            <p class="text-gray-500 text-center mt-40">
                Your assembly preview will appear here as we discuss your requirements.
            </p>
        </div>
    </div>
</div>
</body>
</html>
