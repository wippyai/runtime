<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Pull Game</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            text-align: center;
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #gameCanvas {
            background-color: #1a1a2e;
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            touch-action: none; /* Prevent touch scrolling */
        }

        #gameUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2;
            padding: 20px;
            pointer-events: none; /* Allow clicks to pass through to canvas */
        }

        #gameUI > * {
            pointer-events: auto; /* Re-enable pointer events for UI elements */
        }

        #status {
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .connected {
            background-color: #d4edda;
            color: #155724;
        }

        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
        }

        .connecting {
            background-color: #fff3cd;
            color: #856404;
        }

        #controls button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
        }

        #controls button:disabled {
            background-color: #6c757d;
            border-color: #6c757d;
            cursor: not-allowed;
        }

        #statsPanel {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="gameUI">
    <h1>Blob Pull Game</h1>
    <div id="status" class="disconnected">Disconnected</div>

    <div id="controls">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
    </div>

    <div id="statsPanel">
        <div id="players">Players: 0</div>
        <div id="forceStats">Your Force: (0, 0)</div>
        <div id="positionStats">Blob Position: (0, 0)</div>
    </div>

    <div id="instructions">
        <p>Click and drag to pull the blob. The more people pull in one direction, the faster it moves!</p>
    </div>
</div>

<script>
    // Game state
    const state = {
        connected: false,
        canvas: null,
        ctx: null,
        socket: null,
        reconnectTimer: null,
        reconnectAttempts: 0,
        maxReconnectAttempts: 5,

        // Blob properties
        blobPosition: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
        blobRadius: 40,
        blobColor: '#4facfe',

        // Blob animation properties
        blobParticles: [],
        particleCount: 20,
        wobbleAmount: 15,
        wobbleSpeed: 0.04,
        wobbleOffset: 0,

        // Input state
        mouseDown: false,
        mousePosition: { x: 0, y: 0 },
        pullForce: { x: 0, y: 0 },

        // Game settings
        forceMultiplier: 0.15,
        updateInterval: 100, // ms between force updates
        lastUpdateTime: 0,
        playerCount: 0,
        particleSpeedFactor: 1.0
    };

    // DOM Elements
    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const playersEl = document.getElementById('players');
    const forceStatsEl = document.getElementById('forceStats');
    const positionStatsEl = document.getElementById('positionStats');

    // Initialize canvas
    function initCanvas() {
        state.canvas = document.getElementById('gameCanvas');
        state.ctx = state.canvas.getContext('2d');

        // Set canvas to full window size
        resizeCanvas();

        // Initialize blob particles
        initBlobParticles();

        // Add event listeners for mouse/touch
        state.canvas.addEventListener('mousedown', handleMouseDown);
        state.canvas.addEventListener('mousemove', handleMouseMove);
        state.canvas.addEventListener('mouseup', handleMouseUp);
        state.canvas.addEventListener('mouseleave', handleMouseUp);

        // Touch events
        state.canvas.addEventListener('touchstart', handleTouchStart);
        state.canvas.addEventListener('touchmove', handleTouchMove);
        state.canvas.addEventListener('touchend', handleTouchEnd);

        // Window resize event
        window.addEventListener('resize', resizeCanvas);

        // Serve render loop
        requestAnimationFrame(render);
    }

    // Resize canvas to fill window
    function resizeCanvas() {
        state.canvas.width = window.innerWidth;
        state.canvas.height = window.innerHeight;

        // Update blob position to center if it hasn't been initialized by the server
        if (state.blobPosition.x === window.innerWidth / 2 && state.blobPosition.y === window.innerHeight / 2) {
            state.blobPosition = {
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            };
        }

        // Send updated canvas dimensions to server if connected
        if (state.connected) {
            sendCanvasDimensions();
        }
    }

    // Initialize blob particles for liquid effect
    function initBlobParticles() {
        state.blobParticles = [];
        for (let i = 0; i < state.particleCount; i++) {
            const angle = (i / state.particleCount) * Math.PI * 2;
            state.blobParticles.push({
                angle: angle,
                distance: state.blobRadius,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: state.wobbleSpeed * (0.8 + Math.random() * 0.4),
                size: state.blobRadius * (0.2 + Math.random() * 0.3)
            });
        }
    }

    // Render function
    function render() {
        // Clear canvas
        state.ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);

        // Update wobble offset
        state.wobbleOffset += 0.05;

        // Create gradient background
        const gradient = state.ctx.createRadialGradient(
            state.blobPosition.x, state.blobPosition.y, 0,
            state.blobPosition.x, state.blobPosition.y, state.canvas.height / 2
        );
        gradient.addColorStop(0, '#16213E');
        gradient.addColorStop(1, '#0F3460');

        state.ctx.fillStyle = gradient;
        state.ctx.fillRect(0, 0, state.canvas.width, state.canvas.height);

        // Draw glow effect
        state.ctx.beginPath();
        state.ctx.arc(
            state.blobPosition.x,
            state.blobPosition.y,
            state.blobRadius * 1.5,
            0,
            Math.PI * 2
        );
        const glowGradient = state.ctx.createRadialGradient(
            state.blobPosition.x, state.blobPosition.y, state.blobRadius * 0.5,
            state.blobPosition.x, state.blobPosition.y, state.blobRadius * 1.5
        );
        glowGradient.addColorStop(0, 'rgba(79, 172, 254, 0.4)');
        glowGradient.addColorStop(1, 'rgba(79, 172, 254, 0)');
        state.ctx.fillStyle = glowGradient;
        state.ctx.fill();

        // Draw liquid blob with particles
        state.ctx.save();
        state.ctx.translate(state.blobPosition.x, state.blobPosition.y);

        // Draw main blob body
        const blobGradient = state.ctx.createRadialGradient(0, 0, 0, 0, 0, state.blobRadius);
        blobGradient.addColorStop(0, '#4facfe');
        blobGradient.addColorStop(1, '#00f2fe');

        // Draw blob path with bezier curves for liquid effect
        state.ctx.beginPath();

        // Update particle positions
        for (let i = 0; i < state.blobParticles.length; i++) {
            const particle = state.blobParticles[i];

            // Calculate current wobble
            particle.wobble += particle.wobbleSpeed;

            // Calculate wobble effect based on pull force magnitude
            const forceMagnitude = Math.sqrt(
                state.pullForce.x * state.pullForce.x +
                state.pullForce.y * state.pullForce.y
            );

            const wobbleEffect = state.wobbleAmount * 0;//(1 + forceMagnitude / 10);

            // Calculate particle position with wobble
            const wobbleDistance = particle.distance +
                Math.sin(particle.wobble + state.wobbleOffset) * wobbleEffect;

            const x = Math.cos(particle.angle) * wobbleDistance;
            const y = Math.sin(particle.angle) * wobbleDistance;

            // Draw blob outline using bezier curves
            if (i === 0) {
                state.ctx.moveTo(x, y);
            }

            // Connect the last point to the first point
            if (i === state.blobParticles.length - 1) {
                const firstParticle = state.blobParticles[0];
                const firstX = Math.cos(firstParticle.angle) *
                    (firstParticle.distance + Math.sin(firstParticle.wobble + state.wobbleOffset) * wobbleEffect);
                const firstY = Math.sin(firstParticle.angle) *
                    (firstParticle.distance + Math.sin(firstParticle.wobble + state.wobbleOffset) * wobbleEffect);

                const cp1x = x + (firstX - x) * 0.5 - (firstY - y) * 0.2;
                const cp1y = y + (firstY - y) * 0.5 + (firstX - x) * 0.2;
                const cp2x = firstX - (firstX - x) * 0.5 - (firstY - y) * 0.2;
                const cp2y = firstY - (firstY - y) * 0.5 + (firstX - x) * 0.2;

                state.ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, firstX, firstY);
            }
        }

        state.ctx.closePath();
        state.ctx.fillStyle = blobGradient;
        state.ctx.globalAlpha = 0.9;
        state.ctx.fill();

        // Add inner highlight
        state.ctx.beginPath();
        state.ctx.arc(
            -state.blobRadius * 0.2,
            -state.blobRadius * 0.2,
            state.blobRadius * 0.5,
            0,
            Math.PI * 2
        );
        state.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        state.ctx.fill();

        state.ctx.restore();

        // Draw pull force line if active
        if (state.mouseDown) {
            state.ctx.beginPath();
            state.ctx.moveTo(state.blobPosition.x, state.blobPosition.y);
            state.ctx.lineTo(state.mousePosition.x, state.mousePosition.y);

            // Create gradient for line
            const lineGradient = state.ctx.createLinearGradient(
                state.blobPosition.x, state.blobPosition.y,
                state.mousePosition.x, state.mousePosition.y
            );
            lineGradient.addColorStop(0, 'rgba(0, 242, 254, 0.8)');
            lineGradient.addColorStop(1, 'rgba(255, 0, 89, 0.8)');

            state.ctx.strokeStyle = lineGradient;
            state.ctx.lineWidth = 3;
            state.ctx.lineCap = 'round';
            state.ctx.setLineDash([5, 10]);
            state.ctx.stroke();
            state.ctx.setLineDash([]); // Reset line dash

            // Draw direction arrow
            const dx = state.mousePosition.x - state.blobPosition.x;
            const dy = state.mousePosition.y - state.blobPosition.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 0) {
                const arrowLength = Math.min(distance * 0.2, 20);
                const arrowWidth = arrowLength * 0.5;

                const angle = Math.atan2(dy, dx);
                const midX = state.blobPosition.x + dx * 0.5;
                const midY = state.blobPosition.y + dy * 0.5;

                state.ctx.beginPath();
                state.ctx.moveTo(
                    midX - arrowLength * Math.cos(angle) - arrowWidth * Math.sin(angle),
                    midY - arrowLength * Math.sin(angle) + arrowWidth * Math.cos(angle)
                );
                state.ctx.lineTo(midX, midY);
                state.ctx.lineTo(
                    midX - arrowLength * Math.cos(angle) + arrowWidth * Math.sin(angle),
                    midY - arrowLength * Math.sin(angle) - arrowWidth * Math.cos(angle)
                );

                state.ctx.fillStyle = 'rgba(255, 0, 89, 0.8)';
                state.ctx.fill();
            }
        }

        // Update stats display
        positionStatsEl.textContent = `Blob Position: (${Math.round(state.blobPosition.x)}, ${Math.round(state.blobPosition.y)})`;
        forceStatsEl.textContent = `Your Force: (${state.pullForce.x.toFixed(2)}, ${state.pullForce.y.toFixed(2)})`;

        // Send force update if needed and connected
        const now = Date.now();
        if (state.connected && state.mouseDown && now - state.lastUpdateTime >= state.updateInterval) {
            sendForceUpdate();
            state.lastUpdateTime = now;
        }

        // Continue render loop
        requestAnimationFrame(render);
    }

    // Mouse/Touch event handlers
    function handleMouseDown(e) {
        state.mouseDown = true;
        updateMousePosition(e);
        calculateForce();
    }

    function handleMouseMove(e) {
        if (state.mouseDown) {
            updateMousePosition(e);
            calculateForce();
        }
    }

    function handleMouseUp(e) {
        state.mouseDown = false;
        state.pullForce = { x: 0, y: 0 };
        // Send one last update with zero force
        if (state.connected) {
            sendForceUpdate();
        }
    }

    function handleTouchStart(e) {
        e.preventDefault();
        state.mouseDown = true;
        updateTouchPosition(e);
        calculateForce();
    }

    function handleTouchMove(e) {
        e.preventDefault();
        if (state.mouseDown) {
            updateTouchPosition(e);
            calculateForce();
        }
    }

    function handleTouchEnd(e) {
        e.preventDefault();
        state.mouseDown = false;
        state.pullForce = { x: 0, y: 0 };
        // Send one last update with zero force
        if (state.connected) {
            sendForceUpdate();
        }
    }

    function updateMousePosition(e) {
        const rect = state.canvas.getBoundingClientRect();
        state.mousePosition = {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    function updateTouchPosition(e) {
        if (e.touches.length > 0) {
            const rect = state.canvas.getBoundingClientRect();
            state.mousePosition = {
                x: e.touches[0].clientX - rect.left,
                y: e.touches[0].clientY - rect.top
            };
        }
    }

    function calculateForce() {
        // Calculate direction vector from blob to mouse
        const dx = state.mousePosition.x - state.blobPosition.x;
        const dy = state.mousePosition.y - state.blobPosition.y;

        // Calculate distance
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 0) {
            // Normalize and apply force multiplier
            state.pullForce = {
                x: (dx / distance) * state.forceMultiplier * distance,
                y: (dy / distance) * state.forceMultiplier * distance
            };
        } else {
            state.pullForce = { x: 0, y: 0 };
        }
    }

    // WebSocket functions
    function connect() {
        updateStatus('connecting', 'Connecting...');

        // Get the current protocol (ws or wss)
        const protocol = window.location.protocol.startsWith('https') ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/api/v1/ws/connect`;

        // Create WebSocket connection
        state.socket = new WebSocket(wsUrl);

        // Connection opened
        state.socket.addEventListener('open', (event) => {
            state.connected = true;
            updateStatus('connected', 'Connected');
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            state.reconnectAttempts = 0;
            console.log('Connected to WebSocket server');

            // Send canvas dimensions to server
            sendCanvasDimensions();
        });

        // Listen for messages
        state.socket.addEventListener('message', (event) => {
            try {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            } catch (e) {
                console.error('Error parsing message:', e);
            }
        });

        // Connection closed
        state.socket.addEventListener('close', (event) => {
            state.connected = false;
            updateStatus('disconnected', 'Disconnected');
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            console.log(`Connection closed. Code: ${event.code}`);

            // Try to reconnect automatically if not a normal closure
            if (event.code !== 1000 && state.reconnectAttempts < state.maxReconnectAttempts) {
                state.reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, state.reconnectAttempts - 1), 10000);

                console.log(`Reconnecting in ${delay/1000} seconds...`);

                state.reconnectTimer = setTimeout(() => {
                    if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
                        connect();
                    }
                }, delay);
            }
        });

        // Connection error
        state.socket.addEventListener('error', (event) => {
            updateStatus('disconnected', 'Connection Error');
            console.error('WebSocket connection error');
        });
    }

    function disconnect() {
        if (state.reconnectTimer) {
            clearTimeout(state.reconnectTimer);
            state.reconnectTimer = null;
        }

        if (state.socket) {
            state.socket.close(1000, "User disconnected");
        }
    }

    function sendForceUpdate() {
        if (state.socket && state.socket.readyState === WebSocket.OPEN) {
            const message = {
                type: 'force',
                x: state.pullForce.x,
                y: state.pullForce.y
            };
            state.socket.send(JSON.stringify(message));
        }
    }

    function sendCanvasDimensions() {
        if (state.socket && state.socket.readyState === WebSocket.OPEN) {
            const message = {
                type: 'canvas_info',
                width: state.canvas.width,
                height: state.canvas.height
            };
            state.socket.send(JSON.stringify(message));
        }
    }

    function handleServerMessage(data) {
        if (data.type === 'update') {
            // Update blob position from server
            if (data.position) {
                state.blobPosition = data.position;
            }

            // Update player count
            if (data.clients !== undefined) {
                state.playerCount = data.clients;
                playersEl.textContent = `Players: ${state.playerCount}`;
            }
        } else if (data.type === 'welcome') {
            console.log('Welcome message:', data.message);

            // Initialize blob position if provided
            if (data.position) {
                state.blobPosition = data.position;
            }

            // Update player count
            if (data.clients !== undefined) {
                state.playerCount = data.clients;
                playersEl.textContent = `Players: ${state.playerCount}`;
            }
        }
    }

    // Helper functions
    function updateStatus(state, text) {
        statusEl.className = state;
        statusEl.textContent = text;
    }

    // Initialize
    function init() {
        initCanvas();

        // Set up button event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
    }

    // Serve the game when page loads
    window.addEventListener('load', init);
</script>
</body>
</html>
