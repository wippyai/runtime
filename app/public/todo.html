<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <!-- Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s;
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app" v-cloak class="container mx-auto p-4 max-w-4xl">
    <header class="mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Todo App</h1>
        <p class="text-gray-600">Manage your tasks easily</p>
    </header>

    <!-- Add Todo Form -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-6">
        <h2 class="text-xl font-semibold mb-4">Add New Task</h2>
        <form @submit.prevent="addTodo" class="space-y-4">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
                <input type="text" id="title" v-model="newTodo.title"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border"
                       placeholder="What needs to be done?">
            </div>
            <div>
                <label for="note" class="block text-sm font-medium text-gray-700">Note (optional)</label>
                <textarea id="note" v-model="newTodo.note"
                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border"
                          placeholder="Any additional details?"></textarea>
            </div>
            <div class="flex justify-end">
                <button type="submit"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded transition-colors">
                    Add Task
                </button>
            </div>
        </form>
    </div>

    <!-- Loading indicator -->
    <div v-if="loading" class="flex justify-center my-8">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
    </div>

    <!-- Error message -->
    <div v-if="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6" role="alert">
        <strong class="font-bold">Error!</strong>
        <span class="block sm:inline">{{ error }}</span>
    </div>

    <!-- Todo List -->
    <div v-if="!loading && todos.length > 0" class="bg-white rounded-lg shadow-md">
        <h2 class="text-xl font-semibold p-6 border-b">Your Tasks</h2>
        <ul class="divide-y divide-gray-200">
            <li v-for="todo in todos" :key="todo.id" class="p-4 hover:bg-gray-50 transition-colors">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center">
                            <h3 class="text-lg font-medium text-gray-800">{{ todo.title }}</h3>
                            <span class="ml-3 text-xs text-gray-500">
                                    Added {{ formatDate(todo.created_at) }}
                                </span>
                        </div>
                        <p v-if="todo.note" class="text-gray-600 mt-1">{{ todo.note }}</p>
                    </div>
                    <div class="flex space-x-2">
                        <button @click="editTodo(todo)"
                                class="text-blue-500 hover:text-blue-700">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                        </button>
                        <button @click="deleteTodo(todo.id)"
                                class="text-red-500 hover:text-red-700">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            </li>
        </ul>
    </div>

    <!-- Empty state -->
    <div v-if="!loading && todos.length === 0" class="bg-white p-8 rounded-lg shadow-md text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        <h3 class="text-lg font-medium text-gray-900">No tasks yet</h3>
        <p class="text-gray-500 mt-1">Get started by adding a new task above.</p>
    </div>

    <!-- Edit Modal -->
    <div v-if="showEditModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="p-6 border-b border-gray-200">
                <h3 class="text-lg font-semibold">Edit Task</h3>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label for="edit-title" class="block text-sm font-medium text-gray-700">Title</label>
                    <input type="text" id="edit-title" v-model="editingTodo.title"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>
                <div>
                    <label for="edit-note" class="block text-sm font-medium text-gray-700">Note (optional)</label>
                    <textarea id="edit-note" v-model="editingTodo.note"
                              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-gray-200 flex justify-end space-x-3">
                <button @click="cancelEdit"
                        class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded transition-colors">
                    Cancel
                </button>
                <button @click="updateTodo"
                        class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded transition-colors">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    const app = createApp({
        setup() {
            const todos = ref([]);
            const loading = ref(false);
            const error = ref('');
            const newTodo = ref({ title: '', note: '' });
            const editingTodo = ref({ id: null, title: '', note: '' });
            const showEditModal = ref(false);

            // API URL prefix
            const API_URL = '/api/v1/todos';

            // Function to format Unix timestamp to readable date
            const formatDate = (timestamp) => {
                const date = new Date(timestamp * 1000);
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
            };

            // Load todos on mount
            onMounted(() => {
                fetchTodos();
            });

            // Fetch all todos
            const fetchTodos = async () => {
                loading.value = true;
                error.value = '';

                try {
                    const response = await fetch(API_URL);
                    if (!response.ok) {
                        throw new Error(`Server responded with status: ${response.status}`);
                    }

                    const data = await response.json();
                    todos.value = data.todos || [];
                } catch (err) {
                    error.value = `Failed to load todos: ${err.message}`;
                    console.error('Error fetching todos:', err);
                } finally {
                    loading.value = false;
                }
            };

            // Add a new todo
            const addTodo = async () => {
                if (!newTodo.value.title) {
                    error.value = 'Title is required';
                    return;
                }

                loading.value = true;
                error.value = '';

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(newTodo.value)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || `Server responded with status: ${response.status}`);
                    }

                    // Reset form
                    newTodo.value.title = '';
                    newTodo.value.note = '';

                    // Refresh todos
                    await fetchTodos();
                } catch (err) {
                    error.value = `Failed to add todo: ${err.message}`;
                    console.error('Error adding todo:', err);
                } finally {
                    loading.value = false;
                }
            };

            // Delete a todo
            const deleteTodo = async (id) => {
                if (!confirm('Are you sure you want to delete this task?')) {
                    return;
                }

                loading.value = true;
                error.value = '';

                try {
                    const response = await fetch(`${API_URL}/delete?id=${id}`, {
                        method: 'DELETE'
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || `Server responded with status: ${response.status}`);
                    }

                    // Remove from local state
                    todos.value = todos.value.filter(todo => todo.id !== id);
                } catch (err) {
                    error.value = `Failed to delete todo: ${err.message}`;
                    console.error('Error deleting todo:', err);
                } finally {
                    loading.value = false;
                }
            };

            // Open edit modal
            const editTodo = (todo) => {
                editingTodo.value = { ...todo };
                showEditModal.value = true;
            };

            // Cancel edit
            const cancelEdit = () => {
                showEditModal.value = false;
                editingTodo.value = { id: null, title: '', note: '' };
            };

            // Update a todo
            const updateTodo = async () => {
                if (!editingTodo.value.title) {
                    error.value = 'Title is required';
                    return;
                }

                loading.value = true;
                error.value = '';
                showEditModal.value = false;

                try {
                    const response = await fetch(`${API_URL}/update?id=${editingTodo.value.id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            title: editingTodo.value.title,
                            note: editingTodo.value.note
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error || `Server responded with status: ${response.status}`);
                    }

                    // Update in local state
                    const index = todos.value.findIndex(t => t.id === editingTodo.value.id);
                    if (index !== -1) {
                        todos.value[index] = { ...editingTodo.value };
                    }
                } catch (err) {
                    error.value = `Failed to update todo: ${err.message}`;
                    console.error('Error updating todo:', err);
                } finally {
                    loading.value = false;
                }
            };

            return {
                todos,
                loading,
                error,
                newTodo,
                editingTodo,
                showEditModal,
                formatDate,
                fetchTodos,
                addTodo,
                deleteTodo,
                editTodo,
                cancelEdit,
                updateTodo
            };
        }
    });

    app.mount('#app');
</script>
</body>
</html>
