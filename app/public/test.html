<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dashboard</title>

    <!-- Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Existing CSS -->
    <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>
<div id="app" class="container mx-auto p-4 max-w-6xl">
    <!-- App content will be rendered here -->
</div>

<!-- Vue Templates -->
<!-- Test Case Component -->
<script type="text/x-template" id="test-case-template">
    <div :class="['test-item p-3', getStatusClass()]">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span v-html="getStatusIcon()"></span>
                <span>{{ test.name }}</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-tertiary" v-if="test.duration">{{ test.duration.toFixed(3) }}s</span>
                <button class="view-log-btn p-1 text-tertiary hover:text-secondary"
                        v-if="test.error || test.status === 'error'"
                        @click.stop="$emit('view-details', test)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2h-1V9a1 1 0 00-1-1z"
                              clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="mt-2 p-2 bg-danger-light text-danger rounded text-sm" v-if="test.error">
            <pre class="error-pre">{{ test.error }}</pre>
        </div>
    </div>
</script>

<!-- Test Suite Component -->
<script type="text/x-template" id="test-suite-template">
    <div class="border-b last:border-b-0">
        <!-- Suite Header -->
        <div :class="['p-3 cursor-pointer', getSuiteHeaderClass()]" @click="toggleExpanded">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon transition-transform"
                         :class="{'rotate-180': expanded}" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                              clip-rule="evenodd"/>
                    </svg>
                    <h3 class="font-medium">{{ suite.name }}</h3>
                </div>
                <div class="flex gap-3">
                    <div class="test-summary-badge">
                        <div class="test-summary-dot test-summary-dot-passed"></div>
                        <span>{{ suite.passed }}</span>
                    </div>
                    <div class="test-summary-badge">
                        <div class="test-summary-dot test-summary-dot-failed"></div>
                        <span>{{ suite.failed }}</span>
                    </div>
                    <div class="test-summary-badge">
                        <div class="test-summary-dot test-summary-dot-skipped"></div>
                        <span>{{ suite.skipped }}</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Suite Tests -->
        <div v-show="expanded" class="divide-y">
            <test-case
                    v-for="test in suite.tests"
                    :key="test.name"
                    :test="test"
                    @view-details="$emit('view-details', { suite: suite.name, test: test })">
            </test-case>
        </div>
    </div>
</script>

<!-- Test Operation Component -->
<script type="text/x-template" id="test-operation-template">
    <div class="panel mb-4 overflow-hidden">
        <!-- Operation Header -->
        <div :class="['panel-header cursor-pointer', getHeaderClass()]" @click="toggleExpanded">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon transition-transform"
                     :class="{'rotate-180': expanded}" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                          d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                          clip-rule="evenodd"/>
                </svg>
                <div class="flex items-center gap-2">
                    <div :class="getStatusDotClass()"></div>
                    <h2 class="font-semibold">{{ operation.name }}</h2>
                </div>
            </div>
            <div class="flex gap-3 items-center">
                <div class="test-summary-badge">
                    <div class="test-summary-dot test-summary-dot-passed"></div>
                    <span>{{ operation.passed }}</span>
                </div>
                <div class="test-summary-badge">
                    <div class="test-summary-dot test-summary-dot-failed"></div>
                    <span>{{ operation.failed }}</span>
                </div>
                <div class="test-summary-badge">
                    <div class="test-summary-dot test-summary-dot-skipped"></div>
                    <span>{{ operation.skipped }}</span>
                </div>
                <span class="text-xs text-tertiary"
                      v-if="operation.duration">{{ operation.duration.toFixed(2) }}s</span>
            </div>
        </div>

        <!-- Operation Suites -->
        <div v-show="expanded">
            <!-- No suites message -->
            <div class="p-4 text-center text-tertiary" v-if="sortedSuites.length === 0">
                <span>{{ operation.status === 'running' ? 'Initializing test suites...' : 'No test suites found' }}</span>
            </div>

            <!-- Suites -->
            <test-suite
                    v-for="suite in sortedSuites"
                    :key="suite.name"
                    :suite="suite"
                    @view-test-details="details => $emit('view-test-details', { opId: operation.id, ...details })">
            </test-suite>
        </div>
    </div>
</script>

<!-- Main App Template -->
<script type="text/x-template" id="app-template">
    <header class="mb-6">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">Test Dashboard</h1>
            <div class="flex gap-2">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" @click="toggleTheme">
                    <svg v-if="darkMode" xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20"
                         fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                              clip-rule="evenodd"/>
                    </svg>
                    <svg v-else xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>
                <button id="run-tests-btn" class="btn btn-primary" @click="runTests">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                              clip-rule="evenodd"/>
                    </svg>
                    Run Tests
                </button>
            </div>
        </div>
        <div id="status-bar" class="status-bar">
            <div class="status-bar-items">
                <div class="status-bar-item">
                    <div :class="statusDotClass"></div>
                    <span>{{ statusMessage }}</span>
                </div>
                <div class="status-bar-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
                              clip-rule="evenodd"/>
                    </svg>
                    <span>Duration: {{ formattedDuration }}</span>
                </div>
                <div class="status-bar-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                              clip-rule="evenodd"/>
                    </svg>
                    <span>Passed: {{ stats.passed }}</span>
                </div>
                <div class="status-bar-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                              clip-rule="evenodd"/>
                    </svg>
                    <span>Failed: {{ stats.failed }}</span>
                </div>
                <div class="status-bar-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z"
                              clip-rule="evenodd"/>
                    </svg>
                    <span>Skipped: {{ stats.skipped }}</span>
                </div>
                <div class="status-bar-item">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                        <path fill-rule="evenodd"
                              d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z"
                              clip-rule="evenodd"/>
                    </svg>
                    <span>Total: {{ stats.total }}</span>
                </div>
            </div>
        </div>

        <!-- Global error banner -->
        <div id="global-error-banner" class="error-banner" v-if="globalError">
            <div class="flex items-start gap-3">
                <div class="flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon-lg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>
                <div>
                    <h3 class="font-semibold">Test Execution Error</h3>
                    <pre id="global-error-message" class="mt-1 text-sm error-pre">{{ globalError.message }}</pre>
                    <button id="view-error-details" class="mt-2 text-sm font-medium text-danger hover:text-danger"
                            @click="showErrorDetails = true">
                        View Details
                    </button>
                </div>
                <button id="close-error-banner" class="ml-auto" @click="globalError = null">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Loading message -->
        <div class="panel p-4 text-center text-tertiary" v-if="isLoading">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-primary inline-block" xmlns="http://www.w3.org/2000/svg"
                 fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>{{ loadingMessage }}</span>
        </div>

        <!-- No tests message -->
        <div class="panel p-4 text-center text-tertiary" v-else-if="Object.keys(operations).length === 0">
            No test data available. Click "Run Tests" to start.
        </div>

        <!-- Test Operations Container -->
        <div v-else>
            <!-- Group by test group -->
            <div v-for="[group, groupOperations] in sortedOperationGroups" :key="group">
                <!-- Group Header (only show if multiple groups) -->
                <div class="px-4 py-2 bg-bg-hover font-semibold mb-2" v-if="hasMultipleGroups">{{ group }}</div>

                <!-- Operations in this group -->
                <test-operation
                        v-for="op in groupOperations"
                        :key="op.id"
                        :operation="op"
                        @view-test-details="showTestDetails">
                </test-operation>
            </div>
        </div>
    </main>

    <!-- Log modal -->
    <div id="log-modal" class="modal-overlay" v-if="showLogModal" @click.self="showLogModal = false">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="font-bold text-lg">{{ logModalTitle }}</h3>
                <button id="close-log-modal" @click="showLogModal = false">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <pre id="log-content" class="log-content">{{ logContent }}</pre>
            </div>
        </div>
    </div>

    <!-- Error details modal -->
    <div id="error-details-modal" class="modal-overlay" v-if="showErrorDetails" @click.self="showErrorDetails = false">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="font-bold text-lg">Test Execution Error Details</h3>
                <button id="close-error-details-modal" @click="showErrorDetails = false">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="mb-4">
                    <h4 class="font-semibold mb-2">Error Message:</h4>
                    <div class="p-3 bg-danger-light rounded-md">
                        <pre class="error-pre">{{ globalError?.message }}</pre>
                    </div>
                </div>
                <div>
                    <h4 class="font-semibold mb-2">Error Context:</h4>
                    <div class="bg-bg-hover rounded-md">
                        <table class="w-full text-sm">
                            <tbody>
                            <tr v-for="[key, value] in Object.entries(globalError?.context || {})" :key="key"
                                class="border-b" v-if="key !== 'message'">
                                <td class="py-2 px-4 font-medium">{{ key }}</td>
                                <td class="py-2 px-4">{{ typeof value === 'object' ? JSON.stringify(value) : value }}
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" @click="showErrorDetails = false">Close</button>
            </div>
        </div>
    </div>
</script>

<!-- Vue.js Application -->
<script>
    // Test Case Component
    const TestCase = {
        template: '#test-case-template',
        props: {
            test: {
                type: Object,
                required: true
            }
        },
        methods: {
            getStatusClass() {
                switch (this.test.status) {
                    case 'passed':
                        return 'status-passed';
                    case 'failed':
                        return 'status-failed';
                    case 'running':
                        return 'status-running';
                    case 'error':
                        return 'status-error';
                    case 'skipped':
                        return 'status-skipped';
                    default:
                        return 'status-pending';
                }
            },
            getStatusIcon() {
                switch (this.test.status) {
                    case 'passed':
                        return `<svg xmlns="http://www.w3.org/2000/svg" class="icon text-success" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>`;
                    case 'failed':
                        return `<svg xmlns="http://www.w3.org/2000/svg" class="icon text-danger" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                            </svg>`;
                    case 'error':
                        return `<svg xmlns="http://www.w3.org/2000/svg" class="icon text-warning" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>`;
                    case 'running':
                        return `<svg xmlns="http://www.w3.org/2000/svg" class="icon text-primary animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke-width="4"></circle>
                                <path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>`;
                    case 'skipped':
                        return `<svg xmlns="http://www.w3.org/2000/svg" class="icon text-neutral" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
                            </svg>`;
                    default:
                        return `<svg xmlns="http://www.w3.org/2000/svg" class="icon text-neutral" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
                            </svg>`;
                }
            }
        }
    };

    // Test Suite Component
    const TestSuite = {
        template: '#test-suite-template',
        components: {
            TestCase
        },
        props: {
            suite: {
                type: Object,
                required: true
            }
        },
        data() {
            return {
                expanded: false // Changed from true to false
            };
        },
        methods: {
            toggleExpanded() {
                this.expanded = !this.expanded;
            },
            getSuiteHeaderClass() {
                // Added this method to apply appropriate background color based on suite status
                if (this.suite.failed > 0) {
                    return 'bg-danger-light';
                } else if (this.suite.passed > 0 && this.suite.passed + this.suite.skipped === this.suite.total) {
                    return 'bg-success-light';
                } else {
                    return 'bg-bg-hover';
                }
            }
        }
    };

    // Test Operation Component
    const TestOperation = {
        template: '#test-operation-template',
        components: {
            TestSuite
        },
        props: {
            operation: {
                type: Object,
                required: true
            }
        },
        data() {
            return {
                expanded: false // Changed from true to false
            };
        },
        computed: {
            sortedSuites() {
                return Object.values(this.operation.suites || {}).sort((a, b) =>
                    a.name.localeCompare(b.name)
                );
            }
        },
        methods: {
            toggleExpanded() {
                this.expanded = !this.expanded;
            },
            getHeaderClass() {
                if (this.operation.status === 'completed') {
                    return this.operation.failed > 0 ? 'bg-danger-light' : 'bg-success-light';
                } else if (this.operation.status === 'error') {
                    return 'bg-warning-light';
                } else if (this.operation.status === 'running') {
                    return 'bg-primary-light';
                }
                return '';
            },
            getStatusDotClass() {
                let baseClass = 'status-indicator-dot ';
                if (this.operation.status === 'completed') {
                    return baseClass + (this.operation.failed > 0 ? 'status-dot-failed' : 'status-dot-passed');
                } else if (this.operation.status === 'running') {
                    return baseClass + 'status-dot-running animate-pulse-slow';
                } else if (this.operation.status === 'error') {
                    return baseClass + 'status-dot-error';
                }
                return baseClass + 'status-dot-idle';
            }
        }
    };

    // Main App
    const app = Vue.createApp({
        template: '#app-template',
        components: {
            TestOperation
        },
        data() {
            return {
                isLoading: false,
                loadingMessage: 'Loading tests...',
                operations: {},
                stats: {passed: 0, failed: 0, skipped: 0, total: 0, completed: 0},
                startTime: null,
                status: 'idle',
                globalError: null,
                testDataByCase: {},
                darkMode: false,

                // Modal state
                showLogModal: false,
                showErrorDetails: false,
                logModalTitle: '',
                logContent: ''
            };
        },
        computed: {
            statusMessage() {
                switch (this.status) {
                    case 'idle':
                        return 'Idle';
                    case 'running':
                        return `Running (${this.stats.completed}/${this.stats.total})`;
                    case 'passed':
                        return 'All Tests Passed';
                    case 'failed':
                        return 'Tests Failed';
                    case 'error':
                        return 'Error';
                    default:
                        return 'Unknown Status';
                }
            },
            statusDotClass() {
                let baseClass = 'status-indicator-dot ';
                switch (this.status) {
                    case 'idle':
                        return baseClass + 'status-dot-idle';
                    case 'running':
                        return baseClass + 'status-dot-running animate-pulse-slow';
                    case 'passed':
                        return baseClass + 'status-dot-passed';
                    case 'failed':
                        return baseClass + 'status-dot-failed';
                    case 'error':
                        return baseClass + 'status-dot-error';
                    default:
                        return baseClass + 'status-dot-idle';
                }
            },
            formattedDuration() {
                if (!this.startTime) return '-';
                const durationSec = (Date.now() - this.startTime) / 1000;
                return durationSec.toFixed(2) + 's';
            },
            sortedOperationGroups() {
                // Group operations by their group
                const groups = {};
                Object.values(this.operations).forEach(op => {
                    const group = op.group || 'default';
                    if (!groups[group]) {
                        groups[group] = [];
                    }
                    groups[group].push(op);
                });

                // Sort operations within each group
                Object.values(groups).forEach(ops => {
                    ops.sort((a, b) => a.name.localeCompare(b.name));
                });

                // Return sorted entries
                return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
            },
            hasMultipleGroups() {
                // Check if there's more than one group
                return new Set(Object.values(this.operations).map(op => op.group || 'default')).size > 1;
            }
        },
        mounted() {
            this.initTheme();
        },
        methods: {
            // Theme Management
            initTheme() {
                // Check for saved theme preference or use system preference
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    document.documentElement.classList.add('dark');
                    this.darkMode = true;
                } else if (savedTheme === 'light') {
                    document.documentElement.classList.remove('dark');
                    this.darkMode = false;
                } else {
                    // Use system preference
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        document.documentElement.classList.add('dark');
                        this.darkMode = true;
                    }
                }
            },
            toggleTheme() {
                this.darkMode = !this.darkMode;
                document.documentElement.classList.toggle('dark', this.darkMode);
                localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
            },

            // Test Execution
            runTests() {
                this.isLoading = true;
                this.loadingMessage = 'Initializing tests...';
                this.startTime = Date.now();
                this.status = 'running';
                this.globalError = null;
                this.operations = {};
                this.testDataByCase = {};
                this.stats = {passed: 0, failed: 0, skipped: 0, total: 0, completed: 0};
                this.activeTestId = null;

                this.fetchTestResults();
            },
            fetchTestResults() {
                fetch('http://localhost:8082/api/v1/test')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();

                        this.processStream(reader, decoder);
                    })
                    .catch(error => {
                        console.error('Error fetching test results:', error);
                        this.isLoading = false;
                        this.status = 'error';
                        this.globalError = {
                            message: `Error fetching test results: ${error.message}`,
                            context: {
                                timestamp: new Date().toLocaleString(),
                                error: error.toString()
                            }
                        };
                    });
            },
            async processStream(reader, decoder) {
                try {
                    while (true) {
                        const {done, value} = await reader.read();

                        if (done) {
                            this.finishTestRun();
                            break;
                        }

                        const chunk = decoder.decode(value, {stream: true});
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.trim()) {
                                try {
                                    const data = JSON.parse(line);
                                    this.processTestEvent(data);
                                } catch (e) {
                                    console.error('Error parsing JSON:', e, line);
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error processing stream:', error);
                    this.status = 'error';
                    this.globalError = {
                        message: `Error processing test data: ${error.message}`,
                        context: {
                            timestamp: new Date().toLocaleString(),
                            error: error.toString()
                        }
                    };
                } finally {
                    this.isLoading = false;
                }
            },

            // Event Processing
            processTestEvent(data) {
                // Determine if this is a new protocol or legacy format
                if (data.type) {
                    // New protocol format with "type" field
                    this.processNewProtocolEvent(data);
                } else {
                    // Legacy format with "event" field
                    this.processLegacyEvent(data);
                }
            },
            processNewProtocolEvent(data) {
                // Extract event type and data from the new protocol format
                const eventType = data.type;
                const eventData = data.data || {};

                // Use test_id from event data if available, otherwise use ref_id
                const testId = eventData.test_id || eventData.ref_id;

                if (testId) {
                    // Use this test_id for the current operation if needed
                    this.activeTestId = testId;
                }

                // Store event data by test case for detailed view
                if (testId && (eventType === 'test:case:start' ||
                    eventType === 'test:case:pass' ||
                    eventType === 'test:case:fail' ||
                    eventType === 'test:case:skip')) {

                    const caseId = `${testId}:${eventData.suite}:${eventData.test}`;
                    if (!this.testDataByCase[caseId]) {
                        this.testDataByCase[caseId] = [];
                    }

                    // Add formatted event to test case data
                    this.testDataByCase[caseId].push({
                        time: eventData.timestamp,
                        suite: eventData.suite,
                        test: eventData.test,
                        status: eventType.replace('test:case:', ''),
                        duration: eventData.duration,
                        error: eventData.error
                    });
                }

                // Handle different event types according to the new protocol
                switch (eventType) {
                    case 'test:discover':
                        this.handleTestDiscovery(eventData);
                        break;

                    case 'test:suite:start':
                        this.handleOperationStart(eventData);
                        break;

                    case 'test:plan':
                        this.handleTestPlan(eventData);
                        break;

                    case 'test:case:start':
                        this.handleTestCase({
                            ref_id: this.activeTestId,
                            suite: eventData.suite,
                            test: eventData.test,
                            status: 'running',
                            time: eventData.timestamp
                        });
                        break;

                    case 'test:case:pass':
                        this.handleTestCase({
                            ref_id: this.activeTestId,
                            suite: eventData.suite,
                            test: eventData.test,
                            status: 'passed',
                            duration: eventData.duration,
                            time: eventData.timestamp
                        });
                        break;

                    case 'test:case:fail':
                        this.handleTestCase({
                            ref_id: this.activeTestId,
                            suite: eventData.suite,
                            test: eventData.test,
                            status: 'failed',
                            duration: eventData.duration,
                            error: eventData.error,
                            time: eventData.timestamp
                        });
                        break;

                    case 'test:case:skip':
                        this.handleTestCase({
                            ref_id: this.activeTestId,
                            suite: eventData.suite,
                            test: eventData.test,
                            status: 'skipped',
                            reason: eventData.reason,
                            time: eventData.timestamp
                        });
                        break;

                    case 'test:complete':
                        this.updateFinalSummary({
                            tests_passed: eventData.passed,
                            tests_failed: eventData.failed,
                            tests_skipped: eventData.skipped,
                            total: eventData.total,
                            status: eventData.status
                        });

                        // Also update the operation status
                        if (this.activeTestId && this.operations[this.activeTestId]) {
                            this.handleOperationEnd({
                                id: this.activeTestId,
                                status: eventData.status,
                                passed: eventData.passed,
                                failed: eventData.failed,
                                skipped: eventData.skipped,
                                total: eventData.total
                            });
                        }
                        break;

                    case 'test:summary':
                        this.updateGlobalStats(eventData);
                        break;

                    case 'test:error':
                        this.globalError = {
                            message: eventData.message,
                            time: eventData.timestamp,
                            context: {
                                timestamp: new Date(eventData.timestamp * 1000).toLocaleString(),
                                context: eventData.context,
                                stack_trace: eventData.stack_trace,
                                ...eventData
                            }
                        };

                        // Mark running tests as errored
                        this.markRunningTestsAsErrored(eventData.message);
                        break;
                }
            },
            processLegacyEvent(data) {
                // Process based on legacy event type
                switch (data.event) {
                    case 'test:discovery':
                        this.handleTestDiscovery(data);
                        break;
                    case 'test:operation:start':
                        this.handleOperationStart(data);
                        break;
                    case 'test:plan:client':
                        this.handleTestPlan(data);
                        break;
                    case 'test:case:client':
                        this.handleTestCase(data);
                        break;
                    case 'test:operation:end':
                        this.handleOperationEnd(data);
                        break;
                    case 'result':
                        if (data.data) {
                            this.updateOperationResult(data.test_id, data.data);
                        }
                        break;
                    case 'test:complete':
                        this.updateFinalSummary(data);
                        break;
                    case 'test:summary':
                        this.updateGlobalStats(data);
                        break;
                    case 'error':
                        this.globalError = {
                            message: data.message,
                            time: data.time,
                            context: {
                                timestamp: new Date(data.time * 1000).toLocaleString(),
                                operation: data.operation || 'Unknown',
                                ...data
                            }
                        };
                        this.markRunningTestsAsErrored(data.message);
                        break;
                }
            },

            // Event Handlers
            updateGlobalStats(data) {
                if (data.total) {
                    this.stats.total = data.total;
                }
                if (data.completed) {
                    this.stats.completed = data.completed;
                }
                if (data.failed) {
                    this.stats.failed = data.failed;
                    if (data.failed > 0) {
                        this.status = 'failed';
                    }
                }
                if (data.passed) {
                    this.stats.passed = data.passed;
                }
                if (data.skipped) {
                    this.stats.skipped = data.skipped;
                }

                // Update overall status
                if (data.status === 'passed' && this.status !== 'failed') {
                    this.status = 'passed';
                } else if (data.status === 'failed') {
                    this.status = 'failed';
                }
            },
            handleTestDiscovery(data) {
                this.isLoading = false;

                // Initialize operations from discovery data
                (data.tests || []).forEach(op => {
                    this.operations[op.id] = {
                        id: op.id,
                        name: op.name,
                        group: op.group,
                        meta: op.meta,
                        status: 'pending',
                        suites: {},
                        passed: 0,
                        failed: 0,
                        skipped: 0,
                        total: 0
                    };
                });
            },
            handleOperationStart(data) {
                const id = data.id || data.ref_id;
                const name = data.name;
                const group = data.group;

                // For new protocol compatibility
                this.activeTestId = id;

                // Don't create duplicate operations or reset existing ones
                if (this.operations[id]) {
                    // Just update status if already exists
                    this.operations[id].status = 'running';
                } else {
                    // Initialize a new operation
                    this.operations[id] = {
                        id: id,
                        name: name,
                        group: group || 'default',
                        status: 'running',
                        suites: {},
                        passed: 0,
                        failed: 0,
                        skipped: 0,
                        total: 0
                    };
                }
            },
            handleTestPlan(data) {
                const opId = data.test_id || data.ref_id || this.activeTestId;

                if (!this.operations[opId]) {
                    return;
                }

                // Initialize suites for this operation
                (data.suites || []).forEach(suite => {
                    const suiteName = suite.name;

                    if (!this.operations[opId].suites[suiteName]) {
                        this.operations[opId].suites[suiteName] = {
                            name: suiteName,
                            tests: (suite.tests || []).map(test => ({
                                name: test.name,
                                status: test.skipped ? 'skipped' : 'pending',
                                duration: null,
                                error: null
                            })),
                            passed: 0,
                            failed: 0,
                            skipped: 0,
                            total: (suite.tests || []).length
                        };
                    }

                    // Update operation total
                    this.operations[opId].total += (suite.tests || []).length;
                    this.stats.total += (suite.tests || []).length;
                });
            },
            handleTestCase(data) {
                const testId = data.test_id || data.ref_id || this.activeTestId;
                const {suite, test, status, error, duration} = data;

                if (!testId || !this.operations[testId]) {
                    return;
                }

                // Create suite if it doesn't exist yet
                if (!this.operations[testId].suites[suite]) {
                    this.operations[testId].suites[suite] = {
                        name: suite,
                        tests: [],
                        passed: 0,
                        failed: 0,
                        skipped: 0,
                        total: 0
                    };
                }

                // Find the test in the suite
                let testItem = this.operations[testId].suites[suite].tests.find(t => t.name === test);

                // Create test if it doesn't exist yet
                if (!testItem) {
                    testItem = {
                        name: test,
                        status: 'pending',
                        duration: null,
                        error: null
                    };
                    this.operations[testId].suites[suite].tests.push(testItem);
                    this.operations[testId].suites[suite].total++;
                    this.operations[testId].total++;
                }

                // Update test status
                const prevStatus = testItem.status;
                testItem.status = status;
                testItem.error = error;

                if (duration !== undefined) {
                    testItem.duration = duration;
                }

                // Update suite counters only if status changed to a final state
                if (status === 'passed' && prevStatus !== 'passed') {
                    this.operations[testId].suites[suite].passed++;
                    this.operations[testId].passed++;
                    this.stats.passed++;
                    this.stats.completed++;
                } else if (status === 'failed' && prevStatus !== 'failed') {
                    this.operations[testId].suites[suite].failed++;
                    this.operations[testId].failed++;
                    this.stats.failed++;
                    this.stats.completed++;
                    this.status = 'failed';
                } else if (status === 'skipped' && prevStatus !== 'skipped') {
                    this.operations[testId].suites[suite].skipped++;
                    this.operations[testId].skipped++;
                    this.stats.skipped++;
                    this.stats.completed++;
                }
            },
            handleOperationEnd(data) {
                const {id, status, passed, failed, skipped, total} = data;
                const opId = id || this.activeTestId;

                if (this.operations[opId]) {
                    this.operations[opId].status = status || 'completed';

                    // Only update these if provided
                    if (passed !== undefined) this.operations[opId].passed = passed;
                    if (failed !== undefined) this.operations[opId].failed = failed;
                    if (skipped !== undefined) this.operations[opId].skipped = skipped;
                    if (total !== undefined) this.operations[opId].total = total;

                    // Update overall status if any operation failed
                    if (failed > 0) {
                        this.status = 'failed';
                    }
                }
            },
            updateOperationResult(opId, result) {
                // Update duration if available
                if (result.duration_ms && this.operations[opId]) {
                    this.operations[opId].duration = result.duration_ms / 1000;
                }

                // Update operation status based on result
                if (result.failed_tests > 0) {
                    this.status = 'failed';
                }
            },
            updateFinalSummary(data) {
                const failedTests = data.tests_failed || data.failed || 0;

                // Always update status based on tests_failed, not just status field
                if (failedTests > 0) {
                    this.status = 'failed';
                } else if (this.status !== 'failed') {
                    // Only set to passed if we don't already know it failed
                    this.status = 'passed';
                }
            },
            markRunningTestsAsErrored(errorMessage) {
                // For each operation
                Object.values(this.operations).forEach(operation => {
                    // For each suite in the operation
                    Object.values(operation.suites).forEach(suite => {
                        // Check all running tests in this suite
                        suite.tests.forEach(test => {
                            if (test.status === 'running') {
                                test.status = 'error';
                                test.error = errorMessage;

                                // Update counters
                                suite.failed++;
                                operation.failed++;
                                this.stats.failed++;
                                this.stats.completed++;

                                // Mark status as failed
                                this.status = 'failed';
                            }
                        });
                    });
                });
            },
            finishTestRun() {
                // Make sure status is correct based on pass/fail counts
                if (this.stats.failed > 0) {
                    this.status = 'failed';
                } else if (this.stats.total > 0 && this.stats.completed >= this.stats.total) {
                    this.status = 'passed';
                }
            },

            // UI Helper Methods
            showTestDetails(details) {
                const {opId, suite, test} = details;
                const testId = `${opId}:${suite}:${test.name}`;
                const events = this.testDataByCase[testId] || [];

                this.logModalTitle = `${suite} - ${test.name}`;

                // Format the log content
                let logText = '';
                events.forEach(event => {
                    const timestamp = new Date(event.time * 1000).toLocaleTimeString();
                    let statusText = event.status;

                    if (statusText === 'passed') {
                        statusText = '✅ PASSED';
                    } else if (statusText === 'failed') {
                        statusText = '❌ FAILED';
                    } else if (statusText === 'running') {
                        statusText = '🔄 RUNNING';
                    } else if (statusText === 'error') {
                        statusText = '⚠️ ERROR';
                    } else if (statusText === 'skipped') {
                        statusText = '⏭️ SKIPPED';
                    }

                    logText += `[${timestamp}] ${statusText}\n`;

                    if (event.error) {
                        logText += `ERROR: ${event.error}\n`;
                    }

                    if (event.duration) {
                        logText += `Duration: ${event.duration.toFixed(3)}s\n`;
                    }

                    logText += '\n';
                });

                this.logContent = logText || 'No detailed log available for this test.';
                this.showLogModal = true;
            }
        }
    });

    // Mount the app
    app.mount('#app');
</script>
</body>
</html>
