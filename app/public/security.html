<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security API Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .theme-transition {
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        pre {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 theme-transition">
<div class="flex min-h-screen">
    <div class="w-full p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" viewBox="0 0 24 24" fill="none">
                    <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1 class="text-xl font-semibold">Security API Demo</h1>
            </div>

            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 theme-transition">
                <!-- Sun icon (shown in dark mode) -->
                <svg id="light-icon" class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 2a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0110 2zm7.646 7.36a.75.75 0 01-.392.393l-1.34.67a.75.75 0 01-.669-1.345l1.34-.67a.75.75 0 011.06.953zm-15.293.393a.75.75 0 01-.392-.393.75.75 0 01.954-1.047l1.337.679a.75.75 0 01-.668 1.344l-1.337-.678zM10 5.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9zM3.75 10a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zm11 0a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zm-3.288 7.894a.75.75 0 01-1.5 0v-1.5a.75.75 0 011.5 0v1.5zm-4.954-3.959a.75.75 0 01-1.06 0l-1.337-1.336a.75.75 0 111.06-1.06l1.337 1.336a.75.75 0 010 1.06zm11.293-1.06a.75.75 0 011.06 1.06l-1.336 1.336a.75.75 0 11-1.06-1.06l1.336-1.336z"></path>
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg id="dark-icon" class="w-5 h-5 block dark:hidden text-gray-700" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                </svg>
            </button>
        </div>

        <!-- Tabs -->
        <div class="mb-4 border-b border-gray-200 dark:border-gray-700">
            <ul class="flex flex-wrap -mb-px text-sm font-medium text-center" role="tablist">
                <li class="mr-2" role="presentation">
                    <button id="actor-tab" class="inline-block p-4 border-b-2 rounded-t-lg active" type="button" role="tab" aria-selected="true">
                        Create Actor
                    </button>
                </li>
                <li class="mr-2" role="presentation">
                    <button id="token-tab" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300" type="button" role="tab" aria-selected="false">
                        Create Token
                    </button>
                </li>
                <li class="mr-2" role="presentation">
                    <button id="validate-tab" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300" type="button" role="tab" aria-selected="false">
                        Validate Token
                    </button>
                </li>
                <li role="presentation">
                    <button id="permission-tab" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300" type="button" role="tab" aria-selected="false">
                        Check Permission
                    </button>
                </li>
            </ul>
        </div>

        <!-- Tab content -->
        <div class="tab-content">
            <!-- Create Actor Tab -->
            <div id="actor-content" class="tab-pane active">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 theme-transition">
                    <h2 class="text-lg font-medium mb-4">Create Actor</h2>
                    <form id="actor-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Actor ID</label>
                            <input type="text" name="id" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Role</label>
                            <input type="text" name="role" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Organization</label>
                            <input type="text" name="org" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Additional Metadata (JSON)</label>
                            <textarea name="meta" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" placeholder='{"custom_field": "value"}'></textarea>
                        </div>
                        <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white">Create Actor</button>
                    </form>
                </div>
            </div>

            <!-- Create Token Tab -->
            <div id="token-content" class="tab-pane hidden">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 theme-transition">
                    <h2 class="text-lg font-medium mb-4">Create Token</h2>
                    <form id="token-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Actor ID</label>
                            <input type="text" name="actor_id" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Scope</label>
                            <input type="text" name="scope" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" value="global:admin" placeholder="global:admin">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Expiration</label>
                            <input type="text" name="expiration" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" value="24h" placeholder="24h">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Actor Metadata (JSON)</label>
                            <textarea name="meta" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" placeholder='{"role": "admin"}'></textarea>
                        </div>
                        <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white">Create Token</button>
                    </form>
                </div>
            </div>

            <!-- Validate Token Tab -->
            <div id="validate-content" class="tab-pane hidden">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 theme-transition">
                    <h2 class="text-lg font-medium mb-4">Validate Token</h2>
                    <form id="validate-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Token</label>
                            <textarea name="token" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" required></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Action to Check (Optional)</label>
                            <input type="text" name="action_check" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" placeholder="read">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Resource to Check (Optional)</label>
                            <input type="text" name="resource" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" placeholder="document:123">
                        </div>
                        <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white">Validate Token</button>
                    </form>
                </div>
            </div>

            <!-- Check Permission Tab -->
            <div id="permission-content" class="tab-pane hidden">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 theme-transition">
                    <h2 class="text-lg font-medium mb-4">Check Permission</h2>
                    <form id="permission-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Action</label>
                            <input type="text" name="action" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" required placeholder="read">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Resource</label>
                            <input type="text" name="resource" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" required placeholder="document:123">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Bearer Token (Optional)</label>
                            <textarea name="token" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Metadata (JSON, Optional)</label>
                            <textarea name="metadata" rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 theme-transition" placeholder='{"owner": "user123"}'></textarea>
                        </div>
                        <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-white">Check Permission</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Results Container -->
        <div class="mt-6">
            <h2 class="text-lg font-medium mb-2">Results</h2>
            <div id="results" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 min-h-[200px] theme-transition">
                <div class="text-gray-500 dark:text-gray-400">Submit a form to see results here.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Theme management
    const themeToggle = document.getElementById('theme-toggle');

    // Check for saved theme preference or use system preference
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }

    // Theme toggle button handler
    themeToggle.addEventListener('click', () => {
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    });

    // Tab handling
    const tabs = ['actor', 'token', 'validate', 'permission'];

    tabs.forEach(tabId => {
        const tabButton = document.getElementById(`${tabId}-tab`);

        tabButton.addEventListener('click', () => {
            // Hide all tab content
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.add('hidden');
                pane.classList.remove('active');
            });

            // Remove active class from all tabs
            document.querySelectorAll('button[role="tab"]').forEach(tab => {
                tab.classList.remove('active', 'border-blue-600', 'text-blue-600');
                tab.classList.add('border-transparent');
                tab.setAttribute('aria-selected', 'false');
            });

            // Show selected tab content
            const content = document.getElementById(`${tabId}-content`);
            content.classList.remove('hidden');
            content.classList.add('active');

            // Set active class on selected tab
            tabButton.classList.add('active', 'border-blue-600', 'text-blue-600');
            tabButton.classList.remove('border-transparent');
            tabButton.setAttribute('aria-selected', 'true');
        });
    });

    // Helper function to display results
    function displayResults(data) {
        const resultsDiv = document.getElementById('results');

        let html = '<pre class="text-sm overflow-auto text-gray-800 dark:text-gray-200">';
        html += JSON.stringify(data, null, 2);
        html += '</pre>';

        if (data.token) {
            html += '<div class="mt-4 p-4 bg-green-100 dark:bg-green-900 rounded-lg">';
            html += '<h3 class="font-medium text-green-800 dark:text-green-200">Token Created</h3>';
            html += '<div class="mt-2 break-all">';
            html += `<strong>Token:</strong> <span class="font-mono">${data.token}</span>`;
            html += '</div>';
            html += '</div>';
        }

        if (data.permission && data.permission.allowed === true) {
            html += '<div class="mt-4 p-4 bg-green-100 dark:bg-green-900 rounded-lg">';
            html += '<h3 class="font-medium text-green-800 dark:text-green-200">Permission Granted</h3>';
            html += '</div>';
        } else if (data.permission && data.permission.allowed === false) {
            html += '<div class="mt-4 p-4 bg-red-100 dark:bg-red-900 rounded-lg">';
            html += '<h3 class="font-medium text-red-800 dark:text-red-200">Permission Denied</h3>';
            html += '</div>';
        }

        resultsDiv.innerHTML = html;
    }

    // Helper function to display errors
    function displayError(error) {
        const resultsDiv = document.getElementById('results');

        let html = '<div class="p-4 bg-red-100 dark:bg-red-900 rounded-lg">';
        html += `<h3 class="font-medium text-red-800 dark:text-red-200">Error</h3>`;
        html += `<p class="mt-2 text-red-700 dark:text-red-300">${error}</p>`;
        html += '</div>';

        resultsDiv.innerHTML = html;
    }

    // Form handling
    document.getElementById('actor-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const params = new URLSearchParams();

        params.append('action', 'create_actor');
        params.append('id', formData.get('id'));

        if (formData.get('role')) {
            params.append('role', formData.get('role'));
        }

        if (formData.get('org')) {
            params.append('org', formData.get('org'));
        }

        if (formData.get('meta')) {
            params.append('meta', formData.get('meta'));
        }

        try {
            const response = await fetch(`/api/v1/security/demo?${params.toString()}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to create actor');
            }

            displayResults(data);
        } catch (error) {
            displayError(error.message);
        }
    });

    document.getElementById('token-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const params = new URLSearchParams();

        params.append('action', 'create_token');
        params.append('actor_id', formData.get('actor_id'));

        if (formData.get('scope')) {
            params.append('scope', formData.get('scope'));
        }

        if (formData.get('expiration')) {
            params.append('expiration', formData.get('expiration'));
        }

        if (formData.get('meta')) {
            params.append('meta', formData.get('meta'));
        }

        try {
            const response = await fetch(`/api/v1/security/demo?${params.toString()}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to create token');
            }

            displayResults(data);
        } catch (error) {
            displayError(error.message);
        }
    });

    document.getElementById('validate-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const params = new URLSearchParams();

        params.append('action', 'validate_token');
        params.append('token', formData.get('token'));

        if (formData.get('action_check')) {
            params.append('action_check', formData.get('action_check'));
        }

        if (formData.get('resource')) {
            params.append('resource', formData.get('resource'));
        }

        try {
            const response = await fetch(`/api/v1/security/demo?${params.toString()}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to validate token');
            }

            displayResults(data);
        } catch (error) {
            displayError(error.message);
        }
    });

    document.getElementById('permission-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const params = new URLSearchParams();

        params.append('action', 'check_permission');
        params.append('action', formData.get('action'));
        params.append('resource', formData.get('resource'));

        if (formData.get('metadata')) {
            params.append('metadata', formData.get('metadata'));
        }

        const headers = {};
        if (formData.get('token')) {
            headers['Authorization'] = `Bearer ${formData.get('token')}`;
        }

        try {
            const response = await fetch(`/api/v1/security/demo?${params.toString()}`, {
                headers: headers
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to check permission');
            }

            displayResults(data);
        } catch (error) {
            displayError(error.message);
        }
    });
</script>
</body>
</html>
