version: "1.0"
namespace: btea

meta:
  depends_on: [ "ns:system", "ns:btea.lib" ]

entries:
  - name: basic
    kind: btea.app.lua
    meta:
      comment: "Simple upstream example"
      default_host: terminal
    source: file://basic.lua
    method: App
    modules: [ time ]
    import:
      "bapp": "btea.lib:bapp"

  - name: snake
    kind: btea.app.lua
    meta:
      comment: "Snake game"
    source: file://snake.lua
    method: App
    modules: [ time ]
    import:
      "bapp": "btea.lib:bapp"