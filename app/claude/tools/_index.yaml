version: "1.0"
namespace: tools

meta:
  depends_on: [ "ns:system" ]

entries:
  - name: tree
    kind: function.lua
    meta:
      comment: "File system tree utility that prints directory structure"
    source: file://tree.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2

  - name: read
    kind: function.lua
    meta:
      comment: "File reader utility that reads and returns file contents"
    source: file://read.lua
    method: handle
    modules: [ "fs" ]
    pool:
      size: 2

  - name: list
    kind: function.lua
    meta:
      comment: "Directory listing utility that returns directory contents"
    source: file://list.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2

  - name: search
    kind: function.lua
    meta:
      comment: "File content search utility that finds text in files"
    source: file://search.lua
    method: handle
    modules: [ "fs", "json" ]
    pool:
      size: 2