version: "1.0"
namespace: claude
meta:
  depends_on: [ "ns:system", "ns:btea.lib", "ns:analyze", "ns:functions", "ns:tools" ]

entries:
  - name: tui
    kind: btea.app.lua
    meta:
      comment: "Claude Terminal Interface"
      default_host: terminal
      depends_on: [ ui_lib, claude_client, agent_handler, session_lib ]
    source: file://tui.lua
    method: App
    modules: [ "time", "json", "http_client", "env", "funcs" ]
    import:
      "bapp": "btea.lib:bapp"
      "ui_lib": "claude:ui_lib"
      "claude_client": "claude:claude_client"
      "agent_handler": "claude:agent_handler"
      "session_lib": "claude:session_lib"

  - name: tui.service
    kind: process.service
    meta:
      comment: "Claude Terminal UI Service"
      depends_on: [ ui_lib, claude_client, agent_handler, session_lib ]
    process: tui
    host: system:terminal
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 3

  - name: ui_lib
    kind: library.lua
    meta:
      comment: "Claude UI components and rendering library"
      version: "1.0.0"
    source: file://ui_lib.lua
    modules: [ "time", "json" ]

  - name: claude_client
    kind: library.lua
    meta:
      comment: "Claude API client library"
      version: "1.0.0"
    source: file://claude_client.lua
    modules: [ "time", "json", "http_client", "env", "fs" ]

  - name: agent_handler
    kind: library.lua
    meta:
      comment: "Claude agent configuration and tool handling"
      version: "1.0.0"
    source: file://agent_handler.lua
    modules: [ "json", "funcs" ]

  - name: session_lib
    kind: library.lua
    meta:
      comment: "Claude session and conversation management"
      version: "1.0.0"
    source: file://session_lib.lua
    modules: [ "time", "json", "fs" ]