version: "1.0"
namespace: discord

meta:
  depends_on: [ "ns:system", "ns:btea.lib", "ns:chat" ]

entries:
  - name: service
    kind: process.service
    meta:
      comment: "Discord Bot Service"
      depends_on: [ "app" ]
    process: app
    host: system:terminal
    lifecycle:
      auto_start: true
      restart:
        initial_delay: 5s
        max_attempts: 0

  - name: app
    kind: btea.app.lua
    meta:
      comment: "Discord Bot Terminal UI"
      default_host: terminal
      depends_on: [ "client", "ui", "commands" ]
    source: file://app.lua
    method: App
    modules: [ "time", "json", "env", "channel", "tasks" ]
    import:
      "bapp": "btea.lib:bapp"
      "discord_client": "discord:client"
      "discord_commands": "discord:commands"
      "discord_ui": "discord:ui"
      "llm": "chat:llm"  # Import LLM client from chat namespace
      "components": "chat:components"  # Import chat components

  - name: client
    kind: library.lua
    meta:
      comment: "Discord client implementation"
      version: "0.1.0"
    source: file://client.lua
    modules: [ "time", "json", "http_client", "websocket", "env" ]

  - name: commands
    kind: library.lua
    meta:
      comment: "Discord command handlers"
      version: "0.1.0"
    source: file://commands.lua
    modules: [ "time", "channel" ]  # Added channel module for update channel
    import:
      "components": "chat:components"  # Import chat components for session management

  - name: ui
    kind: library.lua
    meta:
      comment: "Discord UI"
      version: "0.1.0"
    source: file://ui.lua
    modules: [ "time" ]