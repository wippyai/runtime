version: "1.0.0"
namespace: helloworld

# Requirements section for module
requirements:
  - parameter: NAMESPACE
    description: "Target namespace for module dependency"
    targets:
      - value: meta.depends_on[]

  - parameter: API_ROUTER
    description: "Router to use for endpoints"
    targets:
      - name: hello_endpoint
        value: meta.router


entries:
  - name: hello_handler
    kind: function.lua
    source: file://hello.lua
    method: handler
    meta:
      comment: "Lua function for hello_endpoint"
    modules: [ http ]
    pool:
      size: 2
      workers: 4

  - name: hello_endpoint
    kind: http.endpoint
    method: GET
    meta:
      comment: "HTTP endpoint which executes hello_handler"
    path: /registry/hello
    func: hello_handler

