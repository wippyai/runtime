version: "1.0"
namespace: app.users.relay

meta:
  depends_on: [ "ns:app", "ns:app.user.auth" ]
  comment: "User WebSocket Relay System"

entries:
  - name: central.service
    kind: process.service
    meta:
      comment: "Central Hub Service"
    process: central
    host: app:processes
    lifecycle:
      auto_start: true
      depends_on: [ "app:processes" ]

  - name: central
    kind: process.lua
    meta:
      comment: "Process that manages central users relay"
    source: file://central.lua
    method: run
    modules: [ time, json, security ]
    imports:
      actor: "wippy.actor:actor"

  - name: user
    kind: process.lua
    meta:
      comment: "Process for individual user WebSocket connections pool"
      default_host: app:processes
    source: file://user.lua
    method: run
    modules: [ time, json, funcs, uuid, security ]
    imports:
      actor: "wippy.actor:actor"