version: "1.0"
namespace: app.agents.api

meta:
  depends_on: [ ns:app, ns:app.user.auth ]
  description: "Agent API endpoints"

entries:
  # Endpoint to get list of agents with limited metadata
  - name: list_agents
    kind: function.lua
    meta:
      comment: "Lists all agents with limited metadata (name, title, group, comment, icon, tags)"
    source: file://agents_endpoint.lua
    method: handler
    modules: [ http, json, security, registry ]

  - name: list_agents.endpoint
    kind: http.endpoint
    meta:
      comment: "Protected endpoint that provides list of agents with limited metadata"
      router: app:api
      depends_on: [ app:api ]
    method: GET
    path: /agents/list
    func: list_agents