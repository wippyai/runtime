version: "1.0"
namespace: wippy.session

meta:
  depends_on: [ "ns:wippy", "ns:app.sessions" ]
  comment: "Simple Session Process"

entries:
  - name: session
    kind: process.lua
    meta:
      comment: "Minimalistic session process for message handling"
      default_host: app:processes
      depends_on: [ "app.sessions:loader" ]
    source: file://session.lua
    method: run
    modules: [ time, json ]
    imports:
      actor: "wippy.actor:actor"
      loader: "app.sessions:loader"

  - name: loader
    kind: library.lua
    meta:
      comment: "Session state loader for initializing and loading session states"
      depends_on: [ "app.sessions:context_repo", "app.sessions:session_repo", "app.sessions:message_repo","app.sessions:start_tokens" ]
    source: file://loader.lua
    modules: [ time, json, uuid ]
    imports:
      context_repo: "app.sessions:context_repo"
      session_repo: "app.sessions:session_repo"
      message_repo: "app.sessions:message_repo"
      start_tokens: "app.sessions:start_tokens"