version: "1.0"
namespace: wippy.session

meta:
  depends_on: [ "ns:wippy", "ns:wippy.session" ]
  comment: "Session Process and Components"

entries:
  - name: session
    kind: process.lua
    meta:
      comment: "Minimalistic session process for message handling"
      default_host: app:processes
      depends_on: [ "wippy.session:loader", "wippy.session:session_state", "wippy.session:session_upstream", "wippy.session:controller" ]
    source: file://session.lua
    method: run
    modules: [ time, json ]
    imports:
      actor: "wippy.actor:actor"
      loader: "wippy.session:loader"
      session_state: "wippy.session:session_state"
      session_upstream: "wippy.session:session_upstream"
      controller: "wippy.session:controller"

  - name: controller
    kind: library.lua
    meta:
      comment: "Conversation controller for handling message processing and agent interactions"
      depends_on: [ "wippy.agents.gen1:agent", "wippy.agents.gen1:registry", "wippy.llm:prompt" ]
    source: file://controller.lua
    modules: [ json, uuid ]
    imports:
      agent_registry: "wippy.agents.gen1:registry"
      agent_runner: "wippy.agents.gen1:agent"
      prompt: "wippy.llm:prompt"

  - name: loader
    kind: library.lua
    meta:
      comment: "Session state loader for initializing and loading session states"
      depends_on: [ "wippy.session:context_repo", "wippy.session:session_repo", "wippy.session:message_repo","wippy.session:start_tokens" ]
    source: file://loader.lua
    modules: [ time, json, uuid ]
    imports:
      context_repo: "wippy.session:context_repo"
      session_repo: "wippy.session:session_repo"
      message_repo: "wippy.session:message_repo"
      start_tokens: "wippy.session:start_tokens"

  - name: session_state
    kind: library.lua
    meta:
      comment: "Session state management for handling conversation history and state persistence"
      depends_on: [ "wippy.session:session_repo", "wippy.session:message_repo", "wippy.llm:prompt", "wippy.session:session_upstream" ]
    source: file://state.lua
    modules: [ uuid ]
    imports:
      session_repo: "wippy.session:session_repo"
      message_repo: "wippy.session:message_repo"
      prompt: "wippy.llm:prompt"

  - name: session_upstream
    kind: library.lua
    meta:
      comment: "Session upstream for sending notifications and updates to clients"
      depends_on: [ ]
    source: file://upstream.lua
    modules: [ time ]
    imports: { }