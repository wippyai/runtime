    imports:
      migration: "wippy.migration:migration"

  # Tests
  - name: token_usage_repo_test
    kind: function.lua
    meta:
      name: "Token Usage Repository Test"
      type: "test"
      tags: [ "token_usage", "database", "tests" ]
      group: "Token Usage Tests"
      comment: "Tests the token usage repository functionality for recording and retrieving token usage data"
    source: file://token_usage_repo_test.lua
    method: run_tests
    modules: [ "sql", "uuid" ]
    imports:
      test: "wippy.test:test"
      token_usage_repo: "app.token_usage:token_usage_repo"