version: "1.0"
namespace: app.token_usage

meta:
  depends_on: [ ns:app, ns:wippy.migration ]
  description: "Token usage tracking and statistics system"

entries:
  # Repository library
  - name: token_usage_repo
    kind: library.lua
    meta:
      comment: "Token usage repository for tracking model usage statistics"
    source: file://token_usage_repo.lua
    modules: [ sql, uuid ]

  # Migration
  - name: migrations.create_token_usage_table
    kind: function.lua
    meta:
      description: "Create token_usage table with indexes"
      timestamp: "2025-03-19T10:00:00Z"
      tags: [ "token_usage" ]
      type: "migration"
      target_db: "app:db"
    source: file://migrations/01_create_token_usage_table.lua
