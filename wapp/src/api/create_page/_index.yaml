version: "1.0"
namespace: app.api.pages

meta:
  depends_on: [ ns:app ]
  router: "app:public_api"
  description: "Simple text page creator endpoint"

entries:
  # Handler function to create a simple text page
  - name: create_text_page
    kind: function.lua
    meta:
      comment: "Creates a simple text virtual page in the registry"
    source: file://create_text_page.lua
    method: handler
    modules: [ http, json, registry ]

  # HTTP endpoint definition
  - name: create_text_page.endpoint
    kind: http.endpoint
    meta:
      comment: "Endpoint to create a simple text virtual page"
    method: GET
    path: /pages/create-text
    func: create_text_page