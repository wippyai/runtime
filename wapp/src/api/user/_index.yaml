version: "1.0"
namespace: app.user.api

meta:
  depends_on: [ ns:app, ns:app.user.auth ]
  description: "User API endpoints"

entries:
  # Endpoint to get current user details
  - name: me
    kind: function.lua
    meta:
      comment: "Current user details"
      depends_on: [ app.user.auth:user_repo ]
    source: file://me.lua
    method: handler
    modules: [ http, security, json, time ]

  - name: me.endpoint
    kind: http.endpoint
    meta:
      comment: "Current user details endpoint"
      router: app:api
      depends_on: [ app:api ]
    method: GET
    path: /user/me
    func: me

  - name: api
    kind: function.lua
    meta:
      comment: "User Token API"
      depends_on: [ user_repo ]
    source: file://user_api.lua
    method: handler
    modules: [ http, security, json, time ]
    imports:
      user_repo: "app.user.auth:user_repo"

  - name: api.endpoint
    kind: http.endpoint
    meta:
      comment: "User Token API Endpoint"
      router: app:public_api
    method: POST
    path: /user/token
    func: api
