version: "1.0"
namespace: app.pages.api

meta:
  depends_on: [ ns:app]
  router: "app:public_api"
  description: "Virtual Pages API endpoints"

entries:
  # Endpoint to get list of virtual pages with metadata
  - name: list_pages
    kind: function.lua
    meta:
      comment: "Lists all virtual pages with metadata (id, title, path, tags, group)"
    source: file://list_pages_endpoint.lua
    method: handler
    modules: [ http, json, security, registry ]

  - name: list_pages.endpoint
    kind: http.endpoint
    meta:
      comment: "Protected endpoint that provides list of virtual pages with metadata"
    method: GET
    path: /pages/list
    func: list_pages

  # Endpoint to get content of a specific virtual page
  - name: get_page
    kind: function.lua
    meta:
      comment: "Returns the content of a specific virtual page by id"
    source: file://get_page_endpoint.lua
    method: handler
    modules: [ http, json, security, registry ]

  - name: get_page.endpoint
    kind: http.endpoint
    meta:
      comment: "Protected endpoint that returns content of a specific virtual page"
    method: GET
    path: /pages/content/{id}
    func: get_page