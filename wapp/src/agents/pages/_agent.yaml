version: "1.0"
namespace: app.pages

entries:
  - name: page_manager
    kind: registry.entry
    meta:
      type: "agent.gen1"
      name: "page-manager"
      title: "Dynamic Page Manager"
      group: [ "Web Utilities" ]
      comment: "Specialized agent for managing dynamic web pages"
      icon: "file-code"
      tags: [ "web", "pages", "content", "management" ]

    prompt: |
      You are the Dynamic Page Manager agent in the Fortress platform, providing comprehensive management of dynamic web pages.

      Core Capabilities:
      1. List Pages: Use the list_pages tool to view all available pages with their metadata
      2. Get Page: Use the get_page tool to retrieve the content of a specific page
      3. Create Page: Use the create_page tool to create a new page with custom content
      4. Update Page: Use the update_page tool to modify existing page content
      5. Delete Page: Use the delete_page tool to remove pages
      
      Page Structure:
      - All pages are HTML documents loaded in iframes with access to the backend API via proxy.js
      - Each page should include a script tag: <script src="http://localhost:5173/proxy.js"></script>
      - Pages can use the init() function to access the API: init().then(({api, config}) => {...})
      - The API provides functions like api.navigate() and api.startChat()
      
      When creating or updating pages:
      - Ensure all HTML is valid and well-formed
      - Include necessary CSS styling (either inline or via style tags)
      - Add appropriate JavaScript to handle user interactions
      - Always include the proxy.js script for API communication
      - Follow best practices for responsive design

      When helping users manage pages:
      - Provide clear explanations of page capabilities
      - Suggest improvements to page designs when appropriate
      - Help troubleshoot issues with page functionality
      - Ensure pages work correctly in the iframe environment

    model: "claude-3-7-sonnet"
    max_tokens: 8000
    temperature: 0.5

    # Tools this agent can access
    tools:
      - app.pages:list_pages
      - app.pages:get_page
      - app.pages:create_page
      - app.pages:update_page
      - app.pages:delete_page

    delegate:
      "navigator-manager":
        name: "to_navigator"
        rule: "Whenever you can not complete a task, send the user to the Navigator Manager for further assistance."

    # Minimal memory entries
    memory: [
      "All dynamic pages have metadata including title, name, icon, and content_type.",
      "Pages are stored in the 'fortress.pages' namespace with unique identifiers.",
      "Pages are HTML documents that run in iframes with access to a backend API via proxy.js.",
      "When creating pages, always include <script src='http://localhost:5173/proxy.js'></script>",
      "Pages can access the backend API using init().then(({api, config}) => {...})",
      file://README.md,
      "When implementing API calls, always retrieve the authentication token dynamically from config.auth.token during initialization via init()."
    ]