version: "1.0"
namespace: app.files

entries:
  - name: list_documents
    kind: function.lua
    meta:
      type: "tool"
      name: "List Documents"
      llm_alias: "list_documents"
      description: "Lists all documents with their metadata"
      llm_description: "Returns a list of all documents with metadata like file_id, filename, size, and status"
      depends_on: [ file_repo ]
      input_schema: |
        {
          "type": "object",
          "properties": {
            "limit": {
              "type": "integer",
              "description": "Maximum number of documents to return (default: 100)"
            },
            "offset": {
              "type": "integer", 
              "description": "Number of documents to skip (default: 0)"
            }
          }
        }
    source: file://list_documents.lua
    method: handler
    modules: [ http, security, json, ctx ]
    imports:
      file_repo: "app.files:file_repo"

  - name: read_document
    kind: function.lua
    meta:
      type: "tool"
      name: "Read Document"
      llm_alias: "read_document"
      description: "Retrieves the content of a specific document with optional size limits"
      llm_description: "Gets the full content of a document, with optional max_size parameter to limit content size"
      depends_on: [ file_repo ]
      input_schema: |
        {
          "type": "object",
          "properties": {
            "file_id": {
              "type": "string",
              "description": "The ID of the document to retrieve"
            },
            "max_size": {
              "type": "integer",
              "description": "Maximum content size in bytes to return (default: unlimited)"
            }
          },
          "required": ["file_id"]
        }
    source: file://read_document.lua
    method: handler
    modules: [ http, security, json ]
    imports:
      file_repo: "app.files:file_repo"

  - name: read_document_range
    kind: function.lua
    meta:
      type: "tool"
      name: "Read Document Range"
      llm_alias: "read_document_range"
      description: "Reads a specific portion of a document's content"
      llm_description: "Retrieves a section of a document's content using start and end offsets"
      depends_on: [ file_repo ]
      input_schema: |
        {
          "type": "object",
          "properties": {
            "file_id": {
              "type": "string",
              "description": "The ID of the document to retrieve"
            },
            "start": {
              "type": "integer",
              "description": "Starting position in bytes (default: 0)"
            },
            "length": {
              "type": "integer",
              "description": "Number of bytes to read (default: 10000)"
            }
          },
          "required": ["file_id"]
        }
    source: file://read_document_range.lua
    method: handler
    modules: [ http, security, json ]
    imports:
      file_repo: "app.files:file_repo"

  - name: query_document
    kind: function.lua
    meta:
      type: "tool"
      name: "Query Document"
      llm_alias: "query_document"
      description: "Performs semantic search within a document's chunks"
      llm_description: "Searches document chunks using natural language queries and returns the most relevant results"
      depends_on: [ file_repo ]
      input_schema: |
        {
          "type": "object",
          "properties": {
            "file_id": {
              "type": "string",
              "description": "The ID of the document to query"
            },
            "query": {
              "type": "string",
              "description": "Natural language query to search for"
            },
            "limit": {
              "type": "integer",
              "description": "Maximum number of chunks to return (default: 5)"
            }
          },
          "required": ["file_id", "query"]
        }
    source: file://query_document.lua
    method: handler
    modules: [ http, security, json ]
    imports:
      file_repo: "app.files:file_repo"
      chunk_query: "app.files:chunk_query"

  - name: get_document_chunks
    kind: function.lua
    meta:
      type: "tool"
      name: "Get Document Chunks"
      llm_alias: "get_document_chunks"
      description: "Retrieves chunks from a document with pagination"
      llm_description: "Gets chunks from a document with options for limit, offset, and ordering"
      depends_on: [ file_repo ]
      input_schema: |
        {
          "type": "object",
          "properties": {
            "file_id": {
              "type": "string",
              "description": "The ID of the document to retrieve chunks from"
            },
            "limit": {
              "type": "integer",
              "description": "Maximum number of chunks to return (default: 20)"
            },
            "offset": {
              "type": "integer",
              "description": "Number of chunks to skip (default: 0)"
            },
            "order_by": {
              "type": "string",
              "description": "How to order the chunks (options: 'created_at ASC', 'created_at DESC')"
            }
          },
          "required": ["file_id"]
        }
    source: file://get_document_chunks.lua
    method: handler
    modules: [ http, security, json ]
    imports:
      file_repo: "app.files:file_repo"