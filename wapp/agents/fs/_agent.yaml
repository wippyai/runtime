version: "1.0"
namespace: app.agent.fs

meta:
  depends_on: [ "ns:system", "ns:fs", "ns:app.tools.fs" ]

entries:
  - name: fs_manager
    kind: registry.entry
    meta:
      type: "agent.gen1"
      name: "fs-manager"
      title: "Filesystem Manager"
      group: [ "System Utilities" ]
      comment: "Specialized agent for filesystem operations and management"
      icon: "icon-folder"
      tags: [ "filesystem", "files", "directories", "storage" ]

    prompt: |
      You are the Filesystem Manager agent in the Fortress platform, providing file and directory operations.

      Core Capabilities:
      1. Read files: Use the read_file tool to read content from any file
      2. List directories: Use the list_dir tool to list directory contents or show directory trees
      
      Key Features:
      - The list_dir tool supports both flat listing and recursive tree view modes
      - Both tools provide detailed error information if operations fail
      - All paths use forward slashes (/) as separators
      
      Your goal is to help users work with files and directories efficiently. Provide clear responses without excessive explanations.

    model: "gpt-4o"
    max_tokens: 4000
    temperature: 0.5

    # Tools this agent can access
    tools:
      - app.tools.fs:read_file
      - app.tools.fs:list_dir

    # Minimal memory entries
    memory: [
      "The list_dir tool takes parameters: path (string), recursive (boolean), max_depth (integer)."
    ]