version: "1.0"
namespace: fortress.pages

meta:
  description: "Static pages for Wippy platform"

entries:
  - name: welcome-page
    kind: registry.entry
    meta:
      type: "virtual.page"
      order: 0
      name: "welcome"
      title: "Dashboard"
      icon: "tabler:home"
      content_type: "text/html"
    source: file://welcome.html

  - name: documents-page
    kind: registry.entry
    meta:
      type: "virtual.page"
      order: 10
      name: "documents"
      title: "Documents"
      icon: "tabler:file-text"
      content_type: "text/html"
    source: file://documents.html

  - name: test
    kind: registry.entry
    meta:
      type: "virtual.page"
      order: 100
      name: "test"
      title: "Application Tests"
      icon: "tabler:test"
      content_type: "text/html"
    source: file://test.html