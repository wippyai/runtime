<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Fortress</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
<h1>Welcome to Fortress</h1>

<div class="card">
    <h2>Getting Started</h2>
    <p>Welcome to the Fortress platform. This system provides tools to streamline your workflow.</p>
    <a href="/agents" class="btn">Explore Agents</a>
</div>

<div class="card">
    <h2>Need Help?</h2>
    <p>Contact our support team or check out our documentation for assistance.</p>
    <a href="/help" class="btn">Help Center</a>
</div>
</body>
</html>
