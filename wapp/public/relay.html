<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Relay Tester</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 20px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto 1fr auto;
            grid-template-areas:
                "header header"
                "agents agents"
                "commands debug"
                "input input";
            height: 100vh;
            gap: 10px;
            box-sizing: border-box;
        }

        #statusHeader {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        #status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .status-connecting { background-color: #664d00; color: #ffcc00; }
        .status-connected { background-color: #145214; color: #4caf50; }
        .status-disconnected { background-color: #5e1414; color: #ff5252; }

        #agentsPanel {
            grid-area: agents;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            overflow-y: auto;
            max-height: 200px;
        }

        #commands {
            grid-area: commands;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            overflow-y: auto;
        }

        #debugLog {
            grid-area: debug;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            overflow-y: auto;
            background-color: #252526;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #inputArea {
            grid-area: input;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        #messageTextarea {
            flex: 1;
            min-height: 100px;
            resize: vertical;
            background-color: #252526;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
        }

        button {
            padding: 8px 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #3367d6;
        }

        .command-button {
            margin: 5px;
            background-color: #333;
        }

        .command-button:hover {
            background-color: #444;
        }

        .command-category {
            margin-bottom: 15px;
        }

        .log-entry {
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
            margin-bottom: 3px;
        }

        .log-time {
            color: #888;
        }

        .log-receive {
            color: #4caf50;
        }

        .log-send {
            color: #64b5f6;
        }

        .log-error {
            color: #ff5252;
        }

        .log-system {
            color: #ffcc00;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .agent-item {
            background-color: #333;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .agent-item:hover {
            background-color: #444;
        }

        .agent-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .agent-model {
            font-size: 11px;
            color: #aaa;
        }

        .toggle-button {
            background-color: #555;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div id="statusHeader">
    <div>
        <h2>WebSocket Relay Tester</h2>
        <div id="stats"></div>
    </div>
    <div id="status" class="status-disconnected">DISCONNECTED</div>
</div>

<div id="agentsPanel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Available Agents</h3>
        <button id="refreshAgentsBtn">Refresh Agents</button>
    </div>
    <div id="agentsContainer" class="agents-grid">
        <div class="agent-item placeholder">Loading agents...</div>
    </div>
</div>

<div id="commands">
    <h3>Commands</h3>

    <div class="command-category">
        <h4>Session</h4>
        <div style="display: flex; align-items: center; margin-bottom: 10px;">
            <input type="text" id="sessionIdInput" placeholder="Enter session ID to resume" style="flex: 1; padding: 8px; background-color: #252526; color: #e0e0e0; border: 1px solid #555; border-radius: 4px; margin-right: 5px;">
            <button id="openExistingSessionBtn" style="white-space: nowrap;">Open Existing Session</button>
        </div>
    </div>

    <div class="command-category">
        <h4>Messages</h4>
        <button class="command-button" data-template='{"type":"session_message","session_id":"{{SESSION_ID}}","data":{"text":"Hello, tell me about yourself.","file_uuids":[]}}'>
            Send Message
        </button>
    </div>

    <div class="command-category">
        <h4>Commands</h4>
        <button class="command-button" data-template='{"type":"session_command","session_id":"{{SESSION_ID}}","data":{"command":"stop"}}'>
            Stop Generation
        </button>

        <button class="command-button" data-template='{"type":"session_command","session_id":"{{SESSION_ID}}","data":{"command":"model","name":"claude-3-5-sonnet"}}'>
            Switch to Claude 3.5
        </button>

        <button class="command-button" data-template='{"type":"session_command","session_id":"{{SESSION_ID}}","data":{"command":"model","name":"gpt-4o-mini"}}'>
            Switch to GPT-4o Mini
        </button>

        <button class="command-button" data-template='{"type":"session_close","session_id":"{{SESSION_ID}}"}'>
            Close Session
        </button>
    </div>
</div>

<div id="debugLog"></div>

<div id="inputArea">
    <textarea id="messageTextarea" placeholder="Enter JSON message payload to send..."></textarea>
    <button id="sendBtn">Send</button>
</div>

<script>
    // Application state
    const state = {
        token: null,
        socket: null,
        connected: false,
        sessionId: null,
        clientCount: 0,
        messageCount: 0,
        availableAgents: []
    };

    // DOM elements
    const statusElement = document.getElementById('status');
    const debugLogElement = document.getElementById('debugLog');
    const messageTextarea = document.getElementById('messageTextarea');
    const sendBtn = document.getElementById('sendBtn');
    const statsElement = document.getElementById('stats');
    const commandButtons = document.querySelectorAll('.command-button');
    const agentsContainer = document.getElementById('agentsContainer');
    const refreshAgentsBtn = document.getElementById('refreshAgentsBtn');

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
        // Set up event listeners
        sendBtn.addEventListener('click', sendMessage);
        refreshAgentsBtn.addEventListener('click', fetchAgents);

        // Set up event listener for opening existing session
        const openExistingSessionBtn = document.getElementById('openExistingSessionBtn');
        const sessionIdInput = document.getElementById('sessionIdInput');

        openExistingSessionBtn.addEventListener('click', () => {
            const sessionId = sessionIdInput.value.trim();
            if (sessionId) {
                const sessionOpenPayload = {
                    type: "session_open",
                    session_id: sessionId
                };
                messageTextarea.value = JSON.stringify(sessionOpenPayload, null, 2);
                log('system', `Prepared to open existing session: ${sessionId}`);
            } else {
                log('error', 'Please enter a session ID');
            }
        });

        commandButtons.forEach(button => {
            button.addEventListener('click', () => {
                const template = button.getAttribute('data-template');
                if (template) {
                    // Replace {{SESSION_ID}} with actual session ID
                    let processed = template.replace(/{{SESSION_ID}}/g, state.sessionId || "");
                    messageTextarea.value = processed;
                }
            });
        });

        // Start authentication flow
        authenticateUser();
    });

    // Helper function to add log entry
    function log(type, content, details = null) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';

        const time = document.createElement('span');
        time.className = 'log-time';
        time.textContent = `[${new Date().toLocaleTimeString()}] `;

        const typeSpan = document.createElement('span');
        typeSpan.className = `log-${type}`;
        typeSpan.textContent = `${type.toUpperCase()}: `;

        entry.appendChild(time);
        entry.appendChild(typeSpan);

        if (typeof content === 'object') {
            const jsonContent = JSON.stringify(content, null, 2);
            const text = document.createTextNode(jsonContent);
            entry.appendChild(text);
        } else {
            const text = document.createTextNode(content);
            entry.appendChild(text);
        }

        if (details) {
            const detailsElement = document.createElement('div');
            detailsElement.className = 'log-details';
            detailsElement.style.marginLeft = '20px';
            detailsElement.style.color = '#888';

            if (typeof details === 'object') {
                detailsElement.textContent = JSON.stringify(details, null, 2);
            } else {
                detailsElement.textContent = details;
            }

            entry.appendChild(detailsElement);
        }

        debugLogElement.appendChild(entry);
        debugLogElement.scrollTop = debugLogElement.scrollHeight;
    }

    // Helper to update connection status
    function updateStatus(status) {
        statusElement.className = `status-${status}`;
        statusElement.textContent = status.toUpperCase();
    }

    // Authenticate user to get token
    function authenticateUser() {
        log('system', 'Starting authentication...');
        updateStatus('connecting');

        // Use hardcoded credentials as requested
        const userData = {
            user_id: 'wolfy-j',
            sf_instance_token: 'abc',
            metadata: {
                role: 'tester',
                testMode: true
            }
        };

        // Determine API URL based on current location
        const apiUrl = `${window.location.protocol}//${window.location.host}/api/public/user/token`;

        log('system', `Requesting token from: ${apiUrl}`);

        fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.token) {
                    state.token = data.token;
                    log('system', 'Authentication successful', {
                        token_length: data.token.length,
                        user_id: data.user?.id || userData.user_id
                    });

                    // Connect WebSocket after successful authentication
                    connectWebSocket();

                    // Fetch available agents
                    fetchAgents();
                } else {
                    throw new Error('Token not received in response');
                }
            })
            .catch(error => {
                log('error', `Authentication failed: ${error.message}`);
                updateStatus('disconnected');
            });
    }

    // Fetch available agents
    function fetchAgents() {
        if (!state.token) {
            log('error', 'No authentication token available');
            return;
        }

        log('system', 'Fetching available agents...');

        // Clear current agents display
        agentsContainer.innerHTML = '<div class="agent-item placeholder">Loading agents...</div>';

        // API URL for agents endpoint
        const apiUrl = `${window.location.protocol}//${window.location.host}/api/v1/agents/list`;

        fetch(apiUrl, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${state.token}`
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    state.availableAgents = data.agents || [];
                    log('system', `Fetched ${state.availableAgents.length} agents`);
                    renderAgents();
                } else {
                    throw new Error('Failed to fetch agents: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                log('error', `Failed to fetch agents: ${error.message}`);
                agentsContainer.innerHTML = `<div class="agent-item placeholder">Error: ${error.message}</div>`;
            });
    }

    // Render agents in the UI
    function renderAgents() {
        agentsContainer.innerHTML = '';

        if (state.availableAgents.length === 0) {
            agentsContainer.innerHTML = '<div class="agent-item placeholder">No agents available</div>';
            return;
        }

        state.availableAgents.forEach(agent => {
            const agentElement = document.createElement('div');
            agentElement.className = 'agent-item';
            agentElement.setAttribute('data-agent-name', agent.name);
            agentElement.setAttribute('data-start-token', agent.start_token);

            const titleElement = document.createElement('div');
            titleElement.className = 'agent-title';
            titleElement.textContent = agent.title || agent.name;

            const modelElement = document.createElement('div');
            modelElement.className = 'agent-model';
            modelElement.textContent = agent.model || 'Unknown model';

            agentElement.appendChild(titleElement);
            agentElement.appendChild(modelElement);

            // Add click handler to prepare session open command with start token
            agentElement.addEventListener('click', () => {
                const sessionOpenPayload = {
                    type: "session_open",
                    start_token: agent.start_token
                };

                messageTextarea.value = JSON.stringify(sessionOpenPayload, null, 2);
                log('system', `Selected agent: ${agent.title || agent.name}`);
            });

            agentsContainer.appendChild(agentElement);
        });
    }

    // Connect to WebSocket
    function connectWebSocket() {
        if (!state.token) {
            log('error', 'No authentication token available');
            return;
        }

        updateStatus('connecting');
        log('system', 'Connecting to WebSocket...');

        // Create WebSocket URL with token
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/api/v1/ws/join?x-auth-token=${encodeURIComponent(state.token)}`;

        try {
            state.socket = new WebSocket(wsUrl);

            // Connection opened
            state.socket.addEventListener('open', () => {
                state.connected = true;
                updateStatus('connected');
                log('system', 'WebSocket connected');
            });

            // Message received
            state.socket.addEventListener('message', (event) => {
                try {
                    const message = JSON.parse(event.data);
                    log('receive', message);
                    handleMessage(message);
                } catch (error) {
                    log('error', `Failed to parse message: ${error.message}`, event.data);
                }
            });

            // Connection closed
            state.socket.addEventListener('close', (event) => {
                state.connected = false;
                updateStatus('disconnected');
                log('system', `WebSocket disconnected. Code: ${event.code}, Reason: ${event.reason || 'No reason provided'}`);
            });

            // Connection error
            state.socket.addEventListener('error', (event) => {
                log('error', 'WebSocket connection error');
            });

        } catch (error) {
            log('error', `Failed to create WebSocket: ${error.message}`);
            updateStatus('disconnected');
        }
    }

    // Handle incoming messages
    function handleMessage(message) {
        const topic = message.topic || '';

        if (topic === 'welcome') {
            // Extract welcome data and update stats
            const data = message.data || message;
            state.clientCount = data.client_count || 0;
            updateStats();

            log('system', `Welcome received: User ID: ${data.user_id || 'Unknown'}`);
        }
        else if (topic === 'update') {
            const data = message.data || message;

            // Store session ID when a session is opened
            if (data.type === 'session_opened' && data.session_id) {
                state.sessionId = data.session_id;
                log('system', `Session opened: ${state.sessionId}`);
                updateStats();
            }
            // Remove session ID when closed
            else if (data.type === 'session_closed' && data.session_id === state.sessionId) {
                state.sessionId = null;
                log('system', `Session closed: ${data.session_id}`);
                updateStats();
            }
        }
        else if (topic === 'error') {
            const data = message.data || message;
            log('error', `Server error: ${data.message || 'Unknown error'}`, data);
        }
    }

    // Update stats display
    function updateStats() {
        statsElement.textContent = `Status: ${state.connected ? 'Connected' : 'Disconnected'} | ` +
            `Clients: ${state.clientCount} | ` +
            `Session: ${state.sessionId || 'None'} | ` +
            `Agents: ${state.availableAgents.length}`;
    }

    // Send message from textarea
    function sendMessage() {
        const text = messageTextarea.value.trim();
        if (!text || !state.connected) return;

        try {
            // Try to parse as JSON first
            let payload;
            try {
                payload = JSON.parse(text);
                sendPayload(payload);
            } catch (e) {
                // If not valid JSON, send as plain text
                sendPayload({ text: text });
            }
        } catch (error) {
            log('error', `Failed to send message: ${error.message}`);
        }
    }

    // Send payload to WebSocket
    function sendPayload(payload) {
        if (!state.connected || !state.socket) {
            log('error', 'Not connected to WebSocket');
            return;
        }

        try {
            const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
            state.socket.send(data);
            log('send', payload);
        } catch (error) {
            log('error', `Failed to send payload: ${error.message}`);
        }
    }
</script>
</body>
</html>
