<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Token Initialization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1a1d23',
                            950: '#0a0c10'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        pre {
            white-space: pre-wrap;
            word-break: break-word;
        }

        body {
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200">
<div class="max-w-4xl mx-auto p-6">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold text-blue-400">User Token Initialization</h1>
    </div>

    <div class="bg-gray-850 rounded-lg shadow-lg p-6 mb-6 border border-gray-700">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">User ID</label>
                <input type="text" id="user-id"
                       class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-md text-white focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Enter user ID...">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Salesforce Instance Token</label>
                <input type="text" id="sf-token"
                       class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-md text-white focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Enter SF instance token...">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Additional Metadata (JSON, optional)</label>
                <textarea id="metadata" rows="3"
                          class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-md text-white focus:ring-blue-500 focus:border-blue-500"
                          placeholder='{"role": "user"}'></textarea>
            </div>
            <button id="create-token-btn"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900">
                Initialize User & Get Token
            </button>
        </div>
    </div>

    <div class="bg-gray-850 rounded-lg shadow-lg p-6 border border-gray-700">
        <h2 class="text-lg font-medium mb-4 text-blue-300">Results</h2>
        <div id="results" class="bg-gray-900 rounded-md p-4 min-h-[150px] border border-gray-700 text-gray-300">
            <div class="text-gray-500">Results will appear here</div>
        </div>
    </div>
</div>

<script>
    // API configuration
    const API_URL = 'http://localhost:8080/api/public/user/token';

    // DOM elements
    const resultsDiv = document.getElementById('results');

    // Display results
    function displayResults(data) {
        let html = '<pre class="text-sm text-gray-300">';
        html += JSON.stringify(data, null, 2);
        html += '</pre>';

        if (data.token) {
            html += '<div class="mt-4 p-4 bg-blue-900 bg-opacity-40 rounded-lg border border-blue-700">';
            html += '<h3 class="font-medium text-blue-400">Token Created</h3>';
            html += '<div class="mt-2 break-all">';
            html += `<strong class="text-gray-200">Token:</strong> <span class="font-mono text-sm text-gray-300">${data.token}</span>`;
            html += '</div>';
            html += '<button id="copy-token-btn" class="mt-2 px-3 py-1 bg-blue-700 text-white text-sm rounded hover:bg-blue-600">Copy Token</button>';
            html += '</div>';
        }

        resultsDiv.innerHTML = html;

        // Add copy button functionality
        const copyBtn = document.getElementById('copy-token-btn');
        if (copyBtn) {
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(data.token)
                    .then(() => {
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => {
                            copyBtn.textContent = 'Copy Token';
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('Failed to copy: ', err);
                    });
            });
        }
    }

    // Create Token
    document.getElementById('create-token-btn').addEventListener('click', async () => {
        const user_id = document.getElementById('user-id').value;
        const sf_instance_token = document.getElementById('sf-token').value;
        let metadata = {};

        try {
            const metadataText = document.getElementById('metadata').value;
            if (metadataText) {
                metadata = JSON.parse(metadataText);
            }
        } catch (e) {
            return displayResults({
                success: false,
                error: 'Invalid metadata JSON',
                details: e.message
            });
        }

        if (!user_id) {
            return displayResults({
                success: false,
                error: 'User ID is required'
            });
        }

        if (!sf_instance_token) {
            return displayResults({
                success: false,
                error: 'Salesforce Instance Token is required'
            });
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    user_id,
                    sf_instance_token,
                    metadata
                })
            });

            const result = await response.json();
            displayResults(result);
        } catch (error) {
            displayResults({
                success: false,
                error: 'Request failed',
                details: error.message
            });
        }
    });

    // Initial message
    displayResults({
        title: "User Token Initialization",
        description: "Enter your User ID and Salesforce Instance Token to initialize your account and get an access token."
    });
</script>
</body>
</html>
