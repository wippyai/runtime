<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Manager</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 20px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            display: grid;
            grid-template-columns: 1fr 2fr;
            grid-template-rows: auto 1fr;
            grid-template-areas:
                "header header"
                "sessions messages";
            height: 100vh;
            gap: 10px;
            box-sizing: border-box;
        }

        #statusHeader {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        #status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .status-connecting { background-color: #664d00; color: #ffcc00; }
        .status-connected { background-color: #145214; color: #4caf50; }
        .status-disconnected { background-color: #5e1414; color: #ff5252; }

        #sessionsPanel {
            grid-area: sessions;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        #sessionsList {
            flex: 1;
            overflow-y: auto;
        }

        #messagesPanel {
            grid-area: messages;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        #messagesContent {
            flex: 1;
            overflow-y: auto;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        button {
            padding: 8px 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #3367d6;
        }

        input, select {
            padding: 8px;
            background-color: #252526;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
        }

        .session-item {
            padding: 10px;
            margin-bottom: 5px;
            background-color: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .session-item:hover {
            background-color: #444;
        }

        .session-item.active {
            background-color: #1e4273;
        }

        .session-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .session-date {
            font-size: 12px;
            color: #aaa;
        }

        .session-model {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .message-item {
            padding: 10px;
            margin-bottom: 10px;
            background-color: #333;
            border-radius: 4px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
        }

        .message-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-human {
            background-color: #1e4273;
        }

        .message-agent {
            background-color: #333;
        }

        .pagination {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
            align-items: center;
        }

        .page-info {
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        #messageCount {
            margin-left: auto;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div id="statusHeader">
    <div>
        <h2>Session Manager</h2>
        <div id="stats"></div>
    </div>
    <div id="status" class="status-disconnected">DISCONNECTED</div>
</div>

<div id="sessionsPanel">
    <div class="controls">
        <h3>Sessions</h3>
        <select id="sessionLimit">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>
        <button id="refreshSessionsBtn">Refresh</button>
        <div id="sessionCount"></div>
    </div>
    <div class="pagination">
        <button id="prevSessionsBtn" disabled>&lt; Previous</button>
        <span class="page-info" id="sessionsPageInfo">Page 1</span>
        <button id="nextSessionsBtn">Next &gt;</button>
    </div>
    <div id="sessionsList">
        <div class="loading">Loading sessions...</div>
    </div>
</div>

<div id="messagesPanel">
    <div class="controls">
        <h3 id="currentSessionTitle">No Session Selected</h3>
        <select id="messageLimit">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
        </select>
        <button id="refreshMessagesBtn" disabled>Refresh</button>
        <div id="messageCount"></div>
    </div>
    <div class="pagination">
        <button id="prevMessagesBtn" disabled>&lt; Previous</button>
        <span class="page-info" id="messagesPageInfo">Page 1</span>
        <button id="nextMessagesBtn" disabled>Next &gt;</button>
    </div>
    <div id="messagesContent">
        <div class="loading">Select a session to view messages</div>
    </div>
</div>

<script>
    // Application state
    const state = {
        token: null,
        authenticated: false,

        // Sessions
        sessions: [],
        sessionsOffset: 0,
        sessionsLimit: 20,
        sessionsTotal: 0,

        // Current session
        currentSessionId: null,
        currentSessionTitle: "",
        currentSessionMessages: [],
        messagesOffset: 0,
        messagesLimit: 50,
        messagesTotal: 0
    };

    // DOM elements
    const statusElement = document.getElementById('status');
    const statsElement = document.getElementById('stats');
    const sessionsListElement = document.getElementById('sessionsList');
    const messagesContentElement = document.getElementById('messagesContent');
    const sessionLimitElement = document.getElementById('sessionLimit');
    const messageLimitElement = document.getElementById('messageLimit');
    const refreshSessionsBtn = document.getElementById('refreshSessionsBtn');
    const refreshMessagesBtn = document.getElementById('refreshMessagesBtn');
    const prevSessionsBtn = document.getElementById('prevSessionsBtn');
    const nextSessionsBtn = document.getElementById('nextSessionsBtn');
    const prevMessagesBtn = document.getElementById('prevMessagesBtn');
    const nextMessagesBtn = document.getElementById('nextMessagesBtn');
    const sessionsPageInfo = document.getElementById('sessionsPageInfo');
    const messagesPageInfo = document.getElementById('messagesPageInfo');
    const sessionCountElement = document.getElementById('sessionCount');
    const messageCountElement = document.getElementById('messageCount');
    const currentSessionTitleElement = document.getElementById('currentSessionTitle');

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
        // Set up event listeners
        sessionLimitElement.addEventListener('change', () => {
            state.sessionsLimit = parseInt(sessionLimitElement.value);
            state.sessionsOffset = 0;
            fetchSessions();
        });

        messageLimitElement.addEventListener('change', () => {
            state.messagesLimit = parseInt(messageLimitElement.value);
            state.messagesOffset = 0;
            if (state.currentSessionId) {
                fetchMessages();
            }
        });

        refreshSessionsBtn.addEventListener('click', fetchSessions);
        refreshMessagesBtn.addEventListener('click', fetchMessages);

        prevSessionsBtn.addEventListener('click', () => {
            if (state.sessionsOffset >= state.sessionsLimit) {
                state.sessionsOffset -= state.sessionsLimit;
                fetchSessions();
            }
        });

        nextSessionsBtn.addEventListener('click', () => {
            if (state.sessionsOffset + state.sessionsLimit < state.sessionsTotal) {
                state.sessionsOffset += state.sessionsLimit;
                fetchSessions();
            }
        });

        prevMessagesBtn.addEventListener('click', () => {
            if (state.messagesOffset >= state.messagesLimit) {
                state.messagesOffset -= state.messagesLimit;
                fetchMessages();
            }
        });

        nextMessagesBtn.addEventListener('click', () => {
            if (state.messagesOffset + state.messagesLimit < state.messagesTotal) {
                state.messagesOffset += state.messagesLimit;
                fetchMessages();
            }
        });

        // Start authentication flow
        authenticateUser();
    });

    // Helper to update connection status
    function updateStatus(status) {
        statusElement.className = `status-${status}`;
        statusElement.textContent = status.toUpperCase();
    }

    // Update stats display
    function updateStats() {
        statsElement.textContent = `Status: ${state.authenticated ? 'Authenticated' : 'Not Authenticated'} | ` +
            `Sessions: ${state.sessionsTotal} | ` +
            `Current Session: ${state.currentSessionId ? state.currentSessionTitle || state.currentSessionId : 'None'}`;
    }

    // Authenticate user to get token
    function authenticateUser() {
        updateStatus('connecting');
        console.log('Starting authentication...');

        // Use hardcoded credentials for demo
        const userData = {
            user_id: 'wolfy-j',
            sf_instance_token: 'abc',
            metadata: {
                role: 'tester',
                testMode: true
            }
        };

        // Determine API URL based on current location
        const apiUrl = `${window.location.protocol}//${window.location.host}/api/public/user/token`;

        console.log(`Requesting token from: ${apiUrl}`);

        fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.token) {
                    state.token = data.token;
                    state.authenticated = true;
                    updateStatus('connected');
                    console.log('Authentication successful');

                    // Fetch sessions after successful authentication
                    fetchSessions();
                } else {
                    throw new Error('Token not received in response');
                }
            })
            .catch(error => {
                console.error(`Authentication failed: ${error.message}`);
                alert(`Authentication failed: ${error.message}`);
                updateStatus('disconnected');
            });
    }

    // Fetch sessions list
    function fetchSessions() {
        if (!state.authenticated) {
            console.error('Not authenticated');
            return;
        }

        // Show loading state
        sessionsListElement.innerHTML = '<div class="loading">Loading sessions...</div>';

        // Get current limit from the dropdown
        state.sessionsLimit = parseInt(sessionLimitElement.value);

        // API URL for sessions endpoint
        const apiUrl = `${window.location.protocol}//${window.location.host}/api/v1/sessions?limit=${state.sessionsLimit}&offset=${state.sessionsOffset}`;

        fetch(apiUrl, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${state.token}`
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    state.sessions = data.sessions || [];
                    state.sessionsTotal = data.count || data.sessions.length;

                    // Update session count display
                    sessionCountElement.textContent = `Total: ${state.sessionsTotal}`;

                    // Update pagination info
                    updateSessionsPagination();

                    // Render sessions
                    renderSessions();

                    // Update stats
                    updateStats();
                } else {
                    throw new Error('Failed to fetch sessions: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error(`Failed to fetch sessions: ${error.message}`);
                sessionsListElement.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            });
    }

    // Update sessions pagination controls
    function updateSessionsPagination() {
        const currentPage = Math.floor(state.sessionsOffset / state.sessionsLimit) + 1;
        const totalPages = Math.max(1, Math.ceil(state.sessionsTotal / state.sessionsLimit));

        sessionsPageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

        // Enable/disable pagination buttons
        prevSessionsBtn.disabled = state.sessionsOffset === 0;
        nextSessionsBtn.disabled = state.sessionsOffset + state.sessionsLimit >= state.sessionsTotal;
    }

    // Render sessions list
    function renderSessions() {
        sessionsListElement.innerHTML = '';

        if (state.sessions.length === 0) {
            sessionsListElement.innerHTML = '<div class="loading">No sessions found</div>';
            return;
        }

        state.sessions.forEach(session => {
            const sessionElement = document.createElement('div');
            sessionElement.className = 'session-item';
            if (session.session_id === state.currentSessionId) {
                sessionElement.classList.add('active');
            }

            const titleElement = document.createElement('div');
            titleElement.className = 'session-title';
            titleElement.textContent = session.title || `Session ${session.session_id.substr(0, 8)}...`;

            const dateElement = document.createElement('div');
            dateElement.className = 'session-date';
            const lastMessageDate = new Date(session.last_message_date * 1000).toLocaleString();
            dateElement.textContent = `Last message: ${lastMessageDate}`;

            const modelElement = document.createElement('div');
            modelElement.className = 'session-model';
            modelElement.textContent = `Model: ${session.current_model || 'Unknown'}`;

            sessionElement.appendChild(titleElement);
            sessionElement.appendChild(dateElement);
            sessionElement.appendChild(modelElement);

            // Add click handler to load session messages
            sessionElement.addEventListener('click', () => {
                // Remove active class from all sessions
                document.querySelectorAll('.session-item.active').forEach(item => {
                    item.classList.remove('active');
                });

                // Add active class to this session
                sessionElement.classList.add('active');

                // Set current session and load messages
                state.currentSessionId = session.session_id;
                state.currentSessionTitle = session.title || `Session ${session.session_id.substr(0, 8)}...`;
                state.messagesOffset = 0;

                // Update the session title display
                currentSessionTitleElement.textContent = state.currentSessionTitle;

                // Enable the refresh messages button
                refreshMessagesBtn.disabled = false;

                // Fetch session details and messages
                fetchSessionDetails();
                fetchMessages();

                // Update stats
                updateStats();
            });

            sessionsListElement.appendChild(sessionElement);
        });
    }

    // Fetch detailed information about a session
    function fetchSessionDetails() {
        if (!state.authenticated || !state.currentSessionId) {
            return;
        }

        const apiUrl = `${window.location.protocol}//${window.location.host}/api/v1/sessions/get?session_id=${encodeURIComponent(state.currentSessionId)}`;

        fetch(apiUrl, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${state.token}`
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // Update message count if available
                    if (data.message_count) {
                        state.messagesTotal = data.message_count;
                        messageCountElement.textContent = `Total: ${state.messagesTotal}`;
                        updateMessagesPagination();
                    }
                } else {
                    throw new Error('Failed to fetch session details: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error(`Failed to fetch session details: ${error.message}`);
            });
    }

    // Fetch messages for the current session
    function fetchMessages() {
        if (!state.authenticated || !state.currentSessionId) {
            return;
        }

        // Show loading state
        messagesContentElement.innerHTML = '<div class="loading">Loading messages...</div>';

        // Get current limit from the dropdown
        state.messagesLimit = parseInt(messageLimitElement.value);

        // API URL for messages endpoint
        const apiUrl = `${window.location.protocol}//${window.location.host}/api/v1/sessions/messages?session_id=${encodeURIComponent(state.currentSessionId)}&limit=${state.messagesLimit}&offset=${state.messagesOffset}`;

        fetch(apiUrl, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${state.token}`
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    state.currentSessionMessages = data.messages || [];

                    // If we don't already have the message count, update it
                    if (data.count !== undefined && !state.messagesTotal) {
                        state.messagesTotal = data.count;
                        messageCountElement.textContent = `Total: ${state.messagesTotal}`;
                    }

                    // Update pagination info
                    updateMessagesPagination();

                    // Render messages
                    renderMessages();
                } else {
                    throw new Error('Failed to fetch messages: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error(`Failed to fetch messages: ${error.message}`);
                messagesContentElement.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            });
    }

    // Update messages pagination controls
    function updateMessagesPagination() {
        const currentPage = Math.floor(state.messagesOffset / state.messagesLimit) + 1;
        const totalPages = Math.max(1, Math.ceil(state.messagesTotal / state.messagesLimit));

        messagesPageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

        // Enable/disable pagination buttons
        prevMessagesBtn.disabled = state.messagesOffset === 0;
        nextMessagesBtn.disabled = state.messagesOffset + state.messagesLimit >= state.messagesTotal;
    }

    // Render messages for the current session
    function renderMessages() {
        messagesContentElement.innerHTML = '';

        if (state.currentSessionMessages.length === 0) {
            messagesContentElement.innerHTML = '<div class="loading">No messages found</div>';
            return;
        }

        // Sort messages from newest to oldest
        const sortedMessages = [...state.currentSessionMessages].sort((a, b) => b.date - a.date);

        sortedMessages.forEach(message => {
            const messageElement = document.createElement('div');
            messageElement.className = 'message-item';

            // Determine message type and add appropriate class
            if (message.type === 'human' || message.type === 'user') {
                messageElement.classList.add('message-human');
            } else {
                messageElement.classList.add('message-agent');
            }

            const headerElement = document.createElement('div');
            headerElement.className = 'message-header';

            const typeElement = document.createElement('span');
            typeElement.textContent = message.type.toUpperCase();

            const dateElement = document.createElement('span');
            const messageDate = new Date(message.date * 1000).toLocaleString();
            dateElement.textContent = messageDate;

            headerElement.appendChild(typeElement);
            headerElement.appendChild(dateElement);

            const contentElement = document.createElement('div');
            contentElement.className = 'message-content';

            // Handle different message data formats
            let messageContent = '';
            if (typeof message.data === 'string') {
                messageContent = message.data;
            } else if (typeof message.data === 'object') {
                if (message.data.text) {
                    messageContent = message.data.text;
                } else {
                    messageContent = JSON.stringify(message.data, null, 2);
                }
            }

            contentElement.textContent = messageContent;

            messageElement.appendChild(headerElement);
            messageElement.appendChild(contentElement);

            messagesContentElement.appendChild(messageElement);
        });
    }
</script>
</body>
</html>
