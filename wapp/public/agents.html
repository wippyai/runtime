<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-transition {
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        .agent-card {
            transition: all 0.2s ease;
        }

        .agent-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 9999px;
            padding: 0.25rem 0.625rem;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 0.375rem;
            margin-bottom: 0.375rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#3B82F6',
                        'secondary': '#1E40AF',
                        'success': '#10B981',
                        'warning': '#F59E0B',
                        'danger': '#EF4444',
                        'neutral': '#6B7280'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 theme-transition">
<div class="container mx-auto p-4 max-w-6xl">
    <!-- Header -->
    <header class="mb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-indigo-600 dark:text-indigo-400" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                <h1 class="text-2xl font-bold">Agents Explorer</h1>
            </div>

            <div class="flex items-center gap-3">
                <!-- Auth Status / Sign Out -->
                <div id="auth-status" class="flex items-center gap-2">
                    <span id="auth-icon" class="text-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm3.707 6.707a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    <span id="auth-text" class="text-sm hidden">Authenticated</span>
                    <button id="logout-btn" class="text-sm text-red-500 hover:text-red-700 ml-2 hidden">Sign Out</button>
                </div>

                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 theme-transition">
                    <!-- Sun icon (shown in dark mode) -->
                    <svg id="light-icon" class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor"
                         viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                              d="M10 2a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0110 2zm7.646 7.36a.75.75 0 01-.392.393l-1.34.67a.75.75 0 01-.669-1.345l1.34-.67a.75.75 0 011.06.953zm-15.293.393a.75.75 0 01-.392-.393.75.75 0 01.954-1.047l1.337.679a.75.75 0 01-.668 1.344l-1.337-.678zM10 5.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9zM3.75 10a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zm11 0a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5a.75.75 0 01-.75-.75zm-3.288 7.894a.75.75 0 01-1.5 0v-1.5a.75.75 0 011.5 0v1.5zm-4.954-3.959a.75.75 0 01-1.06 0l-1.337-1.336a.75.75 0 111.06-1.06l1.337 1.336a.75.75 0 010 1.06zm11.293-1.06a.75.75 0 011.06 1.06l-1.336 1.336a.75.75 0 11-1.06-1.06l1.336-1.336z"></path>
                    </svg>
                    <!-- Moon icon (shown in light mode) -->
                    <svg id="dark-icon" class="w-5 h-5 block dark:hidden text-gray-700" fill="currentColor"
                         viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Discover and explore available agents and their capabilities</p>
    </header>

    <!-- Search and filter -->
    <div class="mb-6 bg-white dark:bg-gray-800 rounded-lg shadow-sm p-4 theme-transition">
        <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <label for="search" class="sr-only">Search agents</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                             fill="currentColor">
                            <path fill-rule="evenodd"
                                  d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                                  clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <input id="search" type="text"
                           class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-700 rounded-md leading-5 bg-white dark:bg-gray-900 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-gray-100 theme-transition"
                           placeholder="Search agents...">
                </div>
            </div>
            <div class="sm:w-64">
                <label for="group-filter" class="sr-only">Filter by group</label>
                <select id="group-filter"
                        class="block w-full pl-3 pr-10 py-2 text-base border border-gray-300 dark:border-gray-700 focus:outline-none sm:text-sm rounded-md bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 theme-transition">
                    <option value="">All groups</option>
                    <!-- Group options will be populated dynamically -->
                </select>
            </div>
            <div class="sm:w-64">
                <label for="tag-filter" class="sr-only">Filter by tag</label>
                <select id="tag-filter"
                        class="block w-full pl-3 pr-10 py-2 text-base border border-gray-300 dark:border-gray-700 focus:outline-none sm:text-sm rounded-md bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 theme-transition">
                    <option value="">All tags</option>
                    <!-- Tag options will be populated dynamically -->
                </select>
            </div>
            <div>
                <button id="refresh-btn"
                        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 theme-transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="bg-white dark:bg-gray-800 rounded-lg shadow-sm p-6 text-center theme-transition">
        <svg class="animate-spin mx-auto h-10 w-10 text-indigo-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-gray-600 dark:text-gray-400">Loading agents...</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state"
         class="hidden bg-white dark:bg-gray-800 rounded-lg shadow-sm p-6 text-center theme-transition">
        <svg class="mx-auto h-12 w-12 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <p class="text-gray-600 dark:text-gray-400 mt-2 mb-4">No agents found</p>
        <button id="empty-refresh-btn"
                class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Reload Agents
        </button>
    </div>

    <!-- Authentication Error -->
    <div id="auth-error" class="hidden bg-white dark:bg-gray-800 rounded-lg shadow-sm p-6 text-center theme-transition">
        <svg class="mx-auto h-12 w-12 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
        <h3 class="mt-4 text-lg font-medium text-gray-900 dark:text-white">Authentication Required</h3>
        <p class="mt-2 text-gray-600 dark:text-gray-400">Please sign in to access the agents list</p>
        <button id="auth-login-btn" class="mt-4 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
            </svg>
            Sign In
        </button>
    </div>

    <!-- Agent groups container -->
    <div id="groups-container" class="hidden space-y-8">
        <!-- Groups will be added here dynamically -->
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full theme-transition">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Authentication Required</h2>
            </div>
            <div class="p-6">
                <p class="mb-4 text-gray-600 dark:text-gray-400">Please enter your API token to continue:</p>
                <div class="space-y-4">
                    <div>
                        <label for="token" class="block text-sm font-medium text-gray-700 dark:text-gray-300">API Token</label>
                        <div class="mt-1">
                            <input type="password" name="token" id="token" class="block w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 theme-transition" placeholder="Enter your token">
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="text-sm">
                            <a href="#" id="token-help" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300"> Need help finding your token? </a>
                        </div>
                        <div class="flex items-center">
                            <input id="remember-token" name="remember-token" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                            <label for="remember-token" class="ml-2 block text-sm text-gray-900 dark:text-gray-300"> Remember token </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-700 flex justify-end space-x-3 rounded-b-lg">
                <button id="cancel-auth" class="py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none theme-transition">
                    Cancel
                </button>
                <button id="submit-auth" class="py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
                    Submit
                </button>
            </div>
        </div>
    </div>

    <script>
        // Theme management
        const themeToggle = document.getElementById('theme-toggle');

        // Check for saved theme preference or use system preference
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Theme toggle button handler
        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // Auth elements
        const authModal = document.getElementById('auth-modal');
        const authLoginBtn = document.getElementById('auth-login-btn');
        const submitAuthBtn = document.getElementById('submit-auth');
        const cancelAuthBtn = document.getElementById('cancel-auth');
        const tokenInput = document.getElementById('token');
        const rememberTokenCheckbox = document.getElementById('remember-token');
        const authError = document.getElementById('auth-error');
        const logoutBtn = document.getElementById('logout-btn');
        const authText = document.getElementById('auth-text');
        const authIcon = document.getElementById('auth-icon');

        // State variables
        let allAgents = [];
        let groupedAgents = {};
        let groups = new Set();
        let tags = new Set();
        let authToken = localStorage.getItem('authToken') || '';

        // Elements
        const loadingState = document.getElementById('loading-state');
        const emptyState = document.getElementById('empty-state');
        const groupsContainer = document.getElementById('groups-container');
        const searchInput = document.getElementById('search');
        const groupFilter = document.getElementById('group-filter');
        const tagFilter = document.getElementById('tag-filter');
        const refreshButton = document.getElementById('refresh-btn');
        const emptyRefreshButton = document.getElementById('empty-refresh-btn');

        // Helper function to generate a random color based on string
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            let color = '#';
            for (let i = 0; i < 3; i++) {
                const value = (hash >> (i * 8)) & 0xFF;
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        }

        // Helper function to get tag pill HTML
        function getTagPill(tag) {
            const color = stringToColor(tag);
            // Create a lighter version for the background
            const bgColor = `${color}20`; // 20% opacity

            return `<span class="tag-pill bg-opacity-20" style="background-color: ${bgColor}; color: ${color};">${tag}</span>`;
        }

        // Manage auth state
        function updateAuthUI() {
            if (authToken) {
                authText.textContent = "Authenticated";
                authText.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                authIcon.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm3.707 6.707a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                `;
                authIcon.classList.remove('text-red-500');
                authIcon.classList.add('text-green-500');
            } else {
                authText.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                authIcon.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                `;
                authIcon.classList.remove('text-green-500');
                authIcon.classList.add('text-red-500');
            }
        }

        // Show auth modal
        function showAuthModal() {
            authModal.classList.remove('hidden');
            tokenInput.value = '';
            tokenInput.focus();
        }

        // Hide auth modal
        function hideAuthModal() {
            authModal.classList.add('hidden');
        }

        // Sign out
        function signOut() {
            authToken = '';
            localStorage.removeItem('authToken');
            updateAuthUI();
            showAuthError();
        }

        // Show auth error
        function showAuthError() {
            loadingState.classList.add('hidden');
            groupsContainer.classList.add('hidden');
            emptyState.classList.add('hidden');
            authError.classList.remove('hidden');
        }

        // Fetch agents from API
        async function fetchAgents() {
            // Check if we have an auth token
            if (!authToken) {
                showAuthError();
                return;
            }

            // Update auth UI
            updateAuthUI();

            // Show loading state
            loadingState.classList.remove('hidden');
            emptyState.classList.add('hidden');
            groupsContainer.classList.add('hidden');
            authError.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/agents/list', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.status === 401) {
                    // Token is invalid or expired
                    authToken = '';
                    localStorage.removeItem('authToken');
                    updateAuthUI();
                    showAuthError();
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to fetch agents');
                }

                allAgents = data.agents || [];
                groupedAgents = data.grouped || {};

                // Extract unique groups and tags
                groups = new Set();
                tags = new Set();

                allAgents.forEach(agent => {
                    // Get groups
                    if (agent.group && agent.group.length > 0) {
                        agent.group.forEach(g => groups.add(g));
                    }

                    // Get tags
                    if (agent.tags && agent.tags.length > 0) {
                        agent.tags.forEach(t => tags.add(t));
                    }
                });

                // Populate group filter
                populateGroupFilter();

                // Populate tag filter
                populateTagFilter();

                // Apply initial filters
                applyFilters();

            } catch (error) {
                console.error('Failed to fetch agents:', error);
                showEmpty();
            } finally {
                loadingState.classList.add('hidden');
            }
        }

        // Populate group filter dropdown
        function populateGroupFilter() {
            // Clear current options (except first "All groups" option)
            while (groupFilter.options.length > 1) {
                groupFilter.remove(1);
            }

            // Add options for each group
            Array.from(groups).sort().forEach(group => {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = group;
                groupFilter.appendChild(option);
            });
        }

        // Populate tag filter dropdown
        function populateTagFilter() {
            // Clear current options (except first "All tags" option)
            while (tagFilter.options.length > 1) {
                tagFilter.remove(1);
            }

            // Add options for each tag
            Array.from(tags).sort().forEach(tag => {
                const option = document.createElement('option');
                option.value = tag;
                option.textContent = tag;
                tagFilter.appendChild(option);
            });
        }

        // Apply filters to agents
        function applyFilters() {
            const searchText = searchInput.value.toLowerCase();
            const selectedGroup = groupFilter.value;
            const selectedTag = tagFilter.value;

            // Create filtered list of agents
            const filteredAgents = allAgents.filter(agent => {
                // Check group filter
                if (selectedGroup && (!agent.group || !agent.group.includes(selectedGroup))) {
                    return false;
                }

                // Check tag filter
                if (selectedTag && (!agent.tags || !agent.tags.includes(selectedTag))) {
                    return false;
                }

                // Check search text
                const nameMatch = agent.name && agent.name.toLowerCase().includes(searchText);
                const titleMatch = agent.title && agent.title.toLowerCase().includes(searchText);
                const commentMatch = agent.comment && agent.comment.toLowerCase().includes(searchText);
                const tagMatch = agent.tags && agent.tags.some(tag => tag.toLowerCase().includes(searchText));

                return nameMatch || titleMatch || commentMatch || tagMatch;
            });

            // Group filtered agents
            const filteredGroups = {};

            filteredAgents.forEach(agent => {
                const groupName = agent.group && agent.group.length > 0 ? agent.group[0] : 'Ungrouped';

                if (!filteredGroups[groupName]) {
                    filteredGroups[groupName] = [];
                }

                filteredGroups[groupName].push(agent);
            });

            renderAgentGroups(filteredGroups);
        }

        // Render agent groups to the container
        function renderAgentGroups(filteredGroups) {
            // Clear container
            groupsContainer.innerHTML = '';

            if (Object.keys(filteredGroups).length === 0) {
                showEmpty();
                return;
            }

            // Show groups container
            groupsContainer.classList.remove('hidden');
            emptyState.classList.add('hidden');
            authError.classList.add('hidden');

            // Sort group names
            const sortedGroupNames = Object.keys(filteredGroups).sort();

            // Render each group
            sortedGroupNames.forEach(groupName => {
                const groupSection = document.createElement('div');
                groupSection.className = 'space-y-4';

                // Group header
                groupSection.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <h2 class="text-xl font-bold">${groupName}</h2>
                        <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
                    </div>
                `;

                // Agent cards container
                const cardsContainer = document.createElement('div');
                cardsContainer.className = 'grid gap-6 grid-cols-1 md:grid-cols-2 xl:grid-cols-3';

                // Sort agents by title within group
                const sortedAgents = filteredGroups[groupName].sort((a, b) => a.title.localeCompare(b.title));

                // Add agent cards
                sortedAgents.forEach(agent => {
                    const card = createAgentCard(agent);
                    cardsContainer.appendChild(card);
                });

                groupSection.appendChild(cardsContainer);
                groupsContainer.appendChild(groupSection);
            });
        }

        // Create agent card element
        function createAgentCard(agent) {
            const card = document.createElement('div');
            card.className = 'agent-card bg-white dark:bg-gray-800 rounded-lg shadow-sm overflow-hidden theme-transition';

            // Generate tags HTML
            const tagsHtml = agent.tags && agent.tags.length > 0 ?
                agent.tags.map(tag => getTagPill(tag)).join('') :
                '<span class="text-gray-400 text-xs italic">No tags</span>';

            // Generate icon based on agent.icon or fallback
            const iconHtml = agent.icon ?
                `<span class="text-lg">${agent.icon}</span>` :
                `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>`;

            // Build card HTML
            card.innerHTML = `
                <div class="bg-gray-100 dark:bg-gray-700 p-4 theme-transition">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center space-x-2">
                            ${iconHtml}
                            <h3 class="font-semibold text-lg truncate">${agent.title}</h3>
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 truncate mt-1">${agent.name}</p>
                </div>
                <div class="p-4">
                    <p class="text-gray-700 dark:text-gray-300 text-sm mb-4 line-clamp-2">${agent.comment || 'No description available'}</p>
                    <div class="mt-2">
                        ${tagsHtml}
                    </div>
                </div>
            `;

            return card;
        }

        // Show empty state
        function showEmpty() {
            emptyState.classList.remove('hidden');
            groupsContainer.classList.add('hidden');
            loadingState.classList.add('hidden');
            authError.classList.add('hidden');
        }

        // Auth event handlers
        authLoginBtn.addEventListener('click', showAuthModal);

        logoutBtn.addEventListener('click', signOut);

        submitAuthBtn.addEventListener('click', () => {
            const token = tokenInput.value.trim();
            if (token) {
                authToken = token;
                if (rememberTokenCheckbox.checked) {
                    localStorage.setItem('authToken', token);
                }
                hideAuthModal();
                fetchAgents();
            }
        });

        cancelAuthBtn.addEventListener('click', hideAuthModal);

        // Handle Enter key in token input
        tokenInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                submitAuthBtn.click();
            }
        });

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            if (authToken) {
                fetchAgents();
            } else {
                showAuthError();
            }
        });

        refreshButton.addEventListener('click', fetchAgents);
        emptyRefreshButton.addEventListener('click', fetchAgents);
        searchInput.addEventListener('input', applyFilters);
        groupFilter.addEventListener('change', applyFilters);
        tagFilter.addEventListener('change', applyFilters);
    </script>
</div>
</body>
</html>
