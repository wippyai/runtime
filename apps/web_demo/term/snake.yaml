name: default_terminal
kind: terminal.lua
meta:
  comment: "Snake"

source: file://snake.lua
method: App

options:
  alt_screen: true
  title: "Snake game"
  mouse: "cell"
  disable_signals: false

lifecycle:
  auto_start: true
  startup_timeout: "5s"
  shutdown_timeout: "3s"
  retry_policy:
    max_retries: 0
    initial_delay: "10s"