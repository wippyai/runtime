name: endpoints.get_time
kind: http.endpoint
meta:
  server: service.web_server
  router: service.api_router
  comment: "Returns the current time."
  depends_on:
    - functions.http_time
    - service.web_server
    - service.api_router

# Endpoint configuration
method: GET
path: /time
target: functions.local_time_func
json_output: true