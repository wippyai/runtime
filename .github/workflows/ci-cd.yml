# SPDX-License-Identifier: MPL-2.0

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run linter
        env:
          CGO_ENABLED: 1
          GOFLAGS: -buildvcs=false
        run: make lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup msys (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-sqlite3
          path-type: inherit

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
        env:
          MSYSTEM: MINGW64

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: go mod download

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: go mod download

      - name: Run tests
        if: matrix.os != 'windows-latest'
        env:
          GORACE: "halt_on_error=1"
          SKIP_TEMPORAL_TESTS: "1"
          SKIP_CLOUDSTORAGE_TESTS: "1"
          SKIP_DOCKER_TESTS: "1"
        run: make test

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          GORACE: "halt_on_error=1"
          SKIP_TEMPORAL_TESTS: "1"
          SKIP_CLOUDSTORAGE_TESTS: "1"
          SKIP_DOCKER_TESTS: "1"
        run: make test
