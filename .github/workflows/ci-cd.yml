name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  # Combined lint, test and build job - optimized to avoid duplication
  lint-test-build:
    name: Lint, Test & Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            run_lint: true
          - os: "ubuntu-latest"
            run_lint: false
          - os: "windows-latest"
            run_lint: false

    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_IGOR }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ env.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup msys (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-sqlite3
          path-type: inherit

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: false
          token: ${{ env.GITHUB_TOKEN }}
          cache: true
        env:
          MSYSTEM: MINGW64

      - name: Configure Git and Go for private modules
        if: matrix.os != 'windows-latest'
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*

      - name: Configure Git and Go for private modules (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: go mod download

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: go mod download

      # Run linter only on Ubuntu AMD64 to avoid duplication
      - name: Run linter
        if: matrix.os == 'ubuntu-latest' && matrix.run_lint == true
        uses: golangci/golangci-lint-action@v8.0.0
        env:
          CGO_ENABLED: 1
        with:
          version: latest
          only-new-issues: false
          args: --timeout=10m --build-tags=race ./...

      - name: Run unit tests
        if: matrix.os != 'windows-latest'
        env:
          GORACE: "halt_on_error=1"
        run: make test

      - name: Run unit tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          GORACE: "halt_on_error=1"
        run: make test
