name: Tests and Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  tests:
    name: Wippy Tests (Go ${{ matrix.go }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        go: [1.24]
        os: ["ubuntu-latest", "windows-latest"]
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_IGOR }}
      RELEASE_REPO: wippyai/wippy-releases
      BINARY_NAME: wippy
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ env.GITHUB_TOKEN }}  # Use PAT with repo scope for cross-org access

      - name: Setup msys
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-sqlite3
          path-type: inherit

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: false
          token: ${{ env.GITHUB_TOKEN }}
          cache: true
        env:
          MSYSTEM: MINGW64

      - name: Configure Git and Go for private modules
        if: matrix.os != 'windows-latest'
        run: |
          # Configure Git to use token from environment
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Configure Go to skip verification for private modules
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*

      - name: Configure Git and Go for private modules (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          # Configure Git to use token from environment
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Configure Go to skip verification for private modules
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*

      - name: Install Go dependencies
        if: matrix.os != 'windows-latest'
        run: go mod download

      - name: Install Go dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: go mod download

      - name: Run unit tests
        if: matrix.os != 'windows-latest'
        env:
          CGO_ENABLED: 1
          GORACE: "halt_on_error=1"
        run: make test

      - name: Run unit tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GORACE: "halt_on_error=1"
        run: make test

      # Build binaries using Makefile
      - name: Install cross-compilation tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross libsqlite3-dev mingw-w64 zip

      - name: Build all binaries (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: 1
        run: |
          make build-runner-local
          # Rename binaries to wippy-platform format
          cd ./dist
          for file in runner-*; do
            if [ -f "$file" ]; then
              # Extract platform info from original filename
              platform=$(echo "$file" | sed 's/runner-//' | sed 's/\.exe$//')
              new_name="wippy-${platform}"
              if [[ "$file" == *".exe" ]]; then
                new_name="${new_name}.exe"
              fi
              mv "$file" "$new_name"
              echo "✅ Renamed $file to $new_name"
            fi
          done
          ls -la

      # Upload artifacts from each job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wippy-binaries-${{ matrix.os }}-${{ matrix.go }}
          path: ./dist/
          retention-days: 7

  # Upload binaries to release repository
  upload-binaries:
    name: Upload Binaries to Release Repository
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_IGOR }}
      RELEASE_REPO: wippyai/wippy-releases
      
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ env.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/

      - name: List available binaries
        run: |
          echo "📦 Available binaries in dist:"
          ls -la ./dist/ || echo "No binaries found"

      - name: Checkout release repository
        run: |
          git clone https://${GITHUB_TOKEN}@github.com/${RELEASE_REPO}.git release-repo
          cd release-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy binaries to release repository
        run: |
          # Copy binaries to the appropriate timestamp directory
          BUILD_TIMESTAMP=$(date +%Y-%m-%d-%H-%M)
          mkdir -p ./release-repo/releases/wippy/$BUILD_TIMESTAMP
          cp -r ./dist/* ./release-repo/releases/wippy/$BUILD_TIMESTAMP/ 2>/dev/null || true
          
          echo "📁 Files to be committed:"
          find ./release-repo/releases/wippy/$BUILD_TIMESTAMP/ -type f | head -20

      - name: Generate README.md for release
        run: |
          BUILD_TIMESTAMP=$(date +%Y-%m-%d-%H-%M)
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          RUN_ID="${GITHUB_RUN_ID}"
          
          # Get Go version from the build
          GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
          
          # Create README.md content
          echo "# Wippy Release" > ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "## Downloads" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          
          # Add download links for each binary
          for file in ./dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              platform=""
              case "$filename" in
                *linux-amd64*) platform="Linux AMD64" ;;
                *linux-arm64*) platform="Linux ARM64" ;;
                *windows-amd64*) platform="Windows AMD64" ;;
                *windows-arm64*) platform="Windows ARM64" ;;
                *darwin-amd64*) platform="macOS AMD64" ;;
                *darwin-arm64*) platform="macOS ARM64" ;;
                *) platform="Unknown" ;;
              esac
              
              if [ "$platform" != "Unknown" ]; then
                echo "- **$platform**: [$filename](https://github.com/${{ env.RELEASE_REPO }}/raw/main/releases/wippy/$BUILD_TIMESTAMP/$filename)" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
              fi
          done
          
          # Add build information
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "## Build Information" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "- **Branch**: $BRANCH_NAME" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "- **Commit**: $GITHUB_SHA" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "- **Pipeline**: $RUN_ID" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "- **Build Date**: $BUILD_DATE" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "- **Go Version**: $GO_VERSION" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "## Installation" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "Download the appropriate binary for your platform and make it executable:" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "\`\`\`bash" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "# Linux/macOS" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "chmod +x wippy-linux-amd64" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "./wippy-linux-amd64 --help" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "# Windows" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "wippy-windows-amd64.exe --help" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          echo "\`\`\`" >> ./release-repo/releases/wippy/$BUILD_TIMESTAMP/README.md
          
          echo "✅ Generated README.md for release $BUILD_TIMESTAMP"

      - name: Commit and push to release repository
        run: |
          cd ./release-repo
          
          BUILD_TIMESTAMP=$(date +%Y-%m-%d-%H-%M)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add binaries for build ${BUILD_TIMESTAMP}_${SHORT_SHA}"
            git push origin main
            echo "✅ Committed and pushed changes"
          fi

      - name: Summary
        run: |
          BUILD_TIMESTAMP=$(date +%Y-%m-%d-%H-%M)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          
          echo "## 📦 Binaries Uploaded!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Timestamp:** $BUILD_TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$SHORT_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Release Directory:" >> $GITHUB_STEP_SUMMARY
          echo "- \`releases/wippy/$BUILD_TIMESTAMP/\` - This build binaries and README.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [Release Directory](https://github.com/${{ env.RELEASE_REPO }}/tree/main/releases/wippy/$BUILD_TIMESTAMP)" >> $GITHUB_STEP_SUMMARY
          echo "- [README.md](https://github.com/${{ env.RELEASE_REPO }}/blob/main/releases/wippy/$BUILD_TIMESTAMP/README.md)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Available Binaries:" >> $GITHUB_STEP_SUMMARY
          if [ -d "./dist" ]; then
            for file in ./dist/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(stat -c%s "$file" 2>/dev/null || echo "Unknown")
                if [ "$size" != "Unknown" ] && [ "$size" -gt 0 ]; then
                  if [ "$size" -lt 1024 ]; then
                    size_str="${size}B"
                  elif [ "$size" -lt 1048576 ]; then
                    size_str="$(( size / 1024 ))KB"
                  else
                    size_str="$(( size / 1048576 ))MB"
                  fi
                  echo "- \`$filename\` ($size_str)" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done
          fi
