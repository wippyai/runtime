name: Tests and Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  tests:
    name: Wippy Tests (Go ${{ matrix.go }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        go: [1.24]
        os: ["ubuntu-latest", "windows-latest"]
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_IGOR }}
      RELEASE_REPO: wippyai/wippy-releases
      BINARY_NAME: wippy
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ env.GITHUB_TOKEN }}  # Use PAT with repo scope for cross-org access

      - name: Setup msys
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-sqlite3
          path-type: inherit

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: false
          token: ${{ env.GITHUB_TOKEN }}
          cache: true
        env:
          MSYSTEM: MINGW64

      - name: Configure Git and Go for private modules
        if: matrix.os != 'windows-latest'
        run: |
          # Configure Git to use token from environment
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Configure Go to skip verification for private modules
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*

      - name: Configure Git and Go for private modules (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          # Configure Git to use token from environment
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Configure Go to skip verification for private modules
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*

      - name: Install Go dependencies
        if: matrix.os != 'windows-latest'
        run: go mod download

      - name: Install Go dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: go mod download

      - name: Run unit tests
        if: matrix.os != 'windows-latest'
        env:
          CGO_ENABLED: 1
          GORACE: "halt_on_error=1"
        run: make test

      - name: Run unit tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GORACE: "halt_on_error=1"
        run: make test

      # Build binaries using Makefile
      - name: Install Linux cross-compilation tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross libsqlite3-dev zip

      - name: Build Linux binaries (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: 1
        run: |
          make build-runner-linux-amd64
          make build-runner-linux-arm64
          # Rename binaries to wippy-platform format
          cd ./dist
          for file in runner-*; do
            if [ -f "$file" ]; then
              # Extract platform info from original filename
              platform=$(echo "$file" | sed 's/runner-//' | sed 's/\.exe$//')
              new_name="wippy-${platform}"
              if [[ "$file" == *".exe" ]]; then
                new_name="${new_name}.exe"
              fi
              mv "$file" "$new_name"
              echo "✅ Renamed $file to $new_name"
            fi
          done
          ls -la

      - name: Build Windows binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
        run: |
          make build-runner-windows-amd64
          # Note: Windows ARM64 build disabled - not supported on standard Windows runner
          # Rename binaries to wippy-platform format
          cd ./dist
          for file in runner-*; do
            if [ -f "$file" ]; then
              # Extract platform info from original filename
              platform=$(echo "$file" | sed 's/runner-//' | sed 's/\.exe$//')
              new_name="wippy-${platform}"
              if [[ "$file" == *".exe" ]]; then
                new_name="${new_name}.exe"
              fi
              mv "$file" "$new_name"
              echo "✅ Renamed $file to $new_name"
            fi
          done
          ls -la

      # Upload artifacts from each job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wippy-binaries-${{ matrix.os }}-${{ matrix.go }}
          path: ./dist/
          retention-days: 30

  # Create PR build summary (no binary upload)
  pr-summary:
    name: PR Build Summary
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Generate build summary
        run: |
          echo "## 📦 Build Summary for PR #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Built Binaries:" >> $GITHUB_STEP_SUMMARY
          
          # Extract binaries from all artifacts
          for artifact_dir in ./artifacts/wippy-binaries-*; do
            if [ -d "$artifact_dir" ]; then
              echo "📦 From $artifact_dir:" >> $GITHUB_STEP_SUMMARY
              for file in "$artifact_dir"/*; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file")
                  size=$(stat -c%s "$file" 2>/dev/null || echo "Unknown")
                  if [ "$size" != "Unknown" ] && [ "$size" -gt 0 ]; then
                    if [ "$size" -lt 1024 ]; then
                      size_str="${size}B"
                    elif [ "$size" -lt 1048576 ]; then
                      size_str="$(( size / 1024 ))KB"
                    else
                      size_str="$(( size / 1048576 ))MB"
                    fi
                    echo "- \`$filename\` ($size_str)" >> $GITHUB_STEP_SUMMARY
                  fi
                fi
              done
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ Note:" >> $GITHUB_STEP_SUMMARY
          echo "Binaries are available as build artifacts for 30 days. For releases, use GitHub Releases." >> $GITHUB_STEP_SUMMARY
