#        if: matrix.os == 'windows-latest'
#        shell: msys2 {0}
#        env:
#          CGO_ENABLED: 1
#          GORACE: "halt_on_error=1"
#        run: make test-integration-ci

      - name: Run unit tests
        if: matrix.os != 'windows-latest'
        env:
          CGO_ENABLED: 1
          GORACE: "halt_on_error=1"
        run: make test-unit-ci

      - name: Run unit tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GORACE: "halt_on_error=1"
        run: make test-unit-ci
