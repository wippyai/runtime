name: Native Exec Cross Platform Test

on:
  push:
    branches: [ main ]
    paths:
      - 'service/exec/native/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'service/exec/native/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-run:
    name: Build and Run on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Go program
        run: |
          # Build the program from the specific testdata directory
          go build -v -o test-app${{ runner.os == 'windows-latest' && '.exe' || '' }} ./service/exec/native/testdata
        shell: bash

      - name: Run executable
        run: |
          if [[ "${{ runner.os }}" == "windows-latest" ]]; then
            .\test-app.exe
          else
            ./test-app
          fi
        shell: bash
