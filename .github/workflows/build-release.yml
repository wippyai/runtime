name: Build and Publish Cross-Platform Binaries

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-publish:
    name: Build and Publish Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_IGOR }}
      RELEASE_REPO: wippyai/wippy-releases
      BINARY_NAME: wippy
      
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ env.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          check-latest: false
          token: ${{ env.GITHUB_TOKEN }}
          cache: true

      - name: Configure Git and Go for private modules
        run: |
          # Configure Git to use token from environment
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Configure Go to skip verification for private modules
          go env -w GOPRIVATE=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOSUMDB=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w GONOPROXY=github.com/ponyruntime/*,github.com/wippyai/*
          go env -w CGO_ENABLED=1

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu libc6-dev-arm64-cross libsqlite3-dev mingw-w64 zip

      - name: Install Go dependencies
        run: go mod download

      - name: Build Linux AMD64
        run: |
          mkdir -p ./dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build --tags "fts5 sqlite_vec" -o ./dist/wippy-linux-amd64 ./cmd/runner/

      - name: Build Linux ARM64
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build --tags "fts5 sqlite_vec" -o ./dist/wippy-linux-arm64 ./cmd/runner/
        continue-on-error: true

      - name: Build Windows AMD64
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build --tags "fts5 sqlite_vec" -o ./dist/wippy-windows-amd64.exe ./cmd/runner/
        continue-on-error: true

      - name: Build Windows ARM64
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=arm64 CC=aarch64-w64-mingw32-gcc go build --tags "fts5 sqlite_vec" -o ./dist/wippy-windows-arm64.exe ./cmd/runner/
        continue-on-error: true

      - name: Build macOS AMD64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build --tags "fts5 sqlite_vec" -o ./dist/wippy-darwin-amd64 ./cmd/runner/
        continue-on-error: true

      - name: Build macOS ARM64
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build --tags "fts5 sqlite_vec" -o ./dist/wippy-darwin-arm64 ./cmd/runner/
        continue-on-error: true

      - name: Create release directory structure
        run: |
          # Create dated folder structure
          DATE=$(date +%Y-%m-%d)
          PR_NUMBER=${{ github.event.number }}
          RELEASE_DIR="${DATE}_pr-${PR_NUMBER}"
          
          mkdir -p ./release-artifacts/${RELEASE_DIR}
          
          # Create Linux archives (only if binaries exist)
          cd ./dist
          if [ -f wippy-linux-amd64 ]; then
            tar -czf ../release-artifacts/${RELEASE_DIR}/linux-amd64.tar.gz wippy-linux-amd64
            echo "✅ Created linux-amd64.tar.gz"
          else
            echo "⚠️  Skipping linux-amd64 (binary not found)"
          fi
          
          if [ -f wippy-linux-arm64 ]; then
            tar -czf ../release-artifacts/${RELEASE_DIR}/linux-arm64.tar.gz wippy-linux-arm64
            echo "✅ Created linux-arm64.tar.gz"
          else
            echo "⚠️  Skipping linux-arm64 (binary not found)"
          fi
          
          # Create Windows archives (only if binaries exist)
          if [ -f wippy-windows-amd64.exe ]; then
            zip ../release-artifacts/${RELEASE_DIR}/windows-amd64.zip wippy-windows-amd64.exe
            echo "✅ Created windows-amd64.zip"
          else
            echo "⚠️  Skipping windows-amd64 (binary not found)"
          fi
          
          if [ -f wippy-windows-arm64.exe ]; then
            zip ../release-artifacts/${RELEASE_DIR}/windows-arm64.zip wippy-windows-arm64.exe
            echo "✅ Created windows-arm64.zip"
          else
            echo "⚠️  Skipping windows-arm64 (binary not found)"
          fi
          
          # Create macOS archives (only if binaries exist)
          if [ -f wippy-darwin-amd64 ]; then
            tar -czf ../release-artifacts/${RELEASE_DIR}/darwin-amd64.tar.gz wippy-darwin-amd64
            echo "✅ Created darwin-amd64.tar.gz"
          else
            echo "⚠️  Skipping darwin-amd64 (binary not found)"
          fi
          
          if [ -f wippy-darwin-arm64 ]; then
            tar -czf ../release-artifacts/${RELEASE_DIR}/darwin-arm64.tar.gz wippy-darwin-arm64
            echo "✅ Created darwin-arm64.tar.gz"
          else
            echo "⚠️  Skipping darwin-arm64 (binary not found)"
          fi
          
          cd ..
          
          # List created artifacts
          echo "📦 Created artifacts:"
          ls -la ./release-artifacts/${RELEASE_DIR}/

      - name: Checkout release repository
        run: |
          git clone https://${GITHUB_TOKEN}@github.com/${RELEASE_REPO}.git release-repo
          cd release-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy artifacts to release repository
        run: |
          DATE=$(date +%Y-%m-%d)
          PR_NUMBER=${{ github.event.number }}
          RELEASE_DIR="${DATE}_pr-${PR_NUMBER}"
          
          # Copy all artifacts to the release repository
          cp -r ./release-artifacts/${RELEASE_DIR}/* ./release-repo/
          
          # Create a latest symlink for easy access
          cd ./release-repo
          rm -f latest_pr-${PR_NUMBER}
          ln -sf ${RELEASE_DIR} latest_pr-${PR_NUMBER}

      - name: Commit and push to release repository
        run: |
          cd ./release-repo
          
          DATE=$(date +%Y-%m-%d)
          PR_NUMBER=${{ github.event.number }}
          RELEASE_DIR="${DATE}_pr-${PR_NUMBER}"
          
          git add .
          git commit -m "Add binaries for PR #${PR_NUMBER} (${RELEASE_DIR})"
          git push origin main

      - name: Upload artifacts as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wippy-binaries-pr-${{ github.event.number }}
          path: ./release-artifacts/
          retention-days: 30

      - name: Summary
        run: |
          echo "## 🚀 Cross-Platform Binaries Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Request:** #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release Directory:** $(date +%Y-%m-%d)_pr-${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Available Binaries:" >> $GITHUB_STEP_SUMMARY
          
          # Check which binaries were actually created
          DATE=$(date +%Y-%m-%d)
          PR_NUMBER=${{ github.event.number }}
          RELEASE_DIR="${DATE}_pr-${PR_NUMBER}"
          
          echo "**Linux:**" >> $GITHUB_STEP_SUMMARY
          if [ -f ./release-artifacts/${RELEASE_DIR}/linux-amd64.tar.gz ]; then
            echo "- ✅ amd64 (tar.gz)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ amd64 (failed to build)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f ./release-artifacts/${RELEASE_DIR}/linux-arm64.tar.gz ]; then
            echo "- ✅ arm64 (tar.gz)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ arm64 (failed to build)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Windows:**" >> $GITHUB_STEP_SUMMARY
          if [ -f ./release-artifacts/${RELEASE_DIR}/windows-amd64.zip ]; then
            echo "- ✅ amd64 (zip)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ amd64 (failed to build)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f ./release-artifacts/${RELEASE_DIR}/windows-arm64.zip ]; then
            echo "- ✅ arm64 (zip)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ arm64 (failed to build)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**macOS:**" >> $GITHUB_STEP_SUMMARY
          if [ -f ./release-artifacts/${RELEASE_DIR}/darwin-amd64.tar.gz ]; then
            echo "- ✅ amd64 (tar.gz)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ amd64 (failed to build)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f ./release-artifacts/${RELEASE_DIR}/darwin-arm64.tar.gz ]; then
            echo "- ✅ arm64 (tar.gz)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ arm64 (failed to build)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Download Links:" >> $GITHUB_STEP_SUMMARY
          echo "Binaries are available in the [wippy-releases](https://github.com/wippyai/wippy-releases) repository." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Direct folder:** \`$(date +%Y-%m-%d)_pr-${{ github.event.number }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "**Latest symlink:** \`latest_pr-${{ github.event.number }}/\`" >> $GITHUB_STEP_SUMMARY
