version: "1.0"
namespace: app.test.temporal

entries:
  # Temporal client configuration
  - name: test_client
    kind: temporal.client
    address: localhost:7233
    namespace: default
    auth:
      type: none
    lifecycle:
      auto_start: true

  # Temporal worker configuration - handles activities and workflows
  - name: test_worker
    kind: temporal.worker
    client: app.test.temporal:test_client
    task_queue: test-queue
    worker_options:
      max_concurrent_activity_execution_size: 10
      max_concurrent_workflow_task_execution_size: 10
    lifecycle:
      auto_start: true
