version: "1.0"
namespace: app.test.temporal

entries:
  # Temporal client configuration
  - name: test_client
    kind: temporal.client
    address: localhost:7233
    namespace: default
    auth:
      type: none
    lifecycle:
      auto_start: true

  # Temporal worker configuration - handles activities and workflows
  - name: test_worker
    kind: temporal.worker
    client: app.test.temporal:test_client
    task_queue: test-queue
    worker_options:
      max_concurrent_activity_execution_size: 10
      max_concurrent_workflow_task_execution_size: 10
    lifecycle:
      auto_start: true

  # Echo activity - simple echo for testing
  - name: echo_activity
    kind: function.lua
    source: file://echo_activity.lua
    method: main
    meta:
      temporal:
        activity:
          worker: app.test.temporal:test_worker

  # ProcessData activity - processes data with id and name
  - name: process_data
    kind: function.lua
    source: file://process_data.lua
    method: main
    meta:
      temporal:
        activity:
          worker: app.test.temporal:test_worker

  # Hello workflow - simple workflow that returns a greeting
  - name: hello_workflow
    kind: workflow.lua
    source: file://hello_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Concurrent workflow - demonstrates coroutines, channels, and timers
  - name: concurrent_workflow
    kind: workflow.lua
    source: file://concurrent_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Timed workflow - demonstrates time progression with multiple sleeps
  - name: timed_workflow
    kind: workflow.lua
    source: file://timed_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Activity workflow - demonstrates calling activities via funcs.call
  - name: activity_workflow
    kind: workflow.lua
    source: file://activity_workflow.lua
    method: main
    modules:
      - funcs
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Signal workflow - demonstrates receiving signals and calling activities
  - name: signal_workflow
    kind: workflow.lua
    source: file://signal_workflow.lua
    method: main
    modules:
      - funcs
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Long-running workflow - for cancellation testing
  - name: long_workflow
    kind: workflow.lua
    source: file://long_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Inbox workflow - receives signals via process.inbox()
  - name: inbox_workflow
    kind: workflow.lua
    source: file://inbox_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Child workflow - simple child that returns a result
  - name: child_workflow
    kind: workflow.lua
    source: file://child_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Spawn child workflow - spawns child and waits for EXIT event
  - name: spawn_child_workflow
    kind: workflow.lua
    source: file://spawn_child_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Error child workflow - child that returns an error
  - name: error_child_workflow
    kind: workflow.lua
    source: file://error_child_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Spawn error child workflow - spawns child that errors and captures error
  - name: spawn_error_child_workflow
    kind: workflow.lua
    source: file://spawn_error_child_workflow.lua
    method: main
    modules:
      - time
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker

  # Error activity - activity that returns an error with specific kind
  - name: error_activity
    kind: function.lua
    source: file://error_activity.lua
    method: main
    meta:
      temporal:
        activity:
          worker: app.test.temporal:test_worker

  # Activity error workflow - calls activity that errors and captures error
  - name: activity_error_workflow
    kind: workflow.lua
    source: file://activity_error_workflow.lua
    method: main
    modules:
      - funcs
    meta:
      temporal:
        workflow:
          worker: app.test.temporal:test_worker
