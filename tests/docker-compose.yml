version: '3.8'

services:
  # OpenTelemetry / Jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.48
    ports:
      - "5775:5775/udp"   # Agent
      - "6831:6831/udp"   # Agent
      - "6832:6832/udp"   # Agent
      - "5778:5778"       # Agent
      - "16686:16686"     # UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - otel-network

  # Temporal PostgreSQL
  temporal-postgresql:
    image: postgres:17
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U temporal" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:1.29.1
    container_name: temporal
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
    ports:
      - "7233:7233"
    networks:
      - temporal-network
    healthcheck:
      test: [ "CMD", "tctl", "--address", "temporal:7233", "workflow", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Temporal Web UI
  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - temporal-network

  # Temporal Admin Tools
  temporal-admin-tools:
    image: temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0
    container_name: temporal-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    stdin_open: true
    tty: true
    networks:
      - temporal-network

  # RabbitMQ with Management UI
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - rabbitmq-logs:/var/log/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application PostgreSQL
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: wippy
      POSTGRES_PASSWORD: wippy
      POSTGRES_DB: wippy
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wippy" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console
    volumes:
      - minio-data:/data
    networks:
      - app-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ElasticMQ (SQS-compatible message queue) for SQS queue driver tests.
  # Lightweight alternative to LocalStack when only SQS is needed.
  elasticmq:
    image: softwaremill/elasticmq-native:1.6.11
    container_name: elasticmq
    ports:
      - "9324:9324"    # REST API
      - "9325:9325"    # Management UI
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9325/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  # Tor SOCKS5 Proxy for network overlay tests
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: tor-proxy
    ports:
      - "9050:9050"       # SOCKS5 proxy
    networks:
      - overlay-network
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9050 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Lightweight SOCKS5 proxy for fast overlay-network tests
  socks5-proxy:
    image: serjs/go-socks5-proxy:latest
    container_name: socks5-proxy
    environment:
      REQUIRE_AUTH: "false"
      PROXY_PORT: "1080"
    ports:
      - "1080:1080"       # SOCKS5 proxy
    networks:
      - overlay-network
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 1080 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  # I2P Router with SAM bridge for network overlay tests
  i2p:
    image: geti2p/i2p:latest
    container_name: i2p
    ports:
      - "7656:7656"       # SAM bridge
      - "7657:7657"       # HTTP console
      - "4444:4444"       # HTTP proxy
    networks:
      - overlay-network
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 7656 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  # Headscale (self-hosted Tailscale control server) for overlay tests
  headscale:
    image: headscale/headscale:0.23
    container_name: headscale
    command: serve
    ports:
      - "8090:8080"       # gRPC/HTTP control plane
    volumes:
      - headscale-data:/var/lib/headscale
      - ./headscale/config.yaml:/etc/headscale/config.yaml:ro
    networks:
      - overlay-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # MinIO Client for bucket setup
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/test-bucket;
      mc anonymous set public myminio/test-bucket;
      mc version enable myminio/test-bucket;
      exit 0;
      "

volumes:
  temporal-postgres-data:
  rabbitmq-data:
  rabbitmq-logs:
  postgres-data:
  minio-data:
  headscale-data:

networks:
  otel-network:
    driver: bridge
  temporal-network:
    driver: bridge
  app-network:
    driver: bridge
  overlay-network:
    driver: bridge
