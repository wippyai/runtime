version: '3'

services:
  jaeger:
    image: jaegertracing/all-in-one:1.48
    ports:
      - "5775:5775/udp"   # Agent
      - "6831:6831/udp"   # Agent
      - "6832:6832/udp"   # Agent
      - "5778:5778"       # Agent
      - "16686:16686"     # UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - otel-network
networks:
  otel-network:
    driver: bridge
