version: "1.0"
namespace: system

entries:
  - name: db
    kind: database.sqlite
    meta:
      comment: Test SQLite database
    file: "./data/test.db"
    
  - name: gateway
    kind: http.server
    meta:
      comment: Test HTTP server
    bind: "127.0.0.1"
    port: 8086
    public: "./public"
    
  - name: api
    kind: http.router
    meta:
      comment: Test API router
    path: "/api"
    server: system:gateway
    
  - name: processes
    kind: process.host
    meta:
      comment: Test process host

