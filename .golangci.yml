version: "2"
run:
  allow-parallel-runners: true
linters:
  disable-all: true
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - dogsled
    - errcheck
    - errorlint
    - exhaustive
    - gocritic
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 3
    godot:
      scope: declarations
      capital: true
    lll:
      line-length: 120
    misspell:
      locale: US
    nolintlint:
      require-specific: true
      require-explanation: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    wsl:
      allow-assign-and-anything: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - gocognit
          - scopelint
        path: _test\.go
    paths:
      - .github
      - .git
      - third_party$
      - builtin$
      - examples$
      - github.com/yuin/gopher-lua
      - github.com/ponyruntime/go-lua
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .github
      - .git
      - third_party$
      - builtin$
      - examples$
issues:
  fix: true