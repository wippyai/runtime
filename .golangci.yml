run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - errcheck
    - errorlint
    - exhaustive
    - gocritic
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - nilnil
    - prealloc
    - revive
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        api-boundary:
          files:
            - api/**
          deny:
            - pkg: github.com/wippyai/runtime/service
              desc: "api packages must not depend on service implementations"
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
      disable-default-exclusions: true
    goconst:
      min-len: 2
      min-occurrences: 3
    godot:
      scope: declarations
      capital: true
    govet:
      enable-all: true
      settings:
        nilness:
          enabled: true
    lll:
      line-length: 120
    misspell:
      locale: US
    nilnil:
      checked-types:
        - ptr
        - func
        - iface
        - map
        - chan
    nolintlint:
      require-specific: true
      require-explanation: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    staticcheck:
      checks: ["all"]
    wsl:
      allow-assign-and-anything: true
  exclusions:
    generated: lax
    presets:
      - comments
    rules:
      - linters:
          - dupl
          - funlen
          - gocognit
          - scopelint
        path: _test\.go
      - linters:
          - errcheck
        text: "Error return value of.*Close.*is not checked"
        path: _test\.go
    paths:
      - .github
      - .git
      - 
      - third_party$
      - builtin$
      - examples$
      - github.com/yuin/gopher-lua
      - github.com/ponyruntime/go-lua
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .github
      - .git
      - third_party$
      - builtin$
      - examples$
issues:
  fix: true
