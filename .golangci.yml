# SPDX-License-Identifier: MPL-2.0

version: "2"

run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - errcheck
    - errorlint
    #- exhaustive
    - gocritic
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    #- nilnil
    - revive
    - staticcheck
    - tparallel
    - unconvert
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        api-boundary:
          files:
            - api/**
          deny:
            - pkg: github.com/wippyai/runtime/service
              desc: "api packages must not depend on service implementations"
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      check-blank: false
    goconst:
      min-len: 2
      min-occurrences: 3
    godot:
      scope: declarations
      capital: true
    govet:
      enable-all: true
      disable:
        - shadow
    lll:
      line-length: 120
    misspell:
      locale: US
      ignore-rules:
        - "cancelled"
    nilnil:
      checked-types:
        - ptr
        - func
        - iface
        - map
        - chan
    nolintlint:
      require-specific: true
      require-explanation: false
    staticcheck:
      checks: ["all"]
    wsl:
      allow-assign-and-anything: true
  exclusions:
    generated: lax
    presets:
      - comments
    rules:
      - linters:
          - dupl
          - funlen
          - gocognit
          - scopelint
        path: _test\.go
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - errcheck
        path: bench_test\.go
      - linters:
          - errcheck
        path: fuzz_test\.go
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - revive
        text: "unused-parameter"
        path: _test\.go
      - linters:
          - revive
        text: "redefines-builtin-id"
      - linters:
          - govet
        text: "unusedwrite"
        path: _test\.go
      - linters:
          - errcheck
        text: "Error return value of.*Close.*is not checked"
      - linters:
          - errcheck
        text: "Error return value of.*Remove.*is not checked"
      - linters:
          - gosec
        text: "G101"
      - linters:
          - gosec
        text: "G103"
      - linters:
          - gosec
        text: "G115"
      - linters:
          - gosec
        text: "G301"
      - linters:
          - gosec
        text: "G304"
      - linters:
          - gosec
        text: "G306"
      - linters:
          - gocritic
        text: "captLocal"
      - linters:
          - gocritic
        text: "ifElseChain"
      - linters:
          - gocritic
        text: "exitAfterDefer"
      - linters:
          - gosec
        text: "G104"
      - linters:
          - gosec
        text: "G602"
      - linters:
          - gosec
        text: "G117"
      - linters:
          - gosec
        text: "G703"
      - linters:
          - gosec
        text: "G704"
      - linters:
          - gosec
        text: "G705"
      - linters:
          - revive
        text: "unexported-return"
      - linters:
          - revive
        text: "var-naming: avoid package names"
      - linters:
          - staticcheck
        text: "SA1012"
        path: _test\.go
    paths:
      - .github
      - .git
      - third_party$
      - builtin$
      - examples$
      - github.com/yuin/gopher-lua
      - github.com/wippyai/go-lua
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .github
      - .git
      - third_party$
      - builtin$
      - examples$
issues:
  fix: false
